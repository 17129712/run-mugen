/* ============================================================
   生成
   ============================================================ */
var WALLS=[
  {w:'#3a2f2a', wood:'#6b4a33', roof:'#2c3138'},
  {w:'#332b28', wood:'#5c3f2c', roof:'#282d34'},
  {w:'#3e332c', wood:'#75523a', roof:'#31363e'},
  {w:'#2f2724', wood:'#54382a', roof:'#252a31'}
];
function house(z){
  var side=Math.random()<0.5?-1:1;
  var x=side*(LANE+2.5+Math.random()*10);
  var w=5+Math.random()*6;
  var d=w*(0.9+Math.random()*0.5);
  var h=6+Math.random()*10;
  if(Math.random()<0.18) h=14+Math.random()*10;
  var col=WALLS[Math.floor(Math.random()*WALLS.length)];
  return {x:x,z:z,w:w,d:d,h:h,col:col,
          cols:Math.max(2,Math.round(w/2)),
          floors:h>12?2:1, lantern:Math.random()<0.5, ph:Math.random()*6.28};
}
function lant(){
  return {x:(Math.random()-0.5)*40, y:GROUND+3+Math.random()*14,
          z:-Math.random()*FAR, ph:Math.random()*6.28, sp:0.5+Math.random()*0.8};
}
/* 道中の鬼：地を這い、走ってくる。斬る/避ける */
function oni(L,z){
  var t=Math.random();
  var type = t<0.45?'grunt' : (t<0.75?'spitter' : 'leaper');
  return {
    x:(Math.random()*2-1)*(LANE-1.5),
    y:GROUND, z:z,
    hp:L.oniHP, maxhp:L.oniHP,
    type:type, ph:Math.random()*6.28,
    amp:0.8+Math.random()*1.6,
    cd:1.0+Math.random()*L.atkRate,
    dead:false, deadT:0,
    r:1.5+Math.random()*0.5,
    charge:0, vy:0, air:false
  };
}
/* 障害物（地面の瓦礫）— 跳んで越える */
function block(z){
  return {x:(Math.random()*2-1)*(LANE-1.6), z:z,
          w:2.0+Math.random()*2.2, h:1.5+Math.random()*1.3};
}
/* 飛び道具 */
function projFire(x,y,z){ return {kind:'fire',x:x,y:y,z:z,vx:0,vy:0,vz:40,r:1.1,life:7,ph:0}; }
function projSlash(x,y,z,vx,vy,vz){ return {kind:'slash',x:x,y:y,z:z,vx:vx,vy:vy,vz:vz,r:1.4,life:6,rot:0}; }

function spark(x,y,z,col,n){
  for(var i=0;i<n;i++){
    G.parts.push({x:x,y:y,z:z,
      vx:(Math.random()-.5)*16, vy:Math.random()*14, vz:(Math.random()-.5)*12,
      life:0.4+Math.random()*0.5, col:col, r:0.2+Math.random()*0.4});
  }
}

/* ============================================================
   開始
   ============================================================ */
function start(lv){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  PHASE='run';
  lockOrient('portrait');
  var L=LEVELS[lv];
  G={lv:lv,L:L,
     // 走者
     x:0,y:GROUND,vx:0,vy:0,onGround:true,
     dist:0,hp:L.hp,maxhp:L.hp,inv:0,
     houses:[],lants:[],onis:[],blocks:[],projs:[],parts:[],
     nextH:0,nextO:120,nextB:200,
     done:false,shake:0,t0:0,lean:0,run:0,
     kills:0, countdown:3.0, started:false,
     slashT:0,slashCD:0,slashArc:1,
     camX:0, camY:GROUND+5.4,
     ougi:0, ougiMax:100, ougiT:0,   // 必殺技ゲージ
     B:null                            // ボス戦ステート
  };
  for(var z=-16; z>-FAR; z-=L.hDens){
    if(Math.random()<0.85) G.houses.push(house(z));
  }
  for(var i=0;i<18;i++) G.lants.push(lant());
  for(var b=-90; b>-FAR; b-=40+Math.random()*40) G.blocks.push(block(b));

  hLvV.textContent=L.key;
  hDistK.textContent='距離';
  hHpV.textContent=new Array(L.hp+1).join('❖');
  barBox.style.display='block';
  barIn.style.width='0%';
  bossBox.style.display='none';
  aura.style.opacity=0;
  pTitle.classList.add('hidden'); pEnd.classList.add('hidden');
  ready.classList.remove('hidden');
  setControls('run');
  buildRoad();
  roadEl.classList.remove('boss');
  bQuit.classList.remove('boss');
  bQuit.textContent='夜を選び直す';
  updRoad();
  bQuit.classList.add('on');
  updOugi();
  lastT=0; raf=requestAnimationFrame(loop);
}

/* コントロール表示切替 */
function setControls(mode){
  if(mode==='none'){
    slashBtn.classList.remove('on');
    ougiBtn.classList.remove('on');
    jumpBtn.classList.remove('on');
    return;
  }
  slashBtn.classList.add('on');
  ougiBtn.classList.add('on');
  jumpBtn.classList.add('on');
}

function updOugi(){
  var r=G.ougi/G.ougiMax;
  ougiGIn.style.width=Math.min(100,r*100)+'%';
  if(G.ougi>=G.ougiMax){ ougiBtn.classList.add('ready'); ougiBtn.classList.remove('notready'); }
  else { ougiBtn.classList.remove('ready'); ougiBtn.classList.add('notready'); }
}
function gainOugi(n){
  if(!G) return;
  G.ougi=Math.min(G.ougiMax,G.ougi+n);
  updOugi();
}

function hit(dmg){
  if(!G||G.inv>0||G.done||!G.started)return;
  G.hp-=(dmg||1); G.inv=1.4; G.shake=22;
  hHpV.textContent=new Array(Math.max(0,G.hp)+1).join('❖');
  flash.style.opacity=.55;
  setTimeout(function(){flash.style.opacity=0;},100);
  if(G.hp<=0) end(false);
}

/* ============================================================
   斬撃 / 必殺技
   ============================================================ */
function doSlash(){
  if(!G||G.done||!G.started) return;
  if(G.slashCD>0) return;
  G.slashT=0.20; G.slashCD=0.30;
  G.slashArc=-G.slashArc;
  slashBtn.classList.add('cool');

  if(PHASE==='run') slashRun();
  else              slashBoss();
}

function slashRun(){
  var i;
  var RZ=[-13,2], RR=5.2;
  for(i=G.projs.length-1;i>=0;i--){
    var p=G.projs[i];
    if(p.z<RZ[0]||p.z>RZ[1]) continue;
    var dx=p.x-G.x, dy=p.y-(G.y+1.6);
    if(Math.sqrt(dx*dx+dy*dy)<RR){
      spark(p.x,p.y,p.z,'#ffd07a',12);
      G.projs.splice(i,1);
      gainOugi(3);
    }
  }
  for(i=G.onis.length-1;i>=0;i--){
    var o=G.onis[i];
    if(o.dead) continue;
    if(o.z<RZ[0]||o.z>RZ[1]) continue;
    var ox=o.x-G.x, oy=o.y-G.y;
    if(Math.sqrt(ox*ox+oy*oy)<RR+o.r){
      o.hp--;
      spark(o.x,o.y+1.5,o.z,'#e8443c',16);
      G.shake=Math.max(G.shake,6);
      if(o.hp<=0){
        o.dead=true; o.deadT=0.6; G.kills++;
        gainOugi(14);
        spark(o.x,o.y+1.5,o.z,'#ffd07a',10);
      } else gainOugi(5);
    }
  }
}

function doOugi(){
  if(!G||G.done||!G.started) return;
  if(G.ougi<G.ougiMax) return;
  G.ougi=0; updOugi();
  G.ougiT=0.9;
  G.shake=Math.max(G.shake,26);
  flash.style.background='#bfefff';
  flash.style.opacity=.7;
  setTimeout(function(){ flash.style.opacity=0;
    setTimeout(function(){flash.style.background='#c9302c';},150); },160);

  if(PHASE==='run'){
    showTelop('壱 ノ 型','円 舞',1300);
    var i;
    // 画面上の術を全て消す
    for(i=G.projs.length-1;i>=0;i--){
      spark(G.projs[i].x,G.projs[i].y,G.projs[i].z,'#bfefff',8);
      G.projs.splice(i,1);
    }
    // 前方の鬼を薙ぎ払う（大範囲・即死）
    for(i=G.onis.length-1;i>=0;i--){
      var o=G.onis[i];
      if(o.dead) continue;
      if(o.z<-90||o.z>6) continue;
      o.dead=true; o.deadT=0.6; G.kills++;
      spark(o.x,o.y+1.6,o.z,'#bfefff',18);
    }
  } else {
    showTelop('終 ノ 型','斬 鬼 一 閃',1400);
    var B=G.B;
    // 迫る術を全て祓う
    for(var k=G.projs.length-1;k>=0;k--){
      spark(G.projs[k].x,G.projs[k].y,G.projs[k].z,'#bfefff',8);
      G.projs.splice(k,1);
    }
    // 大ダメージ
    bossDamage(18, true);
    if(B) B.ougiFx=0.9;
  }
}

/* ============================================================
   ボス戦（道中と同じ縦持ち・背後視点のまま、正面の鬼へ向かっていく）
   世界座標は道中と共通。鬼は前方(z<0)に陣取り、術は道を下って迫る。
   ============================================================ */
var BOSS_Z=-46;          // 鬼の定位置（前方）

function enterBoss(){
  PHASE='boss';
  var L=G.L;

  /* 雑魚は退場（ボスとの一騎討ちにする） */
  var i;
  for(i=0;i<G.onis.length;i++){
    var o=G.onis[i];
    if(!o.dead) spark(o.x,o.y+2,o.z,'#5a4450',6);   // 消える演出
  }
  G.onis.length=0;
  G.blocks.length=0;
  G.projs.length=0;

  G.B={
    x:0, y:GROUND, z:-150,        // 奥から迫り出してくる
    hp:L.bossHP, maxhp:L.bossHP,
    ph:0, cd:2.0, phase:0, charge:0, act:'',
    dead:false, deadT:0, enrage:false,
    hitFx:0, ougiFx:0, intro:2.0,
    spd:L.bossSpd, r:5.5,
    lunge:0, lungeT:0
  };
  bossBox.style.display='block';
  bossIn.style.width='100%';
  bossNameEl.textContent=L.bossName;
  barBox.style.display='none';
  aura.style.opacity=0.5;
  hDistK.textContent='鬼';
  hDistV.textContent='決 戦';
  bQuit.classList.add('boss');
  roadEl.classList.add('boss');
  showTelop('道 を 塞 ぐ 者','鬼 、 現 る',2200);
  G.shake=30;
}

function bossDamage(n, big){
  var B=G.B;
  if(!B || B.dead) return;
  B.hp-=n;
  B.hitFx=0.18;
  bossIn.style.width=Math.max(0,B.hp/B.maxhp*100)+'%';
  spark(B.x+(Math.random()-.5)*3, B.y+6+(Math.random()-.5)*4, B.z,'#e8443c', big?26:10);
  G.shake=Math.max(G.shake, big?24:8);
  if(!B.enrage && B.hp<=B.maxhp*0.4){
    B.enrage=true;
    showTelop('鬼 、 猛 り 狂 う','血 鬼 術',1600);
    aura.style.opacity=0.75;
  }
  if(B.hp<=0){
    B.hp=0; B.dead=true; B.deadT=2.2;
    bossIn.style.width='0%';
    G.kills++;
    showTelop('鬼 を 討 ち 取 っ た り','斬 !!',2400);
    for(var k=0;k<50;k++)
      spark(B.x+(Math.random()-.5)*10, B.y+5+(Math.random()-.5)*10, B.z,'#ffd07a',1);
    G.shake=40;
  }
}

/* ボス戦の斬撃：前方の鬼と、迫る術を斬る */
function slashBoss(){
  var B=G.B, i;
  var RZ=[-13,2], RR=5.2;
  // 術を斬る
  for(i=G.projs.length-1;i>=0;i--){
    var p=G.projs[i];
    if(p.z<RZ[0]||p.z>RZ[1]) continue;
    var dx=p.x-G.x, dy=p.y-(G.y+1.8);
    if(Math.sqrt(dx*dx+dy*dy)<RR){
      spark(p.x,p.y,p.z,'#ffd07a',12);
      G.projs.splice(i,1);
      gainOugi(6);
    }
  }
  // 鬼を斬る（間合いに入っている時のみ）
  if(B && !B.dead && B.z>-14 && B.z<3){
    var bx=B.x-G.x, by=(B.y+5)-(G.y+2);
    if(Math.sqrt(bx*bx+by*by) < RR+B.r){
      bossDamage(2);
      gainOugi(7);
    }
  }
}

/* ボスの術（道中と同じ projs に流す） */
function bossSlashWave(B,ang){
  var d=Math.max(1,Math.hypot(G.x-B.x, (G.y+2)-(B.y+5), -B.z));
  var sp=52;
  var vx=(G.x-B.x)/d*sp, vy=((G.y+2)-(B.y+5))/d*sp, vz=(0-B.z)/d*sp;
  var cs=Math.cos(ang), sn=Math.sin(ang);
  G.projs.push(projSlash(B.x,B.y+5,B.z, vx*cs-vy*sn, vx*sn+vy*cs, vz));
}
function bossRubble(x,z){
  return {kind:'rubble', x:x, y:TOP_Y+6, z:z, vy:-14-Math.random()*8,
          r:1.5+Math.random()*0.7, life:7, rot:Math.random()*6.28,
          spin:(Math.random()-.5)*6, vx:0, vz:0};
}

function stepBoss(dt){
  var B=G.B, L=G.L, i;
  if(!B) return;

  /* --- 自機（道中と全く同じ操作：左右・跳躍） --- */
  var ix=0;
  if(Tilt.active) ix=Tilt.x;
  else if(dragX!==null) ix=dragX;
  if(kL||kR){
    G.keyX=(G.keyX||0)+(((kR?1:0)-(kL?1:0)))*dt*2.4;
    G.keyX=Math.max(-1,Math.min(1,G.keyX));
    ix=G.keyX;
  }
  var tx=ix*(LANE-1.2);
  var k=120, dmp=19;
  G.vx += ((tx-G.x)*k - G.vx*dmp)*dt;
  G.vx=Math.max(-52,Math.min(52,G.vx));
  G.x += G.vx*dt;
  if(G.x<-LANE+0.8){G.x=-LANE+0.8;G.vx=0;}
  if(G.x> LANE-0.8){G.x= LANE-0.8;G.vx=0;}
  G.lean += ((-G.vx*0.012)-G.lean)*0.2;

  if(!G.onGround){
    G.vy -= 42*dt;
    G.y += G.vy*dt;
    if(G.y<=GROUND){ G.y=GROUND; G.vy=0; G.onGround=true; }
  }
  G.run += dt*(G.onGround?12:0);

  if(G.inv>0) G.inv-=dt;
  if(G.slashT>0) G.slashT-=dt;
  if(G.slashCD>0){ G.slashCD-=dt; if(G.slashCD<=0) slashBtn.classList.remove('cool'); }
  if(G.ougiT>0) G.ougiT-=dt;
  if(B.hitFx>0) B.hitFx-=dt;
  if(B.ougiFx>0) B.ougiFx-=dt;

  /* 背景は流れ続ける（走り続けている演出）が、距離は進まない */
  var sp=L.speed*0.55*dt;
  for(i=G.houses.length-1;i>=0;i--){
    G.houses[i].z+=sp;
    if(G.houses[i].z>14){ G.houses.splice(i,1); G.houses.push(house(-FAR)); }
  }
  for(i=0;i<G.lants.length;i++){
    G.lants[i].z+=sp*0.9;
    G.lants[i].ph+=dt*G.lants[i].sp;
    if(G.lants[i].z>14){ var nl=lant(); nl.z=-FAR; G.lants[i]=nl; }
  }
  G.roadOff=(G.roadOff||0)+sp;

  /* --- 鬼 --- */
  if(B.dead){
    B.deadT-=dt;
    B.y += dt*1.5;              // 崩れ落ちながら消える
    if(Math.random()<0.5)
      spark(B.x+(Math.random()-.5)*8, B.y+4+Math.random()*8, B.z,'#e8443c',2);
    if(B.deadT<=0){ end(true); return; }
  } else {
    if(B.intro>0){
      B.intro-=dt;
      B.z += (BOSS_Z - B.z)*dt*1.8;   // 奥から迫り出す
    } else {
      B.ph+=dt;
      var er=B.enrage?1.35:1.0;

      // 間合い：基本は前方に留まり、時折こちらへ突進する
      if(B.lungeT>0){
        B.lungeT-=dt;
        B.z += 46*dt*er;              // 突進（こちらへ迫る）
        if(B.z>-6){ B.z=-6; }
        if(B.lungeT<=0) B.lunge=0;
      } else {
        var want=BOSS_Z + Math.sin(B.ph*0.6)*8;
        B.z += (want-B.z)*dt*1.6;
      }
      // 左右にゆらぎ、こちらを追う
      B.x += ((G.x*0.55 + Math.sin(B.ph*0.8)*5) - B.x)*dt*1.5;
      B.x = Math.max(-LANE+1, Math.min(LANE-1, B.x));

      aura.style.opacity=(0.4+0.25*Math.abs(Math.sin(B.ph*1.6))).toFixed(2);

      B.cd -= dt*er;
      if(B.cd<=0.6 && B.cd>0) B.charge=1-(B.cd/0.6);
      if(B.cd<=0){
        B.charge=0;
        B.phase=(B.phase+1+(Math.random()<0.3?1:0))%4;
        B.cd=Math.max(0.85,(2.2-(1-B.hp/B.maxhp)*1.0)/er);

        if(B.phase===0){
          // 斬撃波を扇状に
          var cnt=B.enrage?5:3;
          for(i=0;i<cnt;i++) bossSlashWave(B,(i-(cnt-1)/2)*0.26);
          B.act='斬';
        } else if(B.phase===1){
          // 追尾する鬼火
          var fc=B.enrage?3:2;
          for(i=0;i<fc;i++)
            G.projs.push(projFire(B.x+(Math.random()-.5)*6, B.y+5+(Math.random()-.5)*4, B.z));
          B.act='炎';
        } else if(B.phase===2){
          // 瓦礫を降らせる（自機の周辺に集中／左右へ避ける）
          for(i=0;i<(B.enrage?7:5);i++){
            var rz=-16-Math.random()*40;
            var rx=G.x+(Math.random()-.5)*16;
            G.projs.push(bossRubble(Math.max(-LANE,Math.min(LANE,rx)), rz));
          }
          G.shake=Math.max(G.shake,12);
          B.act='礫';
        } else {
          // 突進（跳んで躱す）
          B.lunge=1; B.lungeT=0.9;
          showTelop('','突 進',700);
          G.shake=Math.max(G.shake,14);
          B.act='突';
        }
      }
    }

    /* 鬼との接触 */
    if(B.z>-3.2 && B.z<2.6){
      if(Math.abs(B.x-G.x) < B.r*0.55+1.0 && G.y < B.y+5.0) hit(1);
    }
  }

  /* --- 術の更新（道中と同じ処理） --- */
  for(i=G.projs.length-1;i>=0;i--){
    var p=G.projs[i];
    p.life-=dt;
    if(p.life<=0){ G.projs.splice(i,1); continue; }

    if(p.kind==='fire'){
      p.ph+=dt*7;
      var tX=G.x-p.x, tY=(G.y+1.8)-p.y;
      var dd=Math.max(1,Math.hypot(tX,tY,-p.z));
      p.vx += tX/dd*26*dt;
      p.vy += tY/dd*26*dt;
      p.vx*=0.97; p.vy*=0.97;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.z+=p.vz*dt;
    } else if(p.kind==='rubble'){
      p.vy -= 30*dt;
      p.y += p.vy*dt;
      p.rot += p.spin*dt;
      if(p.y<GROUND-2){ G.projs.splice(i,1); continue; }
    } else {
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt;
      p.rot+=dt*9;
    }

    if(p.z>-2.2 && p.z<2.2){
      if(Math.abs(p.x-G.x)<p.r+0.9 && Math.abs(p.y-(G.y+1.8))<p.r+1.8){
        hit(1); G.projs.splice(i,1); continue;
      }
    }
    if(p.z>16) G.projs.splice(i,1);
  }

  /* --- 火花 --- */
  for(i=G.parts.length-1;i>=0;i--){
    var pt=G.parts[i];
    pt.life-=dt;
    if(pt.life<=0){ G.parts.splice(i,1); continue; }
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.z+=pt.vz*dt;
    pt.vy-=18*dt; pt.vx*=0.94; pt.vz*=0.94;
  }
}

/* ============================================================
   道中 更新
   ============================================================ */
function stepRun(dt){
  var L=G.L,i;

  if(!G.started){
    G.countdown-=dt;
    var n=Math.ceil(G.countdown);
    var K=['','壱','弐','参'];
    if(n>0){ readyN.textContent=K[Math.min(3,n)]||String(n); readyT.textContent='構 え よ'; }
    else { readyN.textContent='駆'; readyT.textContent='征 け'; }
    if(G.countdown<=-0.45){
      G.started=true; G.t0=Date.now(); ready.classList.add('hidden');
    }
  }

  /* --- 横移動（傾き不要：左右スワイプ/ドラッグ or キー、画面左半分ドラッグ） --- */
  var ix=0;
  if(Tilt.active) ix=Tilt.x;
  else if(dragX!==null) ix=dragX;
  if(kL||kR){
    G.keyX=(G.keyX||0)+(((kR?1:0)-(kL?1:0)))*dt*2.4;
    G.keyX=Math.max(-1,Math.min(1,G.keyX));
    ix=G.keyX;
  }
  var tx=ix*(LANE-1.2);
  var k=120, dmp=19;
  G.vx += ((tx-G.x)*k - G.vx*dmp)*dt;
  G.vx=Math.max(-52,Math.min(52,G.vx));
  G.x += G.vx*dt;
  if(G.x<-LANE+0.8){G.x=-LANE+0.8;G.vx=0;}
  if(G.x> LANE-0.8){G.x= LANE-0.8;G.vx=0;}
  G.lean += ((-G.vx*0.012)-G.lean)*0.2;

  /* --- ジャンプ・重力 --- */
  if(!G.onGround){
    G.vy -= 42*dt;
    G.y += G.vy*dt;
    if(G.y<=GROUND){ G.y=GROUND; G.vy=0; G.onGround=true; }
  }
  G.run += dt*(G.onGround?12:0);

  if(G.slashT>0) G.slashT-=dt;
  if(G.slashCD>0){ G.slashCD-=dt; if(G.slashCD<=0) slashBtn.classList.remove('cool'); }
  if(G.ougiT>0) G.ougiT-=dt;

  if(!G.started) return;

  var sp=L.speed*dt;
  G.dist+=sp;
  if(G.inv>0) G.inv-=dt;

  /* --- 家屋 --- */
  G.nextH-=sp;
  if(G.nextH<=0){
    G.houses.push(house(-FAR));
    if(Math.random()<0.5) G.houses.push(house(-FAR-Math.random()*8));
    G.nextH=L.hDens;
  }
  for(i=G.houses.length-1;i>=0;i--){
    G.houses[i].z+=sp;
    if(G.houses[i].z>14) G.houses.splice(i,1);
  }
  for(i=0;i<G.lants.length;i++){
    G.lants[i].z+=sp*0.9;
    G.lants[i].ph+=dt*G.lants[i].sp;
    if(G.lants[i].z>14){ var nl=lant(); nl.z=-FAR; G.lants[i]=nl; }
  }

  /* --- 障害物 --- */
  G.nextB-=sp;
  if(G.nextB<=0){
    G.blocks.push(block(-FAR));
    G.nextB=70+Math.random()*90;
  }
  for(i=G.blocks.length-1;i>=0;i--){
    var bl=G.blocks[i];
    bl.z+=sp;
    if(bl.z>-1.6 && bl.z<1.8){
      if(Math.abs(bl.x-G.x) < bl.w/2+1.0 && G.y < bl.h){
        hit(1);
        spark(bl.x,bl.h,bl.z,'#8a7a6a',12);
        G.blocks.splice(i,1); continue;
      }
    }
    if(bl.z>14) G.blocks.splice(i,1);
  }

  /* --- 鬼の出現（ボスゾーン手前まで） --- */
  var bossZone = L.goal;
  if(G.dist < bossZone-30){
    G.nextO-=sp;
    if(G.nextO<=0){
      G.onis.push(oni(L,-FAR+Math.random()*30));
      if(Math.random()<0.25) G.onis.push(oni(L,-FAR-10-Math.random()*20));
      G.nextO=L.oniRate*L.speed*0.9;
    }
  }

  /* --- 鬼 --- */
  for(i=G.onis.length-1;i>=0;i--){
    var o=G.onis[i];
    o.z+=sp;
    o.ph+=dt*2;
    if(o.dead){
      o.deadT-=dt;
      if(o.deadT<=0) G.onis.splice(i,1);
      continue;
    }
    // 自機へ寄る（横方向）
    o.x += (G.x-o.x)*dt*0.5 + Math.cos(o.ph)*dt*o.amp;
    o.x=Math.max(-LANE+0.6,Math.min(LANE-0.6,o.x));

    // 跳ねる鬼
    if(o.type==='leaper'){
      if(!o.air && o.z>-60 && Math.random()<dt*1.2){ o.air=true; o.vy=13; }
      if(o.air){
        o.vy-=34*dt; o.y+=o.vy*dt;
        if(o.y<=GROUND){ o.y=GROUND; o.air=false; o.vy=0; }
      }
    }
    // 火を吐く鬼
    if(o.type==='spitter' && o.z>-120 && o.z<-14){
      o.cd-=dt;
      if(o.cd<=0.5 && o.cd>0) o.charge=1-(o.cd/0.5);
      if(o.cd<=0){
        o.charge=0; o.cd=L.atkRate+Math.random()*1.4;
        G.projs.push(projFire(o.x,o.y+2.0,o.z));
      }
    }
    // 斬撃波を撃つ鬼（grunt が近距離で振る）
    if(o.type==='grunt' && o.z>-70 && o.z<-12){
      o.cd-=dt;
      if(o.cd<=0.45 && o.cd>0) o.charge=1-(o.cd/0.45);
      if(o.cd<=0){
        o.charge=0; o.cd=L.atkRate+1.0+Math.random()*1.5;
        var d1=Math.max(1,Math.hypot(G.x-o.x, -o.z));
        var s1=46;
        G.projs.push(projSlash(o.x,o.y+1.8,o.z,(G.x-o.x)/d1*s1, 0, (0-o.z)/d1*s1));
      }
    }

    // 接触
    if(o.z>-2.0 && o.z<1.8){
      if(Math.abs(o.x-G.x)<o.r+0.9 && G.y < o.y+2.6) hit(1);
    }
    if(o.z>15) G.onis.splice(i,1);
  }

  /* --- 術 --- */
  for(i=G.projs.length-1;i>=0;i--){
    var p=G.projs[i];
    p.life-=dt;
    if(p.life<=0){ G.projs.splice(i,1); continue; }
    if(p.kind==='fire'){
      p.ph+=dt*7;
      var tX=G.x-p.x, tY=(G.y+1.5)-p.y;
      var dd=Math.max(1,Math.hypot(tX,tY,-p.z));
      p.vx += tX/dd*24*dt;
      p.vy += tY/dd*24*dt;
      p.vx*=0.97; p.vy*=0.97;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.z+=p.vz*dt+sp*0.4;
    } else {
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.z+=p.vz*dt+sp;
      p.rot+=dt*9;
    }
    if(p.z>-2.0 && p.z<2.0){
      if(Math.abs(p.x-G.x)<p.r+0.9 && Math.abs(p.y-(G.y+1.5))<p.r+1.5){
        hit(1); G.projs.splice(i,1); continue;
      }
    }
    if(p.z>16) G.projs.splice(i,1);
  }

  /* --- 粒子 --- */
  for(i=G.parts.length-1;i>=0;i--){
    var pt=G.parts[i];
    pt.life-=dt;
    if(pt.life<=0){ G.parts.splice(i,1); continue; }
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.z+=pt.vz*dt+sp;
    pt.vy-=18*dt; pt.vx*=0.94; pt.vz*=0.94;
  }

  /* --- ボス戦へ --- */
  if(G.dist >= L.goal){
    enterBoss();
    return;
  }
}

function doJump(){
  if(!G||G.done||!G.started) return;   // 道中・ボス戦とも跳べる
  if(!G.onGround) return;
  G.onGround=false; G.vy=21;
}

/* ============================================================
   描画 — 道中
   ============================================================ */
function poly(pts,fill,stroke,lw){
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}
}
function roofAt(x,w,y,z,col,a){
  var ov=w*0.34, rh=Math.max(1.4,w*0.28), hw=w/2;
  var L1=proj(x-hw-ov,y,z+0.3), R1=proj(x+hw+ov,y,z+0.3);
  var L2=proj(x-hw-ov*0.5,y+rh*0.4,z+0.3), R2=proj(x+hw+ov*0.5,y+rh*0.4,z+0.3);
  var TP=proj(x,y+rh,z+0.3);
  ctx.globalAlpha=a;
  ctx.beginPath();
  ctx.moveTo(L1.x,L1.y);
  ctx.quadraticCurveTo(L2.x,L2.y,TP.x,TP.y);
  ctx.quadraticCurveTo(R2.x,R2.y,R1.x,R1.y);
  ctx.closePath();
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle='rgba(18,15,20,.9)';
  ctx.lineWidth=Math.max(0.8,proj(0,0,z).s*0.02);
  ctx.stroke();
}
function drawHouse(hs,fade){
  var hw=hs.w/2, zF=hs.z, zB=hs.z-hs.d, yB=GROUND, yT=GROUND+hs.h;
  if(zF-camZ>=-1) return;
  var s0=proj(hs.x,yT,zF).s;
  var P={
    fbl:proj(hs.x-hw,yB,zF), fbr:proj(hs.x+hw,yB,zF),
    ftl:proj(hs.x-hw,yT,zF), ftr:proj(hs.x+hw,yT,zF),
    bbl:proj(hs.x-hw,yB,zB), bbr:proj(hs.x+hw,yB,zB),
    btl:proj(hs.x-hw,yT,zB), btr:proj(hs.x+hw,yT,zB)
  };
  var a=Math.min(1,fade*2.0);
  ctx.globalAlpha=a;
  var side=camX-hs.x;
  if(side<-hw&&(zB-camZ)<-1) poly([P.fbr,P.bbr,P.btr,P.ftr],hs.col.wood,'rgba(15,12,18,.75)',1);
  else if(side>hw&&(zB-camZ)<-1) poly([P.fbl,P.bbl,P.btl,P.ftl],hs.col.wood,'rgba(15,12,18,.75)',1);
  poly([P.fbl,P.fbr,P.ftr,P.ftl],hs.col.w,'rgba(15,12,18,.8)',1.1);
  if(s0>1.6){
    for(var f=1;f<=hs.floors;f++)
      roofAt(hs.x,hs.w, GROUND+hs.h*(f/hs.floors), zF, hs.col.roof, a*0.95);
  }
  if(s0>4){
    ctx.globalAlpha=a*0.9;
    var rows=Math.max(1,hs.floors*2);
    var wx0=P.ftl.x,wy0=P.ftl.y,wx1=P.ftr.x,wy1=P.ftr.y;
    var bx0=P.fbl.x,by0=P.fbl.y,bx1=P.fbr.x,by1=P.fbr.y;
    for(var r=0;r<rows;r++){
      for(var c=0;c<hs.cols;c++){
        var u0=(c+0.18)/hs.cols, u1=(c+0.82)/hs.cols;
        var v0=(r+0.25)/rows, v1=(r+0.78)/rows;
        var tx0=wx0+(wx1-wx0)*u0, ty0=wy0+(wy1-wy0)*u0;
        var tx1=wx0+(wx1-wx0)*u1, ty1=wy0+(wy1-wy0)*u1;
        var sx0=bx0+(bx1-bx0)*u0, sy0=by0+(by1-by0)*u0;
        var sx1=bx0+(bx1-bx0)*u1, sy1=by0+(by1-by0)*u1;
        var A0x=tx0+(sx0-tx0)*v0, A0y=ty0+(sy0-ty0)*v0;
        var A1x=tx1+(sx1-tx1)*v0, A1y=ty1+(sy1-ty1)*v0;
        var B2x=tx0+(sx0-tx0)*v1, B2y=ty0+(sy0-ty0)*v1;
        var B3x=tx1+(sx1-tx1)*v1, B3y=ty1+(sy1-ty1)*v1;
        var lit=((r*5+c*3+Math.floor(hs.x*3))%4)<2;
        ctx.fillStyle=lit?'rgba(214,164,86,.5)':'rgba(24,19,26,.8)';
        ctx.beginPath();
        ctx.moveTo(A0x,A0y); ctx.lineTo(A1x,A1y);
        ctx.lineTo(B3x,B3y); ctx.lineTo(B2x,B2y);
        ctx.closePath(); ctx.fill();
      }
    }
    ctx.globalAlpha=a;
  }
  if(hs.lantern && s0>3){
    var lp=proj(hs.x-hw*0.7, yT-0.8+Math.sin(hs.ph+Date.now()*0.0015)*0.2, zF+0.4);
    var lr=Math.max(1.2,lp.s*0.05);
    ctx.globalAlpha=a*0.35;
    var rg=ctx.createRadialGradient(lp.x,lp.y,0,lp.x,lp.y,lr*4.5);
    rg.addColorStop(0,'rgba(255,180,90,.9)'); rg.addColorStop(1,'rgba(255,150,60,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(lp.x,lp.y,lr*4.5,0,6.2832); ctx.fill();
    ctx.globalAlpha=a;
    ctx.fillStyle='#e8a13c';
    ctx.beginPath(); ctx.ellipse(lp.x,lp.y,lr*0.72,lr,0,0,6.2832); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBlock(bl,fade){
  if(bl.z-camZ>=-1) return;
  var a=Math.min(1,fade*2.2);
  var hw=bl.w/2;
  var P=[proj(bl.x-hw,GROUND,bl.z),proj(bl.x+hw,GROUND,bl.z),
         proj(bl.x+hw,GROUND+bl.h,bl.z),proj(bl.x-hw,GROUND+bl.h,bl.z)];
  ctx.globalAlpha=a;
  poly(P,'#3a3440','rgba(15,12,18,.9)',1.2);
  // 上面
  var T=[proj(bl.x-hw,GROUND+bl.h,bl.z),proj(bl.x+hw,GROUND+bl.h,bl.z),
         proj(bl.x+hw*0.85,GROUND+bl.h,bl.z-1.4),proj(bl.x-hw*0.85,GROUND+bl.h,bl.z-1.4)];
  poly(T,'#4a4450',null,0);
  ctx.globalAlpha=1;
}

function drawOni(o,fade){
  if(o.z-camZ>=-1) return;
  var gp=proj(o.x,GROUND,o.z);
  var s=gp.s;
  var u=o.r*s*0.20;                 // 体格の単位（大きめ）
  if(u<0.7) return;
  var a=Math.min(1,fade*2.0);

  /* 消滅（灰化して崩れる） */
  if(o.dead){
    var td=1-(o.deadT/0.6);
    ctx.globalAlpha=a*(1-td);
    for(var q=0;q<12;q++){
      var qa=(q/12)*6.2832 + td*2;
      var qr=u*(0.8+td*3.2);
      var pxq=gp.x+Math.cos(qa)*qr;
      var pyq=gp.y-u*2.0+Math.sin(qa)*qr*0.6 - td*u*3.0;
      ctx.fillStyle= q%3===0 ? '#8a3a44' : '#5a4450';
      ctx.beginPath();
      ctx.arc(pxq,pyq,u*0.42*(1-td),0,6.2832);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    return;
  }

  var fp=proj(o.x,o.y,o.z);         // 実際の足の位置（跳ぶと上がる）
  var bx=fp.x, by=fp.y;
  var ph=o.ph;
  var walk=Math.sin(ph*3.2);
  var walk2=Math.sin(ph*3.2+Math.PI);

  /* 影（地面に残る。跳ぶほど小さく） */
  var hAir=Math.max(0,o.y-GROUND);
  var shr=1/(1+hAir*0.12);
  ctx.globalAlpha=a*0.45*shr;
  var shg=ctx.createRadialGradient(gp.x,gp.y,0,gp.x,gp.y,u*1.7*shr);
  shg.addColorStop(0,'rgba(0,0,0,.8)');
  shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg;
  ctx.beginPath(); ctx.ellipse(gp.x,gp.y,u*1.7*shr,u*0.45*shr,0,0,6.2832); ctx.fill();

  /* 禍々しい瘴気 */
  ctx.globalAlpha=a*0.32*(0.6+0.4*Math.sin(ph*3));
  var ag=ctx.createRadialGradient(bx,by-u*2.2,0,bx,by-u*2.2,u*3.2);
  ag.addColorStop(0, o.type==='spitter'?'rgba(230,110,20,.6)':'rgba(200,25,45,.65)');
  ag.addColorStop(1,'rgba(90,0,25,0)');
  ctx.fillStyle=ag;
  ctx.beginPath(); ctx.arc(bx,by-u*2.2,u*3.2,0,6.2832); ctx.fill();
  ctx.globalAlpha=a;

  ctx.save();
  ctx.translate(bx,by);
  var lean=Math.sin(ph*1.5)*0.05;
  ctx.rotate(lean);

  var skin = o.type==='spitter' ? '#7d4a3e' :
             o.type==='leaper'  ? '#5e4258' : '#6b4148';
  var skinD= o.type==='spitter' ? '#4a2a22' :
             o.type==='leaper'  ? '#33243a' : '#3d2228';

  /* 脚（獣のように曲がった逆関節） */
  function oleg(dir,phase,dark){
    var hx=dir*u*0.36, hy=-u*1.55;
    var kx=hx+dir*u*0.30+phase*u*0.20;
    var ky=-u*0.85;
    var ax=hx+dir*u*0.06+phase*u*0.55;
    var ay=-u*0.30;
    var fx=hx+phase*u*0.75;
    var fy=0;
    ctx.strokeStyle=dark?skinD:skin;
    ctx.lineCap='round';
    ctx.lineWidth=u*0.42;
    ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(kx,ky); ctx.stroke();
    ctx.lineWidth=u*0.28;
    ctx.beginPath(); ctx.moveTo(kx,ky); ctx.lineTo(ax,ay); ctx.stroke();
    ctx.lineWidth=u*0.22;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(fx,fy); ctx.stroke();
    // 鉤爪
    ctx.strokeStyle=dark?'#2a2226':'#d8cfc0';
    ctx.lineWidth=Math.max(0.6,u*0.07);
    for(var c=0;c<3;c++){
      ctx.beginPath();
      ctx.moveTo(fx,fy);
      ctx.lineTo(fx+(c-1)*u*0.16, fy+u*0.16);
      ctx.stroke();
    }
  }
  oleg(-1,walk,true);

  /* 胴（痩身・肋が浮く） */
  var tg=ctx.createLinearGradient(-u*0.9,-u*3.6,u*0.9,-u*1.2);
  tg.addColorStop(0,skinD);
  tg.addColorStop(0.5,skin);
  tg.addColorStop(1,skinD);
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(-u*0.60,-u*3.45);
  ctx.quadraticCurveTo(-u*0.95,-u*2.6, -u*0.66,-u*1.45);
  ctx.quadraticCurveTo(0,-u*1.15, u*0.66,-u*1.45);
  ctx.quadraticCurveTo( u*0.95,-u*2.6,  u*0.60,-u*3.45);
  ctx.quadraticCurveTo(0,-u*3.70, -u*0.60,-u*3.45);
  ctx.closePath(); ctx.fill();

  // 肋骨
  ctx.strokeStyle='rgba(20,10,14,.5)';
  ctx.lineWidth=Math.max(0.5,u*0.055);
  for(var rb=0;rb<4;rb++){
    var ry=-u*(3.1-rb*0.42);
    ctx.beginPath();
    ctx.moveTo(-u*0.55,ry);
    ctx.quadraticCurveTo(0,ry+u*0.16, u*0.55,ry);
    ctx.stroke();
  }
  // 腹の陰
  ctx.fillStyle='rgba(15,8,12,.35)';
  ctx.beginPath();
  ctx.ellipse(0,-u*1.75,u*0.44,u*0.34,0,0,6.2832);
  ctx.fill();

  /* 血鬼術の紋様（体に走る赤い脈） */
  ctx.strokeStyle= o.type==='spitter' ? 'rgba(255,140,40,.6)' : 'rgba(230,50,60,.55)';
  ctx.lineWidth=Math.max(0.6,u*0.06);
  ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=u*0.5;
  ctx.beginPath();
  ctx.moveTo(-u*0.35,-u*3.3);
  ctx.lineTo(-u*0.10,-u*2.6);
  ctx.lineTo(-u*0.30,-u*2.1);
  ctx.lineTo(-u*0.05,-u*1.6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(u*0.38,-u*3.2);
  ctx.lineTo(u*0.14,-u*2.5);
  ctx.lineTo(u*0.34,-u*2.0);
  ctx.stroke();
  ctx.shadowBlur=0;

  /* 腰布（ぼろ） */
  ctx.fillStyle='#2f2a26';
  ctx.beginPath();
  ctx.moveTo(-u*0.62,-u*1.60);
  ctx.lineTo( u*0.62,-u*1.60);
  ctx.lineTo( u*0.50,-u*0.95+Math.sin(ph*2)*u*0.06);
  ctx.lineTo( u*0.16,-u*1.15);
  ctx.lineTo(-u*0.20,-u*0.88);
  ctx.lineTo(-u*0.54,-u*1.10);
  ctx.closePath(); ctx.fill();

  /* 腕（長く垂れ下がる） */
  function oarm(dir,phase,dark){
    var sx=dir*u*0.56, sy=-u*3.25;
    var ex=dir*u*0.92-phase*u*0.20, ey=-u*2.35;
    var hx2=dir*u*0.80-phase*u*0.55, hy2=-u*1.30;
    ctx.strokeStyle=dark?skinD:skin;
    ctx.lineCap='round';
    ctx.lineWidth=u*0.26;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.lineWidth=u*0.21;
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(hx2,hy2); ctx.stroke();
    // 手・長い爪
    ctx.fillStyle=dark?skinD:skin;
    ctx.beginPath(); ctx.arc(hx2,hy2,u*0.15,0,6.2832); ctx.fill();
    ctx.strokeStyle=dark?'#6a6055':'#e2dac9';
    ctx.lineWidth=Math.max(0.6,u*0.065);
    ctx.shadowColor='rgba(255,255,255,.4)'; ctx.shadowBlur=u*0.25;
    for(var c2=0;c2<4;c2++){
      var ca=(c2-1.5)*0.34 + 1.35;
      ctx.beginPath();
      ctx.moveTo(hx2,hy2);
      ctx.lineTo(hx2+Math.cos(ca)*u*0.52*dir*0.6, hy2+Math.sin(ca)*u*0.52);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
  }
  oarm(-1,walk2,true);

  /* 首 */
  ctx.strokeStyle=skinD;
  ctx.lineWidth=u*0.26;
  ctx.beginPath();
  ctx.moveTo(0,-u*3.45); ctx.lineTo(0,-u*3.85);
  ctx.stroke();

  /* 頭部 */
  var hy=-u*4.35;
  var hg=ctx.createRadialGradient(-u*0.15,hy-u*0.12,u*0.05,0,hy,u*0.72);
  hg.addColorStop(0,skin);
  hg.addColorStop(1,skinD);
  ctx.fillStyle=hg;
  ctx.beginPath();
  // 顎の張った鬼面
  ctx.moveTo(0,hy-u*0.62);
  ctx.quadraticCurveTo(u*0.62,hy-u*0.45, u*0.55,hy+u*0.12);
  ctx.quadraticCurveTo(u*0.42,hy+u*0.62, 0,hy+u*0.70);
  ctx.quadraticCurveTo(-u*0.42,hy+u*0.62, -u*0.55,hy+u*0.12);
  ctx.quadraticCurveTo(-u*0.62,hy-u*0.45, 0,hy-u*0.62);
  ctx.closePath(); ctx.fill();

  /* 角（種類で本数が違う） */
  ctx.fillStyle='#3a2c30';
  var hornN = o.type==='leaper'?3:2;
  for(var hn=0;hn<hornN;hn++){
    var hox = (hornN===2) ? (hn?1:-1)*u*0.36 : (hn-1)*u*0.34;
    var hlen= (hornN===2) ? u*1.05 : u*0.85;
    var tilt= (hn - (hornN-1)/2)*0.45;
    ctx.save();
    ctx.translate(hox,hy-u*0.42);
    ctx.rotate(tilt*0.5);
    var hgh=ctx.createLinearGradient(0,0,0,-hlen);
    hgh.addColorStop(0,'#4a3a3e');
    hgh.addColorStop(1,'#d8cec0');
    ctx.fillStyle=hgh;
    ctx.beginPath();
    ctx.moveTo(-u*0.13,0);
    ctx.quadraticCurveTo(-u*0.06,-hlen*0.6, u*0.10,-hlen);
    ctx.quadraticCurveTo(u*0.02,-hlen*0.5, u*0.14,0);
    ctx.closePath(); ctx.fill();
    // 角の筋
    ctx.strokeStyle='rgba(30,20,24,.5)';
    ctx.lineWidth=Math.max(0.4,u*0.03);
    for(var hs=1;hs<4;hs++){
      var hv=hs/4;
      ctx.beginPath();
      ctx.moveTo(-u*0.11+u*0.03*hv, -hlen*hv);
      ctx.lineTo( u*0.12-u*0.03*hv, -hlen*hv);
      ctx.stroke();
    }
    ctx.restore();
  }

  /* 髪（乱れ髪） */
  ctx.strokeStyle='#191320';
  ctx.lineCap='round';
  for(var k2=0;k2<6;k2++){
    var ka=(k2-2.5)*0.36;
    ctx.lineWidth=u*0.09;
    ctx.beginPath();
    ctx.moveTo(Math.sin(ka)*u*0.40, hy-u*0.30);
    ctx.quadraticCurveTo(
      Math.sin(ka)*u*0.75, hy+u*0.30+Math.sin(ph*2+k2)*u*0.10,
      Math.sin(ka)*u*0.95, hy+u*0.95);
    ctx.stroke();
  }
  ctx.lineCap='butt';

  /* 眼（爛々と光る） */
  var eg=0.72+0.28*Math.sin(ph*5);
  var eyeC = o.type==='spitter' ? '#ff9a20' :
             o.type==='leaper'  ? '#c060ff' : '#ff2d3d';
  ctx.globalAlpha=a*eg;
  ctx.fillStyle=eyeC;
  ctx.shadowColor=eyeC; ctx.shadowBlur=u*1.0;
  // 吊り上がった眼
  ctx.save();
  ctx.translate(-u*0.24,hy-u*0.02); ctx.rotate(-0.28);
  ctx.beginPath(); ctx.ellipse(0,0,u*0.20,u*0.10,0,0,6.2832); ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(u*0.24,hy-u*0.02); ctx.rotate(0.28);
  ctx.beginPath(); ctx.ellipse(0,0,u*0.20,u*0.10,0,0,6.2832); ctx.fill();
  ctx.restore();
  ctx.shadowBlur=0;
  // 瞳孔（縦割れ）
  ctx.globalAlpha=a;
  ctx.fillStyle='#1a0a10';
  ctx.beginPath(); ctx.ellipse(-u*0.24,hy-u*0.02,u*0.035,u*0.075,0,0,6.2832); ctx.fill();
  ctx.beginPath(); ctx.ellipse( u*0.24,hy-u*0.02,u*0.035,u*0.075,0,0,6.2832); ctx.fill();

  /* 口（裂けた口・牙） */
  ctx.fillStyle='#1c0a10';
  ctx.beginPath();
  ctx.moveTo(-u*0.34,hy+u*0.30);
  ctx.quadraticCurveTo(0,hy+u*0.52, u*0.34,hy+u*0.30);
  ctx.quadraticCurveTo(0,hy+u*0.38, -u*0.34,hy+u*0.30);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#e8dfd0';
  for(var fg=0;fg<5;fg++){
    var fx2=(fg-2)*u*0.14;
    ctx.beginPath();
    ctx.moveTo(fx2-u*0.045,hy+u*0.31);
    ctx.lineTo(fx2+u*0.045,hy+u*0.31);
    ctx.lineTo(fx2,hy+u*0.46);
    ctx.closePath(); ctx.fill();
  }
  // 下の牙（2本、上に突き出る）
  ctx.beginPath();
  ctx.moveTo(-u*0.22,hy+u*0.40); ctx.lineTo(-u*0.13,hy+u*0.40);
  ctx.lineTo(-u*0.175,hy+u*0.20); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(u*0.22,hy+u*0.40); ctx.lineTo(u*0.13,hy+u*0.40);
  ctx.lineTo(u*0.175,hy+u*0.20); ctx.closePath(); ctx.fill();

  /* 手前の腕・脚 */
  oarm(1,walk,false);
  oleg(1,walk2,false);

  ctx.restore();

  /* 攻撃チャージ */
  if(o.charge>0){
    ctx.globalAlpha=a*o.charge*0.9;
    ctx.strokeStyle= o.type==='spitter'?'#ff9a20':'#ff4050';
    ctx.lineWidth=Math.max(1.5,u*0.14);
    ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=u*1.2;
    ctx.beginPath();
    ctx.arc(bx,by-u*2.4,u*(2.0+o.charge*1.2),0,6.2832);
    ctx.stroke();
    ctx.shadowBlur=0;
    // 口元に集まる光
    ctx.globalAlpha=a*o.charge;
    ctx.fillStyle=ctx.strokeStyle;
    ctx.beginPath();
    ctx.arc(bx,by-u*3.95,u*0.30*o.charge,0,6.2832);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawProjRun(p,fade){
  if(p.z-camZ>=-1) return;
  var pp=proj(p.x,p.y,p.z), s=pp.s;
  var a=Math.min(1,fade*2.2);
  var r=Math.max(2,p.r*s*0.5);
  if(p.kind==='fire'){
    ctx.globalAlpha=a*0.5;
    var fg=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,r*3);
    fg.addColorStop(0,'rgba(255,220,140,.95)');
    fg.addColorStop(0.4,'rgba(255,110,40,.7)');
    fg.addColorStop(1,'rgba(180,20,20,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.arc(pp.x,pp.y,r*3,0,6.2832); ctx.fill();
    ctx.globalAlpha=a;
    ctx.fillStyle='#ffd08a';
    ctx.beginPath();
    ctx.arc(pp.x,pp.y,r*(0.9+0.1*Math.sin(p.ph)),0,6.2832);
    ctx.fill();
  } else {
    ctx.globalAlpha=a;
    ctx.save();
    ctx.translate(pp.x,pp.y);
    ctx.rotate(Math.sin(p.rot)*0.5);
    ctx.strokeStyle='#e8443c';
    ctx.lineWidth=Math.max(2,r*0.5);
    ctx.shadowColor='rgba(232,68,60,.9)'; ctx.shadowBlur=Math.max(6,r);
    ctx.beginPath();
    ctx.arc(0,0,r*1.6,-0.9,0.9);
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

/* 自機（鬼狩り・背後からの視点） */
function drawRunner(){
  var px=G.x, py=G.y, pz=0;
  var base=proj(px,GROUND,pz);        // 足元（地面）
  var foot=proj(px,py,pz);            // 実際の足の位置（跳ぶと上がる）
  var s=foot.s;
  var u=s*0.185;                      // 体格の単位（大きめ）
  var inv=(G.inv>0&&Math.floor(G.inv*14)%2===1);

  var lean=G.lean*1.6;
  var t=G.run;
  var air=!G.onGround;
  var bob=air?0:Math.sin(t*2)*u*0.10;
  var hipX=foot.x;
  var hipY=foot.y - u*3.4 + bob;      // 足元から腰までの高さ

  /* 影（地面に落ちる。跳ぶほど小さく薄くなる＝跳んだ事が判る） */
  var gp=proj(px,GROUND,pz);
  var hAir=Math.max(0,py-GROUND);
  var shr=1/(1+hAir*0.10);                 // 高いほど縮む
  ctx.globalAlpha=(inv?0.18:0.45)*shr;
  var shg=ctx.createRadialGradient(gp.x,gp.y,0,gp.x,gp.y,u*1.9*shr);
  shg.addColorStop(0,'rgba(0,0,0,.85)');
  shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg;
  ctx.beginPath();
  ctx.ellipse(gp.x,gp.y,u*1.9*shr,u*0.5*shr,0,0,6.2832);
  ctx.fill();
  ctx.globalAlpha=1;

  ctx.save();
  ctx.translate(hipX,hipY);
  ctx.rotate(lean);
  ctx.globalAlpha=inv?0.45:1;

  /* 走行サイクル：背後から見た脚の前後運動
     奥の脚は暗く、手前の脚は明るく描いて奥行きを出す */
  var sw = air? 0.55 : Math.sin(t);
  var sw2= air?-0.35 : Math.sin(t+Math.PI);
  var lift = air? 0.5 : Math.max(0,Math.sin(t))*0.5;
  var lift2= air? 0.2 : Math.max(0,Math.sin(t+Math.PI))*0.5;

  function leg(dir,phase,liftv,dark){
    // dir: -1 左脚 / +1 右脚
    var hx=dir*u*0.34, hy=0;
    var kx=hx + dir*u*0.10 + phase*u*0.30;
    var ky=u*1.35 - liftv*u*0.55;
    var fx=hx + phase*u*0.95;
    var fy=u*2.75 - liftv*u*0.95;
    // 太腿
    ctx.strokeStyle=dark?'#1a1228':'#2e2340';
    ctx.lineWidth=u*0.40;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(kx,ky); ctx.stroke();
    // 脛（脚絆）
    ctx.strokeStyle=dark?'#14161c':'#20242e';
    ctx.lineWidth=u*0.30;
    ctx.beginPath(); ctx.moveTo(kx,ky); ctx.lineTo(fx,fy); ctx.stroke();
    // 脚絆の紐
    ctx.strokeStyle=dark?'#3a3020':'#54462c';
    ctx.lineWidth=Math.max(0.6,u*0.05);
    for(var q=0;q<3;q++){
      var vv=0.35+q*0.22;
      var ax=kx+(fx-kx)*vv, ay=ky+(fy-ky)*vv;
      ctx.beginPath();
      ctx.moveTo(ax-u*0.15,ay); ctx.lineTo(ax+u*0.15,ay);
      ctx.stroke();
    }
    // 草鞋（足）
    ctx.fillStyle=dark?'#2a2118':'#3d3122';
    ctx.save();
    ctx.translate(fx,fy);
    ctx.rotate(phase*0.35);
    ctx.beginPath();
    ctx.ellipse(0,u*0.10,u*0.26,u*0.13,0,0,6.2832);
    ctx.fill();
    ctx.restore();
  }
  // 奥の脚を先に
  if(sw<sw2){ leg(-1,sw,lift,true); } else { leg(1,sw2,lift2,true); }

  /* 胴（背中）— 隊服。背後なので背中側の陰影 */
  var torsoG=ctx.createLinearGradient(-u*0.9,-u*3.0,u*0.9,-u*0.2);
  torsoG.addColorStop(0,'#1d1430');
  torsoG.addColorStop(0.45,'#382a52');
  torsoG.addColorStop(1,'#181026');
  ctx.fillStyle=torsoG;
  ctx.beginPath();
  ctx.moveTo(-u*0.72,-u*2.95);          // 左肩
  ctx.quadraticCurveTo(-u*0.95,-u*1.7, -u*0.62,-u*0.15);  // 左脇→腰
  ctx.lineTo( u*0.62,-u*0.15);
  ctx.quadraticCurveTo( u*0.95,-u*1.7,  u*0.72,-u*2.95);  // 右脇→右肩
  ctx.quadraticCurveTo(0,-u*3.15, -u*0.72,-u*2.95);       // 肩の稜線
  ctx.closePath(); ctx.fill();

  // 背骨の陰
  ctx.strokeStyle='rgba(8,6,12,.55)';
  ctx.lineWidth=u*0.10;
  ctx.beginPath();
  ctx.moveTo(0,-u*2.85); ctx.lineTo(0,-u*0.35);
  ctx.stroke();
  // 肩甲骨のハイライト
  ctx.strokeStyle='rgba(120,130,160,.16)';
  ctx.lineWidth=u*0.07;
  ctx.beginPath();
  ctx.moveTo(-u*0.50,-u*2.55); ctx.quadraticCurveTo(-u*0.28,-u*2.1,-u*0.34,-u*1.75);
  ctx.moveTo( u*0.50,-u*2.55); ctx.quadraticCurveTo( u*0.28,-u*2.1, u*0.34,-u*1.75);
  ctx.stroke();

  /* 帯 */
  var obiG=ctx.createLinearGradient(0,-u*0.75,0,-u*0.15);
  obiG.addColorStop(0,'#3f2160');
  obiG.addColorStop(0.5,'#8b5fc4');
  obiG.addColorStop(1,'#341a50');
  ctx.fillStyle=obiG;
  ctx.beginPath();
  ctx.moveTo(-u*0.66,-u*0.78);
  ctx.lineTo( u*0.66,-u*0.78);
  ctx.lineTo( u*0.62,-u*0.12);
  ctx.lineTo(-u*0.62,-u*0.12);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(10,6,10,.5)';
  ctx.lineWidth=Math.max(0.6,u*0.04);
  ctx.stroke();

  /* 羽織（背中に翻る）— 隊服の上に重なる */
  var fl=Math.sin(Date.now()*0.011)*u*0.30 + (-G.vx/50)*u*0.85;
  var flu=Math.cos(Date.now()*0.009)*u*0.14;
  ctx.globalAlpha=(inv?0.35:0.93);
  var hg=ctx.createLinearGradient(0,-u*3.0,0,u*1.4);
  hg.addColorStop(0,'#6b3f9e');
  hg.addColorStop(0.55,'#4e2b78');
  hg.addColorStop(1,'rgba(46,22,72,.35)');
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(-u*0.80,-u*2.95);
  ctx.lineTo( u*0.80,-u*2.95);
  // 右の裾が風で流れる
  ctx.quadraticCurveTo(u*1.30,-u*1.2, u*1.05+fl, u*1.15+flu);
  ctx.quadraticCurveTo(u*0.45, u*0.35, 0, u*0.75);
  ctx.quadraticCurveTo(-u*0.45, u*0.35, -u*1.05+fl, u*1.15-flu);
  ctx.quadraticCurveTo(-u*1.30,-u*1.2, -u*0.80,-u*2.95);
  ctx.closePath(); ctx.fill();
  // 羽織の襞（ひだ）
  ctx.strokeStyle='rgba(26,10,44,.45)';
  ctx.lineWidth=Math.max(0.7,u*0.05);
  for(var f2=-2;f2<=2;f2++){
    ctx.beginPath();
    ctx.moveTo(f2*u*0.30,-u*2.7);
    ctx.quadraticCurveTo(f2*u*0.45,-u*0.7, f2*u*0.52+fl*0.55, u*0.85);
    ctx.stroke();
  }
  // 背の紋（円に一文字）
  ctx.globalAlpha=(inv?0.3:0.5);
  ctx.strokeStyle='#d8cdb4';
  ctx.lineWidth=Math.max(0.8,u*0.055);
  ctx.beginPath(); ctx.arc(0,-u*1.95,u*0.34,0,6.2832); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-u*0.17,-u*1.95); ctx.lineTo(u*0.17,-u*1.95);
  ctx.stroke();
  ctx.globalAlpha=inv?0.45:1;

  /* 手前の脚（羽織の上に出す） */
  if(sw<sw2){ leg(1,sw2,lift2,false); } else { leg(-1,sw,lift,false); }

  /* 腕（背後から：肩から後方へ振る） */
  var armSw = air? -0.5 : Math.sin(t+Math.PI)*0.9;
  var armSw2= air?  0.6 : Math.sin(t)*0.9;
  function arm(dir,phase,dark){
    var sx=dir*u*0.68, sy=-u*2.75;
    var ex=sx + dir*u*0.28 - phase*u*0.22;
    var ey=-u*1.75 + Math.abs(phase)*u*0.12;
    var hx2=sx + dir*u*0.16 - phase*u*0.72;
    var hy2=-u*0.95 + phase*u*0.30;
    // 上腕（隊服の袖）
    ctx.strokeStyle=dark?'#1e1630':'#332548';
    ctx.lineWidth=u*0.30;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    // 前腕（手甲）
    ctx.strokeStyle=dark?'#1d1a16':'#2c2720';
    ctx.lineWidth=u*0.24;
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(hx2,hy2); ctx.stroke();
    // 手
    ctx.fillStyle=dark?'#b89877':'#d6b48f';
    ctx.beginPath(); ctx.arc(hx2,hy2,u*0.135,0,6.2832); ctx.fill();
    return {x:hx2,y:hy2};
  }
  arm(-1,armSw,true);
  var rh=arm(1,armSw2,false);

  /* 首・後頭部（背後なので顔は見えない） */
  ctx.fillStyle='#c9a582';
  ctx.beginPath();
  ctx.moveTo(-u*0.20,-u*3.02);
  ctx.lineTo( u*0.20,-u*3.02);
  ctx.lineTo( u*0.17,-u*3.30);
  ctx.lineTo(-u*0.17,-u*3.30);
  ctx.closePath(); ctx.fill();

  var headY=-u*3.85;
  // 後頭部
  var hgd=ctx.createRadialGradient(-u*0.15,headY-u*0.15,u*0.05,0,headY,u*0.60);
  hgd.addColorStop(0,'#2a2436');
  hgd.addColorStop(1,'#0f0d16');
  ctx.fillStyle=hgd;
  ctx.beginPath();
  ctx.ellipse(0,headY,u*0.52,u*0.58,0,0,6.2832);
  ctx.fill();
  // 髪の束（後ろ髪が風になびく）
  ctx.strokeStyle='#141220';
  ctx.lineCap='round';
  for(var q2=0;q2<5;q2++){
    var a2=(q2-2)*0.30;
    ctx.lineWidth=u*(0.15-Math.abs(q2-2)*0.02);
    ctx.beginPath();
    ctx.moveTo(Math.sin(a2)*u*0.34, headY+u*0.30);
    ctx.quadraticCurveTo(
      Math.sin(a2)*u*0.55 - fl*0.30, headY+u*0.85,
      Math.sin(a2)*u*0.70 - fl*0.75, headY+u*1.35+flu*0.5);
    ctx.stroke();
  }
  // 髪の艶
  ctx.strokeStyle='rgba(150,160,200,.20)';
  ctx.lineWidth=u*0.07;
  ctx.beginPath();
  ctx.arc(0,headY,u*0.40,Math.PI*1.15,Math.PI*1.65);
  ctx.stroke();
  ctx.lineCap='butt';

  /* 刀（背後視点：右手に提げ、斬撃時は消える） */
  if(G.slashT<=0){
    ctx.save();
    ctx.translate(rh.x,rh.y);
    ctx.rotate(-0.35 + armSw2*0.25);
    // 柄
    ctx.strokeStyle='#3a2a20';
    ctx.lineWidth=u*0.11;
    ctx.beginPath(); ctx.moveTo(-u*0.10,u*0.10); ctx.lineTo(u*0.30,-u*0.16); ctx.stroke();
    // 柄糸
    ctx.strokeStyle='#191316';
    ctx.lineWidth=Math.max(0.5,u*0.035);
    for(var g3=0;g3<4;g3++){
      var gv=g3/4;
      ctx.beginPath();
      ctx.moveTo(-u*0.10+u*0.40*gv, u*0.10-u*0.26*gv-u*0.05);
      ctx.lineTo(-u*0.10+u*0.40*gv+u*0.05, u*0.10-u*0.26*gv+u*0.05);
      ctx.stroke();
    }
    // 鍔
    ctx.fillStyle='#5a4a2a';
    ctx.beginPath(); ctx.arc(u*0.34,-u*0.19,u*0.085,0,6.2832); ctx.fill();
    // 刀身（日輪刀・淡く発光）
    var bg=ctx.createLinearGradient(u*0.34,-u*0.19,u*2.5,-u*1.55);
    bg.addColorStop(0,'#cfe6f2');
    bg.addColorStop(0.5,'#f2fbff');
    bg.addColorStop(1,'#9fd0e8');
    ctx.strokeStyle=bg;
    ctx.lineWidth=u*0.10;
    ctx.shadowColor='rgba(190,235,255,.7)';
    ctx.shadowBlur=u*0.7;
    ctx.beginPath();
    ctx.moveTo(u*0.40,-u*0.23);
    ctx.quadraticCurveTo(u*1.5,-u*0.95, u*2.45,-u*1.50);
    ctx.stroke();
    // 刃文
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,.55)';
    ctx.lineWidth=Math.max(0.5,u*0.03);
    ctx.beginPath();
    ctx.moveTo(u*0.50,-u*0.32);
    ctx.quadraticCurveTo(u*1.5,-u*1.02, u*2.35,-u*1.52);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  /* 斬撃エフェクト（背後視点：前方に大きく弧を描く） */
  if(G.slashT>0){
    var t2=1-(G.slashT/0.20);
    var cp=proj(G.x,G.y+2.0,-3.0);
    var R=Math.max(40, cp.s*3.4);
    ctx.save();
    ctx.translate(cp.x,cp.y);
    ctx.rotate(G.slashArc*(0.9 - t2*1.9));
    ctx.globalAlpha=(1-t2)*0.95;
    var lg=ctx.createLinearGradient(-R,0,R,0);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(0.45,'rgba(200,245,255,.95)');
    lg.addColorStop(0.55,'rgba(255,255,255,1)');
    lg.addColorStop(1,'rgba(120,200,255,0)');
    ctx.strokeStyle=lg;
    ctx.lineWidth=Math.max(4, R*0.14*(1-t2*0.5));
    ctx.lineCap='round';
    ctx.shadowColor='rgba(190,240,255,.95)';
    ctx.shadowBlur=Math.max(10,R*0.3);
    ctx.beginPath();
    ctx.arc(0,0,R*(0.6+t2*0.55), -1.3, 1.3);
    ctx.stroke();
    ctx.globalAlpha=(1-t2)*0.7;
    ctx.lineWidth=Math.max(1.5,R*0.035);
    ctx.strokeStyle='rgba(255,255,255,.95)';
    ctx.beginPath();
    ctx.arc(0,0,R*(0.6+t2*0.55)*1.15, -1.05, 1.05);
    ctx.stroke();
    ctx.shadowBlur=0; ctx.lineCap='butt';
    ctx.restore();
  }

  /* 必殺技エフェクト */
  if(G.ougiT>0){
    var ot=1-(G.ougiT/0.9);
    var op=proj(G.x,G.y+2.0,-8);
    var OR=Math.max(60, op.s*7*(0.4+ot*1.5));
    ctx.save();
    ctx.translate(op.x,op.y);
    ctx.globalAlpha=(1-ot)*0.9;
    for(var q3=0;q3<6;q3++){
      ctx.rotate(1.05 + ot*3.0);
      var og=ctx.createLinearGradient(-OR,0,OR,0);
      og.addColorStop(0,'rgba(255,255,255,0)');
      og.addColorStop(0.5,'rgba(190,240,255,.95)');
      og.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle=og;
      ctx.lineWidth=Math.max(3,OR*0.05);
      ctx.shadowColor='rgba(180,235,255,.9)'; ctx.shadowBlur=OR*0.2;
      ctx.beginPath();
      ctx.arc(0,0,OR*(0.5+q3*0.09), -1.5, 1.5);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawRun(){
  var L=G.L,i;
  var sh=G.shake>0?(Math.random()-0.5)*G.shake:0;
  if(G.shake>0) G.shake*=0.86;

  /* 主人公の背後からの視点（三人称・肩越し）
     ジャンプ時はカメラをほぼ据え置きにして、主人公自身が跳ぶのを見せる */
  if(G.camX===undefined){ G.camX=G.x; G.camY=GROUND+5.4; }
  G.camX += (G.x - G.camX)*Math.min(1,0.12);
  // 跳んだ高さはごく僅かしか追わない（0.55→0.12）。さらに遅れて動く
  var wantY = GROUND+5.4 + (G.y-GROUND)*0.12;
  G.camY += (wantY - G.camY)*Math.min(1,0.06);

  camX=G.camX + sh*0.1;
  camY=G.camY + sh*0.06;
  camZ=11.0;                 // 主人公(z=0)より手前＝背後に位置する
  camRoll=G.lean*0.3;

  ctx.clearRect(0,0,W,H);

  var near = (PHASE==='boss') || (G.dist > L.goal-260);

  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0812');
  sky.addColorStop(0.42, near?'#2a0a14':'#161226');
  sky.addColorStop(1, near?'#40101c':'#241a2e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  var moonX=W*0.74, moonY=H*0.12, moonR=Math.min(W,H)*0.09;
  var mg=ctx.createRadialGradient(moonX,moonY,moonR*0.3,moonX,moonY,moonR*3.2);
  mg.addColorStop(0, near?'rgba(255,90,80,.5)':'rgba(255,190,140,.35)');
  mg.addColorStop(1,'rgba(255,120,80,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = near?'#e8564a':'#e8c48a';
  ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,6.2832); ctx.fill();

  ctx.fillStyle='rgba(220,220,255,.5)';
  for(i=0;i<50;i++)
    ctx.fillRect(((i*137+61)%1000)/1000*W, ((i*211+43)%1000)/1000*H*0.36, 1.2,1.2);

  var horY=proj(0,GROUND,-FAR).y;
  ctx.save();
  ctx.translate(CX,CY); ctx.rotate(camRoll*0.2); ctx.translate(-CX,-CY);
  ctx.fillStyle='rgba(24,18,30,.85)';
  for(i=0;i<26;i++){
    var bx=(i/26)*(W+60)-30;
    var bw=(W+60)/26*1.3;
    var bh=14+((i*53)%7)*9;
    ctx.fillRect(bx-bw/2, horY-bh, bw, bh+8);
    ctx.beginPath();
    ctx.moveTo(bx-bw*0.7, horY-bh);
    ctx.lineTo(bx, horY-bh-bw*0.28);
    ctx.lineTo(bx+bw*0.7, horY-bh);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  var gg=ctx.createLinearGradient(0,horY,0,H);
  gg.addColorStop(0,'#20182a'); gg.addColorStop(1,'#100c16');
  ctx.fillStyle=gg; ctx.fillRect(-20,horY-2,W+40,H-horY+40);

  /* 石畳の道 */
  ctx.fillStyle='rgba(70,60,84,.35)';
  var rL=proj(-LANE,GROUND,-FAR), rR=proj(LANE,GROUND,-FAR);
  var rL2=proj(-LANE,GROUND,8), rR2=proj(LANE,GROUND,8);
  ctx.beginPath();
  ctx.moveTo(rL.x,rL.y); ctx.lineTo(rR.x,rR.y);
  ctx.lineTo(rR2.x,rR2.y); ctx.lineTo(rL2.x,rL2.y);
  ctx.closePath(); ctx.fill();

  var stp=6, off=((PHASE==='boss')?(G.roadOff||0):G.dist)%stp;
  ctx.strokeStyle='rgba(150,130,170,.18)';
  ctx.lineWidth=1;
  for(var z=-FAR;z<-6;z+=stp){
    var zz=z+off;
    if(zz-camZ>=-3) continue;
    var fd=1-(-zz+camZ)/FAR;
    if(fd<=0) continue;
    ctx.globalAlpha=fd*fd;
    var q1=proj(-LANE,GROUND,zz), q2=proj(LANE,GROUND,zz);
    ctx.beginPath(); ctx.moveTo(q1.x,q1.y); ctx.lineTo(q2.x,q2.y); ctx.stroke();
  }
  ctx.globalAlpha=1;

  /* 描画順 */
  var items=[];
  for(i=0;i<G.houses.length;i++) items.push({t:'h',o:G.houses[i],z:G.houses[i].z});
  for(i=0;i<G.lants.length;i++)  items.push({t:'l',o:G.lants[i], z:G.lants[i].z});
  if(PHASE!=='boss'){
    for(i=0;i<G.onis.length;i++)   items.push({t:'o',o:G.onis[i],  z:G.onis[i].z});
    for(i=0;i<G.blocks.length;i++) items.push({t:'k',o:G.blocks[i],z:G.blocks[i].z});
  }
  for(i=0;i<G.projs.length;i++)  items.push({t:'p',o:G.projs[i], z:G.projs[i].z});
  for(i=0;i<G.parts.length;i++)  items.push({t:'s',o:G.parts[i], z:G.parts[i].z});
  if(PHASE==='boss' && G.B) items.push({t:'B',o:G.B,z:G.B.z});
  items.sort(function(a,b){return a.z-b.z;});

  for(i=0;i<items.length;i++){
    var it=items[i];
    if(!vis(it.z)) continue;
    var fade=1-(-(it.z-camZ))/FAR;
    if(fade<=0) continue;
    if(it.t==='h') drawHouse(it.o,fade);
    else if(it.t==='k') drawBlock(it.o,fade);
    else if(it.t==='o') drawOni(it.o,fade);
    else if(it.t==='B') drawBoss3D(it.o,fade);
    else if(it.t==='p') drawProjRun(it.o,fade);
    else if(it.t==='l'){
      var lp=proj(it.o.x, it.o.y+Math.sin(it.o.ph)*0.8, it.o.z);
      var lr=Math.max(1, lp.s*0.04);
      var gl=0.6+0.4*Math.sin(it.o.ph*1.6);
      ctx.globalAlpha=Math.min(0.8,fade*1.3)*0.45*gl;
      var rg=ctx.createRadialGradient(lp.x,lp.y,0,lp.x,lp.y,lr*5);
      rg.addColorStop(0,'rgba(255,170,80,.8)'); rg.addColorStop(1,'rgba(255,140,50,0)');
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.arc(lp.x,lp.y,lr*5,0,6.2832); ctx.fill();
      ctx.globalAlpha=Math.min(1,fade*1.3)*gl;
      ctx.fillStyle='#f0ae4a';
      ctx.beginPath(); ctx.ellipse(lp.x,lp.y,lr*0.75,lr,0,0,6.2832); ctx.fill();
      ctx.globalAlpha=1;
    }
    else if(it.t==='s'){
      var pt=it.o;
      var pp=proj(pt.x,pt.y,pt.z);
      var pr=Math.max(1, pt.r*pp.s*0.5);
      ctx.globalAlpha=Math.min(1,fade*2)*Math.min(1,pt.life*2.2);
      ctx.fillStyle=pt.col;
      ctx.shadowColor=pt.col; ctx.shadowBlur=pr*2;
      ctx.beginPath(); ctx.arc(pp.x,pp.y,pr,0,6.2832); ctx.fill();
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
  }

  /* 鳥居（ボスの門）。ボス戦中は鬼の背後に固定して見せる */
  var goalZ=(PHASE==='boss') ? BOSS_Z-26 : -(L.goal-G.dist);
  if(goalZ>-FAR && vis(goalZ)){
    var gf=1-(-(goalZ-camZ))/FAR;
    if(gf>0){
      var s0=proj(0,0,goalZ).s;
      var gw=LANE+2, gh=TOP_Y-1;
      ctx.globalAlpha=Math.min(1,gf*2.2);
      ctx.strokeStyle='#c9302c';
      ctx.lineWidth=Math.max(2,s0*0.16);
      ctx.shadowColor='rgba(201,48,44,.9)'; ctx.shadowBlur=Math.max(6,s0*0.5);
      var pL1=proj(-gw,GROUND,goalZ), pL2=proj(-gw,gh,goalZ);
      var pR1=proj( gw,GROUND,goalZ), pR2=proj( gw,gh,goalZ);
      ctx.beginPath(); ctx.moveTo(pL1.x,pL1.y); ctx.lineTo(pL2.x,pL2.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pR1.x,pR1.y); ctx.lineTo(pR2.x,pR2.y); ctx.stroke();
      var kL2=proj(-gw-3,gh+3.5,goalZ), kR2=proj(gw+3,gh+3.5,goalZ), kC=proj(0,gh+5.5,goalZ);
      ctx.lineWidth=Math.max(3,s0*0.24);
      ctx.beginPath();
      ctx.moveTo(kL2.x,kL2.y);
      ctx.quadraticCurveTo(kC.x,kC.y,kR2.x,kR2.y);
      ctx.stroke();
      var nL=proj(-gw-1,gh,goalZ), nR=proj(gw+1,gh,goalZ);
      ctx.lineWidth=Math.max(2,s0*0.13);
      ctx.beginPath(); ctx.moveTo(nL.x,nL.y); ctx.lineTo(nR.x,nR.y); ctx.stroke();
      ctx.shadowBlur=0;
      var gp2=proj(0,gh+2.2,goalZ);
      ctx.fillStyle='#c48e32';
      ctx.font='700 '+Math.max(10,s0*2.2)+'px "Hiragino Mincho ProN",serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('鬼 門',gp2.x,gp2.y);
      ctx.globalAlpha=1;
    }
  }

  drawRunner();

  if(PHASE!=='boss'){
    hDistV.textContent=Math.floor(G.dist)+' m';
    barIn.style.width=Math.min(100,G.dist/L.goal*100)+'%';
  }
}

/* ============================================================
   描画 — ボス戦（横向き 2D）
   ============================================================ */
/* ボス鬼（道中と同じ3D空間に描く。巨大で威圧的） */
function drawBoss3D(B,fade){
  if(B.z-camZ>=-1) return;
  var gp=proj(B.x,GROUND,B.z);
  var fp=proj(B.x,B.y,B.z);
  var s=fp.s;
  var u=B.r*s*0.30;               // ボスは大きい
  if(u<1) return;
  var a=Math.min(1,fade*2.2);
  var ph=B.ph||0;

  /* 死亡：光に包まれて崩れる */
  if(B.dead){
    var td=1-(B.deadT/2.2);
    ctx.globalAlpha=a*(1-td)*0.95;
    var dg=ctx.createRadialGradient(fp.x,fp.y-u*3,0,fp.x,fp.y-u*3,u*(3+td*7));
    dg.addColorStop(0,'rgba(255,230,150,.9)');
    dg.addColorStop(0.35,'rgba(232,68,60,.55)');
    dg.addColorStop(1,'rgba(120,0,30,0)');
    ctx.fillStyle=dg;
    ctx.beginPath(); ctx.arc(fp.x,fp.y-u*3,u*(3+td*7),0,6.2832); ctx.fill();
    // 崩れる破片
    ctx.globalAlpha=a*(1-td);
    for(var q=0;q<16;q++){
      var qa=(q/16)*6.2832+td*2.5;
      var qr=u*(1.0+td*4.5);
      ctx.fillStyle=q%3===0?'#8a3a44':'#4a3a44';
      ctx.beginPath();
      ctx.arc(fp.x+Math.cos(qa)*qr, fp.y-u*3+Math.sin(qa)*qr*0.7-td*u*3,
              u*0.5*(1-td),0,6.2832);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    return;
  }

  var flash=B.hitFx>0;
  var skin  = flash?'#ffb0b0':'#5c3040';
  var skinD = flash?'#ff8080':'#2e1620';

  /* 影 */
  var hAir=Math.max(0,B.y-GROUND);
  var shr=1/(1+hAir*0.06);
  ctx.globalAlpha=a*0.5*shr;
  var shg=ctx.createRadialGradient(gp.x,gp.y,0,gp.x,gp.y,u*3.0*shr);
  shg.addColorStop(0,'rgba(0,0,0,.85)');
  shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg;
  ctx.beginPath(); ctx.ellipse(gp.x,gp.y,u*3.0*shr,u*0.8*shr,0,0,6.2832); ctx.fill();

  /* 巨大な瘴気 */
  var pul=0.6+0.4*Math.sin(ph*2.2);
  ctx.globalAlpha=a*0.5*pul;
  var ag=ctx.createRadialGradient(fp.x,fp.y-u*3.2,0,fp.x,fp.y-u*3.2,u*5.5);
  ag.addColorStop(0, B.enrage?'rgba(255,40,60,.75)':'rgba(210,20,50,.6)');
  ag.addColorStop(0.5,'rgba(150,0,40,.3)');
  ag.addColorStop(1,'rgba(80,0,25,0)');
  ctx.fillStyle=ag;
  ctx.beginPath(); ctx.arc(fp.x,fp.y-u*3.2,u*5.5,0,6.2832); ctx.fill();
  ctx.globalAlpha=a;

  ctx.save();
  ctx.translate(fp.x,fp.y);

  var walk=Math.sin(ph*2.0);
  var walk2=Math.sin(ph*2.0+Math.PI);

  /* 脚（逆関節・太い） */
  function bleg(dir,phase,dark){
    var hx=dir*u*0.62, hy=-u*2.5;
    var kx=hx+dir*u*0.45+phase*u*0.25, ky=-u*1.35;
    var ax=hx+dir*u*0.10+phase*u*0.55, ay=-u*0.45;
    var fx=hx+phase*u*0.70, fy=0;
    ctx.strokeStyle=dark?skinD:skin;
    ctx.lineCap='round';
    ctx.lineWidth=u*0.70;
    ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(kx,ky); ctx.stroke();
    ctx.lineWidth=u*0.48;
    ctx.beginPath(); ctx.moveTo(kx,ky); ctx.lineTo(ax,ay); ctx.stroke();
    ctx.lineWidth=u*0.36;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(fx,fy); ctx.stroke();
    // 巨大な鉤爪
    ctx.strokeStyle=dark?'#3a3038':'#ded4c4';
    ctx.lineWidth=Math.max(1,u*0.12);
    for(var c=0;c<3;c++){
      ctx.beginPath();
      ctx.moveTo(fx,fy);
      ctx.lineTo(fx+(c-1)*u*0.30, fy+u*0.26);
      ctx.stroke();
    }
  }
  bleg(-1,walk,true);

  /* 胴（巨躯） */
  var tg=ctx.createLinearGradient(-u*1.7,-u*6.0,u*1.7,-u*2.0);
  tg.addColorStop(0,skinD);
  tg.addColorStop(0.5,skin);
  tg.addColorStop(1,skinD);
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(-u*1.25,-u*5.7);
  ctx.quadraticCurveTo(-u*1.85,-u*4.2, -u*1.20,-u*2.35);
  ctx.quadraticCurveTo(0,-u*1.95, u*1.20,-u*2.35);
  ctx.quadraticCurveTo( u*1.85,-u*4.2,  u*1.25,-u*5.7);
  ctx.quadraticCurveTo(0,-u*6.15, -u*1.25,-u*5.7);
  ctx.closePath(); ctx.fill();

  // 胸筋・腹の陰
  ctx.strokeStyle='rgba(20,8,14,.5)';
  ctx.lineWidth=Math.max(0.8,u*0.09);
  for(var rb=0;rb<4;rb++){
    var ry=-u*(5.0-rb*0.60);
    ctx.beginPath();
    ctx.moveTo(-u*1.05,ry);
    ctx.quadraticCurveTo(0,ry+u*0.26, u*1.05,ry);
    ctx.stroke();
  }

  /* 血鬼術の紋様（体に走る発光する脈） */
  ctx.strokeStyle= B.enrage?'rgba(255,220,60,.75)':'rgba(240,50,60,.65)';
  ctx.lineWidth=Math.max(1,u*0.10);
  ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=u*1.0;
  ctx.beginPath();
  ctx.moveTo(-u*0.70,-u*5.5);
  ctx.lineTo(-u*0.20,-u*4.4);
  ctx.lineTo(-u*0.60,-u*3.5);
  ctx.lineTo(-u*0.10,-u*2.6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(u*0.75,-u*5.4);
  ctx.lineTo(u*0.25,-u*4.3);
  ctx.lineTo(u*0.65,-u*3.4);
  ctx.stroke();
  // 渦巻く紋
  ctx.globalAlpha=a*0.55*pul;
  ctx.lineWidth=Math.max(0.7,u*0.06);
  for(var w2=0;w2<3;w2++){
    ctx.beginPath();
    ctx.arc(0,-u*3.9, u*(0.8+w2*0.45), 0.6+ph*0.6, 2.5+ph*0.6);
    ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.globalAlpha=a;

  /* 腰布 */
  ctx.fillStyle='#2a2422';
  ctx.beginPath();
  ctx.moveTo(-u*1.20,-u*2.55);
  ctx.lineTo( u*1.20,-u*2.55);
  ctx.lineTo( u*0.95,-u*1.45+Math.sin(ph*2)*u*0.10);
  ctx.lineTo( u*0.30,-u*1.85);
  ctx.lineTo(-u*0.35,-u*1.35);
  ctx.lineTo(-u*1.00,-u*1.75);
  ctx.closePath(); ctx.fill();

  /* 腕（長大・爪） */
  function barm(dir,phase,dark){
    var sx=dir*u*1.15, sy=-u*5.35;
    var ex=dir*u*1.85-phase*u*0.30, ey=-u*3.90;
    var hx2=dir*u*1.65-phase*u*0.85, hy2=-u*2.20;
    ctx.strokeStyle=dark?skinD:skin;
    ctx.lineCap='round';
    ctx.lineWidth=u*0.46;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.lineWidth=u*0.38;
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(hx2,hy2); ctx.stroke();
    ctx.fillStyle=dark?skinD:skin;
    ctx.beginPath(); ctx.arc(hx2,hy2,u*0.28,0,6.2832); ctx.fill();
    // 長い爪
    ctx.strokeStyle=dark?'#7a6f62':'#ece3d2';
    ctx.lineWidth=Math.max(1,u*0.12);
    ctx.shadowColor='rgba(255,255,255,.5)'; ctx.shadowBlur=u*0.4;
    for(var c2=0;c2<4;c2++){
      var ca=(c2-1.5)*0.30 + 1.35;
      ctx.beginPath();
      ctx.moveTo(hx2,hy2);
      ctx.lineTo(hx2+Math.cos(ca)*u*1.00*dir*0.6, hy2+Math.sin(ca)*u*1.00);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
  }
  barm(-1,walk2,true);

  /* 首 */
  ctx.strokeStyle=skinD;
  ctx.lineWidth=u*0.50;
  ctx.beginPath();
  ctx.moveTo(0,-u*5.7); ctx.lineTo(0,-u*6.25);
  ctx.stroke();

  /* 頭部 */
  var hy=-u*6.95;
  var hg=ctx.createRadialGradient(-u*0.25,hy-u*0.20,u*0.08,0,hy,u*1.15);
  hg.addColorStop(0,skin);
  hg.addColorStop(1,skinD);
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(0,hy-u*0.95);
  ctx.quadraticCurveTo( u*1.00,hy-u*0.70,  u*0.88,hy+u*0.20);
  ctx.quadraticCurveTo( u*0.66,hy+u*1.00, 0,hy+u*1.12);
  ctx.quadraticCurveTo(-u*0.66,hy+u*1.00, -u*0.88,hy+u*0.20);
  ctx.quadraticCurveTo(-u*1.00,hy-u*0.70, 0,hy-u*0.95);
  ctx.closePath(); ctx.fill();

  /* 四本の角 */
  var horns=[[-0.60,-1.75],[0.60,-1.75],[-0.24,-2.05],[0.24,-2.05]];
  for(var hn=0;hn<4;hn++){
    var hox=horns[hn][0], hlen=Math.abs(horns[hn][1])*u*0.95;
    ctx.save();
    ctx.translate(u*hox, hy-u*0.62);
    ctx.rotate(hox*0.42);
    var hgh=ctx.createLinearGradient(0,0,0,-hlen);
    hgh.addColorStop(0,'#4a3a3e');
    hgh.addColorStop(1,'#e2d8c8');
    ctx.fillStyle=hgh;
    ctx.beginPath();
    ctx.moveTo(-u*0.20,0);
    ctx.quadraticCurveTo(-u*0.10,-hlen*0.6, u*0.16,-hlen);
    ctx.quadraticCurveTo(u*0.04,-hlen*0.5, u*0.22,0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(30,20,24,.5)';
    ctx.lineWidth=Math.max(0.5,u*0.045);
    for(var hs=1;hs<4;hs++){
      var hv=hs/4;
      ctx.beginPath();
      ctx.moveTo(-u*0.17+u*0.05*hv,-hlen*hv);
      ctx.lineTo( u*0.19-u*0.05*hv,-hlen*hv);
      ctx.stroke();
    }
    ctx.restore();
  }

  /* 乱れ髪 */
  ctx.strokeStyle='#1a1420';
  ctx.lineCap='round';
  for(var k2=0;k2<7;k2++){
    var ka=(k2-3)*0.32;
    ctx.lineWidth=u*0.15;
    ctx.beginPath();
    ctx.moveTo(Math.sin(ka)*u*0.70, hy-u*0.45);
    ctx.quadraticCurveTo(
      Math.sin(ka)*u*1.25, hy+u*0.55+Math.sin(ph*2+k2)*u*0.18,
      Math.sin(ka)*u*1.60, hy+u*1.60);
    ctx.stroke();
  }
  ctx.lineCap='butt';

  /* 眼（爛々） */
  var eg=0.75+0.25*Math.sin(ph*4);
  var eyeC=B.enrage?'#ffe040':'#ff1f34';
  ctx.globalAlpha=a*eg;
  ctx.fillStyle=eyeC;
  ctx.shadowColor=eyeC; ctx.shadowBlur=u*1.8;
  ctx.save();
  ctx.translate(-u*0.38,hy-u*0.05); ctx.rotate(-0.26);
  ctx.beginPath(); ctx.ellipse(0,0,u*0.34,u*0.17,0,0,6.2832); ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate( u*0.38,hy-u*0.05); ctx.rotate(0.26);
  ctx.beginPath(); ctx.ellipse(0,0,u*0.34,u*0.17,0,0,6.2832); ctx.fill();
  ctx.restore();
  ctx.shadowBlur=0;
  ctx.globalAlpha=a;
  // 縦割れの瞳孔
  ctx.fillStyle='#1a0a10';
  ctx.beginPath(); ctx.ellipse(-u*0.38,hy-u*0.05,u*0.06,u*0.13,0,0,6.2832); ctx.fill();
  ctx.beginPath(); ctx.ellipse( u*0.38,hy-u*0.05,u*0.06,u*0.13,0,0,6.2832); ctx.fill();

  /* 裂けた口と牙 */
  ctx.fillStyle='#1c0810';
  ctx.beginPath();
  ctx.moveTo(-u*0.58,hy+u*0.48);
  ctx.quadraticCurveTo(0,hy+u*0.90, u*0.58,hy+u*0.48);
  ctx.quadraticCurveTo(0,hy+u*0.62, -u*0.58,hy+u*0.48);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ece3d2';
  for(var fg=0;fg<7;fg++){
    var fx2=(fg-3)*u*0.16;
    ctx.beginPath();
    ctx.moveTo(fx2-u*0.055,hy+u*0.49);
    ctx.lineTo(fx2+u*0.055,hy+u*0.49);
    ctx.lineTo(fx2,hy+u*0.76);
    ctx.closePath(); ctx.fill();
  }
  ctx.beginPath();
  ctx.moveTo(-u*0.40,hy+u*0.70); ctx.lineTo(-u*0.24,hy+u*0.70);
  ctx.lineTo(-u*0.32,hy+u*0.32); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo( u*0.40,hy+u*0.70); ctx.lineTo( u*0.24,hy+u*0.70);
  ctx.lineTo( u*0.32,hy+u*0.32); ctx.closePath(); ctx.fill();

  /* 手前の腕・脚 */
  barm(1,walk,false);
  bleg(1,walk2,false);

  ctx.restore();

  /* 攻撃チャージ */
  if(B.charge>0){
    ctx.globalAlpha=a*B.charge*0.9;
    ctx.strokeStyle=B.enrage?'#ffe040':'#ff5060';
    ctx.lineWidth=Math.max(2,u*0.18);
    ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=u*1.8;
    ctx.beginPath();
    ctx.arc(fp.x,fp.y-u*3.6,u*(3.2+B.charge*1.6),0,6.2832);
    ctx.stroke();
    ctx.shadowBlur=0;
  }
  /* 突進の予兆（赤い軌跡） */
  if(B.lungeT>0){
    ctx.globalAlpha=a*0.5;
    ctx.strokeStyle='#e8443c';
    ctx.lineWidth=Math.max(2,u*0.2);
    ctx.shadowColor='rgba(232,68,60,.9)'; ctx.shadowBlur=u*1.2;
    var tp=proj(G.x,GROUND+1,0);
    ctx.beginPath();
    ctx.moveTo(fp.x,fp.y-u*2.5);
    ctx.lineTo(tp.x,tp.y);
    ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

/* ============================================================
   ループ / 終了
   ============================================================ */
function loop(t){
  raf=requestAnimationFrame(loop);
  if(!checkOrient()) { lastT=0; return; }
  if(!lastT) lastT=t;
  var dt=(t-lastT)/1000; lastT=t;
  if(dt>0.05) dt=0.05;
  if(G && !G.done){
    if(PHASE==='run') stepRun(dt);
    else if(G.B) stepBoss(dt);
  }
  if(G){
    drawRun();          // ボス戦も同じ画面構成で描く
    updRoad();
  }
}

function end(win){
  if(!G||G.done) return;
  G.done=true;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  ready.classList.add('hidden');
  bossBox.style.display='none';
  aura.style.opacity=0;
  setControls('none');
  roadEl.classList.remove('on'); roadEl.classList.remove('boss');
  bQuit.classList.remove('on'); bQuit.classList.remove('boss');
  PHASE='run';
  lockOrient('portrait');
  rotEl.style.display='none';
  barBox.style.display='block';
  var sec=G.t0?((Date.now()-G.t0)/1000).toFixed(1):'0.0';
  var et=document.getElementById('eTitle');
  et.textContent=win?'討 伐':'落 命';
  et.className='big '+(win?'ok':'ng');
  document.getElementById('eVerdict').textContent=win?'夜 を 越 え た り':'鬼 の 牙 に 落 つ';
  document.getElementById('sCourse').textContent=G.L.key;
  document.getElementById('sKill').textContent=G.kills+'体';
  document.getElementById('sTime').textContent=sec+'s';
  pEnd.classList.remove('hidden');
}

   ============================================================ */
var kL=0,kR=0,dragX=null;
var bL=0,bR=0,bU=0,bD=0;   // ボス戦の十字

/* ---------- 傾き感応（左右移動） ----------
   縦持ち: gamma（左右の倒し）で左右
   横持ち(ボス戦): beta が左右に対応（向きによって符号反転）    */
var Tilt={active:false,granted:false,base:null,x:0,lastEvent:0};
var SENS=14;   // 約14度で端まで
function onOrient(e){
  if(e.beta===null && e.gamma===null && e.alpha===null) return;
  Tilt.active=true; Tilt.lastEvent=Date.now();
  var beta=(e.beta===null?0:e.beta);
  var gamma=(e.gamma===null?0:e.gamma);

  // 端末の向きに応じて「左右方向の傾き」を選ぶ
  var ori=0;
  if(typeof screen!=='undefined' && screen.orientation && typeof screen.orientation.angle==='number')
    ori=screen.orientation.angle;
  else if(typeof window.orientation==='number') ori=window.orientation;
  if(ori<0) ori+=360;

  var raw;
  if(ori===90)       raw = -beta;   // 横持ち（左に回した）
  else if(ori===270) raw =  beta;   // 横持ち（右に回した）
  else if(ori===180) raw = -gamma;  // 逆さ縦
  else               raw =  gamma;  // 通常の縦持ち

  if(Tilt.base===null || Tilt.baseOri!==ori){ Tilt.base=raw; Tilt.baseOri=ori; }
  var d=raw-Tilt.base;
  var nx=Math.max(-1,Math.min(1,d/SENS));
  if(Math.abs(nx)<0.06) nx=0;        // 遊び
  Tilt.x=nx;
}
function attachTilt(){
  window.addEventListener('deviceorientation',onOrient,true);
  window.addEventListener('deviceorientationabsolute',onOrient,true);
}
function needsPermission(){
  return typeof DeviceOrientationEvent!=='undefined' &&
         typeof DeviceOrientationEvent.requestPermission==='function';
}
/* iOS は「ユーザー操作の中で」許可を求める必要がある */
function requestTilt(cb){
  if(Tilt.granted){ if(cb)cb(); return; }
  if(needsPermission()){
    DeviceOrientationEvent.requestPermission().then(function(r){
      if(r==='granted'){ Tilt.granted=true; Tilt.base=null; attachTilt(); }
      if(cb)cb();
    }).catch(function(){ if(cb)cb(); });
  }else{
    Tilt.granted=true; Tilt.base=null; attachTilt();
    if(cb)cb();
  }
}
if(!needsPermission()) attachTilt();
// 向きが変わったら中心を取り直す
window.addEventListener('orientationchange',function(){
  setTimeout(function(){ Tilt.base=null; },350);
});
// イベントが途絶えたら非アクティブに（ドラッグ操作へ自動フォールバック）
setInterval(function(){
  if(Tilt.active && Date.now()-Tilt.lastEvent>3000) Tilt.active=false;
},1000);

window.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'){ kL=1; bL=1; }
  if(e.key==='ArrowRight'){ kR=1; bR=1; }
  if(e.key==='ArrowUp'){ bU=1; doJump(); }
  if(e.key==='ArrowDown'){ bD=1; }
  if(e.code==='Space'||e.key===' '){ e.preventDefault(); doSlash(); }
  if(e.key==='Shift'||e.key==='x'||e.key==='X'){ doOugi(); }
  if(e.key==='z'||e.key==='Z'){ doJump(); }
});
window.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'){ kL=0; bL=0; }
  if(e.key==='ArrowRight'){ kR=0; bR=0; }
  if(e.key==='ArrowUp'){ bU=0; }
  if(e.key==='ArrowDown'){ bD=0; }
});

  dragX=Math.max(-1,Math.min(1,dragX));

},{passive:false});

  if(t.clientX>window.innerWidth*0.60) return;
  dragX=(t.clientX/(window.innerWidth*0.60)-0.5)*2;

},{passive:true});

});

/* ボタン共通：押下 / 離す */
function press(el,down,up){
  el.addEventListener('touchstart',function(e){e.preventDefault();down();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();if(up)up();},{passive:false});
  el.addEventListener('touchcancel',function(e){if(up)up();},{passive:true});
  el.addEventListener('mousedown',function(e){e.preventDefault();down();});
  window.addEventListener('mouseup',function(){if(up)up();});
}
function tap(el,fn){
  el.addEventListener('touchstart',function(e){e.preventDefault();fn();},{passive:false});
  el.addEventListener('click',function(e){e.preventDefault();fn();});
}

   道程（ロードマップ）
   ============================================================ */
var roadEl=document.getElementById('road'),
    roadFill=document.getElementById('roadFill'),
    roadNodes=document.getElementById('roadNodes'),
    rMeWrap=document.getElementById('rMeWrap'),
    bQuit=document.getElementById('bQuit');

var CHECKPOINTS=[
  {p:0.00, n:'出立'},
  {p:0.25, n:'一里塚'},
  {p:0.50, n:'中程'},
  {p:0.75, n:'三里塚'},
  {p:1.00, n:'鬼門', goal:true}
];
function buildRoad(){
  roadNodes.innerHTML='';
  for(var i=0;i<CHECKPOINTS.length;i++){
    var c=CHECKPOINTS[i];
    var nd=document.createElement('div');
    nd.className='rnode'+(c.goal?' goal':'');
    nd.style.bottom=(c.p*100)+'%';
    roadNodes.appendChild(nd);
    var lb=document.createElement('div');
    lb.className='rlab'+(c.goal?' goal':'');
    lb.style.bottom=(c.p*100)+'%';
    lb.textContent=c.n;
    roadNodes.appendChild(lb);
  }
  roadEl.classList.add('on');
}
function updRoad(){
  if(!G) return;
  var r = (PHASE==='boss') ? 1 : Math.max(0,Math.min(1, G.dist/G.L.goal));
  roadFill.style.height=(r*100)+'%';
  rMeWrap.style.bottom=(r*100)+'%';
  var nds=roadNodes.querySelectorAll('.rnode');
  var lbs=roadNodes.querySelectorAll('.rlab');
  for(var i=0;i<nds.length;i++){
    var c=CHECKPOINTS[i];
    // 鬼門はボスを討ってはじめて「踏破」
    var done = c.goal ? (PHASE==='boss' && G.B && G.B.dead) : (r>=c.p-0.001);
    if(done){ nds[i].classList.add('done'); lbs[i].classList.add('done'); }
    else    { nds[i].classList.remove('done'); lbs[i].classList.remove('done'); }
  }
  rMeWrap.textContent = (PHASE==='boss') ? '⚔' : '◆';
}

  roadEl.classList.remove('on'); roadEl.classList.remove('boss');
  bQuit.classList.remove('on'); bQuit.classList.remove('boss');
  barBox.style.display='block';
  barIn.style.width='0%';
  pEnd.classList.add('hidden');
  pTitle.classList.remove('hidden');
}

var btns=document.querySelectorAll('.lv button');
for(var b=0;b<btns.length;b++){
  (function(btn){
    bind(btn,function(){
      // iOS は必ずユーザー操作の中で許可を求める
      requestTilt(function(){
        Tilt.base=null;
        start(parseInt(btn.getAttribute('data-lv'),10));
      });
    });
  })(btns[b]);
}
bind(document.getElementById('bRetry'),function(){ start(G.lv); });
bind(document.getElementById('bMenu'), toTitle);

/* 中断：ゲーム中いつでも夜を選び直す（誤爆防止に二度押し） */
var quitArm=0, quitTimer=null;
bind(bQuit,function(){
  if(quitArm===0){
    quitArm=1;
    bQuit.textContent='本当に？ もう一度押す';
    if(quitTimer) clearTimeout(quitTimer);
    quitTimer=setTimeout(function(){
      quitArm=0; bQuit.textContent='夜を選び直す';
    },2200);
    return;
  }
  if(quitTimer) clearTimeout(quitTimer);
  quitArm=0; bQuit.textContent='夜を選び直す';
  toTitle();
});

/* ============================================================
   題字背景（アイドル）
   ============================================================ */
var iH=[], iL=[];
(function(){
  for(var z=-16;z>-FAR;z-=8){ if(Math.random()<0.8) iH.push(house(z)); }
  for(var i=0;i<16;i++) iL.push(lant());
})();
function idle(){
  requestAnimationFrame(idle);
  if(G) return;
  camX=0; camY=GROUND+4.5; camZ=8; camRoll=0;
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0812'); sky.addColorStop(0.42,'#161226'); sky.addColorStop(1,'#241a2e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  var mx=W*0.74,my=H*0.13,mr=Math.min(W,H)*0.09;
  var mg=ctx.createRadialGradient(mx,my,mr*0.3,mx,my,mr*3.2);
  mg.addColorStop(0,'rgba(255,190,140,.35)'); mg.addColorStop(1,'rgba(255,120,80,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e8c48a';
  ctx.beginPath(); ctx.arc(mx,my,mr,0,6.2832); ctx.fill();

  var horY=proj(0,GROUND,-FAR).y;
  var gg=ctx.createLinearGradient(0,horY,0,H);
  gg.addColorStop(0,'#20182a'); gg.addColorStop(1,'#100c16');
  ctx.fillStyle=gg; ctx.fillRect(-20,horY-2,W+40,H-horY+40);

  var i;
  for(i=iH.length-1;i>=0;i--){
    iH[i].z+=0.28;
    if(iH[i].z>14){ iH.splice(i,1); iH.push(house(-FAR)); }
  }
  for(i=0;i<iL.length;i++){
    iL[i].z+=0.28; iL[i].ph+=0.012;
    if(iL[i].z>14){ var nl=lant(); nl.z=-FAR; iL[i]=nl; }
  }
  var arr=iH.slice().sort(function(a,b){return a.z-b.z;});
  for(i=0;i<arr.length;i++){
    if(!vis(arr[i].z)) continue;
    var fd=1-(-(arr[i].z-camZ))/FAR;
    if(fd>0) drawHouse(arr[i],fd*0.9);
  }
  for(i=0;i<iL.length;i++){
    if(!vis(iL[i].z)) continue;
    var lf=1-(-(iL[i].z-camZ))/FAR;
    if(lf<=0) continue;
    var lp=proj(iL[i].x, iL[i].y+Math.sin(iL[i].ph)*0.8, iL[i].z);
    var lr=Math.max(1,lp.s*0.04);
    var gl=0.6+0.4*Math.sin(iL[i].ph*1.6);
    ctx.globalAlpha=Math.min(0.8,lf*1.3)*0.45*gl;
    var rg=ctx.createRadialGradient(lp.x,lp.y,0,lp.x,lp.y,lr*5);
    rg.addColorStop(0,'rgba(255,170,80,.8)'); rg.addColorStop(1,'rgba(255,140,50,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(lp.x,lp.y,lr*5,0,6.2832); ctx.fill();
    ctx.globalAlpha=Math.min(1,lf*1.3)*gl;
    ctx.fillStyle='#f0ae4a';
    ctx.beginPath(); ctx.ellipse(lp.x,lp.y,lr*0.75,lr,0,0,6.2832); ctx.fill();
    ctx.globalAlpha=1;
  }
}
idle();

})();
</script>
