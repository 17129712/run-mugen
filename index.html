<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>鬼夜行 — 鬼狩</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#08060a}
  body{font-family:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP",serif;
    color:#e8dfd0;font-feature-settings:"palt"}
  #cv{display:block;width:100%;height:100%;touch-action:none}

  .panel{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:22px 20px;overflow-y:auto;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(140,26,32,.28), transparent 62%),
      radial-gradient(100% 80% at 50% 118%, rgba(60,130,110,.16), transparent 60%),
      linear-gradient(180deg,#0d0910 0%,#150d14 46%,#0a070c 100%)}
  .panel::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.08;
    background-image:
      repeating-linear-gradient(90deg, rgba(232,223,208,.9) 0 1px, transparent 1px 52px),
      repeating-linear-gradient(0deg, rgba(232,223,208,.9) 0 1px, transparent 1px 52px)}
  .hidden{display:none!important}
  .card{position:relative;width:100%;max-width:352px;display:flex;flex-direction:column;gap:13px;z-index:1}

  .brand{display:flex;align-items:flex-start;gap:13px}
  .brand .vert{writing-mode:vertical-rl;font-size:11px;letter-spacing:.5em;
    color:#c48e32;font-weight:600;padding-top:3px;height:96px}
  .brand h1{font-size:40px;line-height:1.06;font-weight:700;letter-spacing:.1em;
    color:#f2e9da;text-shadow:0 0 26px rgba(196,142,50,.34)}
  .brand h1 em{font-style:normal;color:#c9302c;text-shadow:0 0 22px rgba(201,48,44,.6)}
  .brand .sub{margin-top:7px;font-size:11.5px;color:#9a8f80;line-height:1.85}
  .brand .sub b{color:#d9cdb8;font-weight:600}
  .brand .sub .r{color:#e8443c}
  .rule{height:1px;background:linear-gradient(90deg,#c9302c,rgba(201,48,44,.15) 55%,transparent);
    position:relative}
  .rule::after{content:"";position:absolute;left:0;top:-2px;width:5px;height:5px;
    background:#c9302c;transform:rotate(45deg)}

  .lv{display:flex;flex-direction:column;gap:7px}
  .lv .head{font-size:10px;letter-spacing:.42em;color:#7a6f60;font-weight:600}
  .lv button{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;
    border:1px solid rgba(196,142,50,.2);border-left:3px solid #c9302c;
    background:linear-gradient(100deg,rgba(232,223,208,.055),rgba(232,223,208,.018));
    color:#e8dfd0;transition:.2s;touch-action:manipulation;user-select:none;
    font-family:inherit;text-align:left}
  .lv button:active{transform:translateX(4px);
    background:linear-gradient(100deg,rgba(201,48,44,.18),rgba(232,223,208,.03))}
  .lv button[data-lv="1"]{border-left-color:#c48e32}
  .lv button[data-lv="2"]{border-left-color:#8c5a9e}
  .lv button[data-lv="3"]{border-left-color:#e8dfd0}
  .lv .kan{flex:0 0 30px;font-size:17px;font-weight:700;text-align:center;color:#c9302c;line-height:1}
  .lv button[data-lv="1"] .kan{color:#c48e32}
  .lv button[data-lv="2"] .kan{color:#b07ec4}
  .lv button[data-lv="3"] .kan{color:#f2e9da}
  .lv .txt{flex:1;min-width:0}
  .lv .nm{font-size:13px;font-weight:700;letter-spacing:.16em}
  .lv .ds{font-size:9.5px;color:#8d8274;margin-top:2px;
    font-family:-apple-system,"Hiragino Sans",sans-serif}
  .lv .arw{color:#5d5449;font-size:12px}

  .btn{padding:11px 18px;border:none;font-size:12px;font-weight:700;letter-spacing:.18em;
    cursor:pointer;touch-action:manipulation;user-select:none;transition:.2s;width:100%;
    font-family:inherit}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:#c9302c;color:#f2e9da;box-shadow:0 0 22px rgba(201,48,44,.4)}
  .btn.ghost{background:transparent;border:1px solid rgba(232,223,208,.16);color:#8d8274}
  .foot{font-size:9.5px;color:#6e6558;line-height:1.8;
    font-family:-apple-system,"Hiragino Sans",sans-serif}
  .foot b{color:#9a8f80;font-weight:600}
  .foot .r{color:#c9302c;font-weight:600}

  #pEnd .card{align-items:center;text-align:center;gap:14px}
  .verdict{font-size:10px;letter-spacing:.5em;color:#7a6f60;font-weight:600}
  .big{font-size:50px;font-weight:700;letter-spacing:.16em;line-height:1}
  .ok{color:#c48e32;text-shadow:0 0 34px rgba(196,142,50,.6)}
  .ng{color:#c9302c;text-shadow:0 0 34px rgba(201,48,44,.6)}
  .stats{display:flex;border-top:1px solid rgba(196,142,50,.22);
    border-bottom:1px solid rgba(196,142,50,.22);width:100%}
  .stats div{flex:1;padding:11px 4px;text-align:center}
  .stats div+div{border-left:1px solid rgba(196,142,50,.15)}
  .stats .k{font-size:8.5px;letter-spacing:.25em;color:#6e6558;font-weight:600}
  .stats .v{font-size:18px;font-weight:700;color:#e8dfd0;margin-top:4px;
    font-variant-numeric:tabular-nums}

  #hud{position:fixed;top:0;left:0;right:0;padding:12px 14px 0;z-index:5;
    display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
  .hcell{background:rgba(10,7,12,.55);-webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);border:1px solid rgba(196,142,50,.24);padding:5px 9px}
  .hk{font-size:8px;letter-spacing:.28em;color:rgba(196,142,50,.65);font-weight:600}
  .hv{font-size:13px;font-weight:700;color:#f2e9da;font-variant-numeric:tabular-nums;margin-top:2px}
  #hLv .hv{color:#c48e32;font-size:11px;letter-spacing:.16em}
  #hHp .hv{color:#c9302c;letter-spacing:2px;text-shadow:0 0 10px rgba(201,48,44,.6)}
  #bar{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(232,223,208,.1);z-index:6}
  #barIn{height:100%;width:0;background:linear-gradient(90deg,#c9302c,#c48e32);
    box-shadow:0 0 10px rgba(196,142,50,.7)}

  /* ボスHP */
  #boss{position:fixed;top:52px;left:14px;right:14px;z-index:6;display:none}
  #bossName{font-size:11px;letter-spacing:.3em;color:#e8443c;text-align:center;
    margin-bottom:4px;text-shadow:0 0 12px rgba(232,68,60,.8)}
  #bossBar{height:6px;background:rgba(10,7,12,.7);border:1px solid rgba(232,68,60,.5)}
  #bossIn{height:100%;width:100%;background:linear-gradient(90deg,#8c1a20,#e8443c);
    box-shadow:0 0 12px rgba(232,68,60,.9);transition:width .18s}

  /* ===== 操作ボタン群 ===== */
  .ctl{position:fixed;z-index:6;display:none;touch-action:none;user-select:none;
    align-items:center;justify-content:center;border-radius:50%;
    font-weight:700;color:#f2e9da;cursor:pointer}
  .ctl.on{display:flex}

  #slash{right:20px;bottom:24px;width:80px;height:80px;font-size:26px;
    border:2px solid rgba(196,142,50,.6);
    background:radial-gradient(circle at 40% 35%, rgba(232,223,208,.22), rgba(140,26,32,.55));
    text-shadow:0 0 12px rgba(232,223,208,.9);
    box-shadow:0 0 22px rgba(201,48,44,.4)}
  #slash:active{transform:scale(.9)}
  #slash.cool{opacity:.35}

  /* 必殺技 */
  #ougi{right:104px;bottom:64px;width:66px;height:66px;font-size:19px;
    border:2px solid rgba(120,220,255,.55);
    background:radial-gradient(circle at 40% 35%, rgba(200,245,255,.3), rgba(30,80,140,.6));
    color:#dff4ff;text-shadow:0 0 14px rgba(160,230,255,1);
    box-shadow:0 0 26px rgba(90,190,255,.45);flex-direction:column;gap:2px}
  #ougi:active{transform:scale(.9)}
  #ougi.notready{opacity:.4;filter:grayscale(.7)}
  #ougi.ready{animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(90,190,255,.4)}
    50%{box-shadow:0 0 40px rgba(140,230,255,.95)}}
  #ougiG{position:absolute;bottom:-14px;left:0;right:0;height:4px;
    background:rgba(10,7,12,.8);border:1px solid rgba(120,220,255,.5)}
  #ougiGIn{height:100%;width:0%;background:linear-gradient(90deg,#2f6a8f,#7fe0ff);
    box-shadow:0 0 8px rgba(140,230,255,.9)}
  #ougi .lb{font-size:8px;letter-spacing:.1em;color:#9fd8f0}

  /* ジャンプ（縦走行） */
  #jump{left:20px;bottom:24px;width:72px;height:72px;font-size:20px;
    border:2px solid rgba(196,142,50,.45);
    background:radial-gradient(circle at 40% 35%, rgba(232,223,208,.16), rgba(50,40,60,.6))}
  #jump:active{transform:scale(.9)}

  /* ボス戦：横向き用の移動十字 */
  #dpad{position:fixed;left:18px;bottom:18px;z-index:6;display:none;
    width:150px;height:96px}
  #dpad.on{display:block}
  .dbtn{position:absolute;display:flex;align-items:center;justify-content:center;
    width:48px;height:48px;font-size:17px;font-weight:700;color:#e8dfd0;
    border:1px solid rgba(196,142,50,.45);background:rgba(20,14,22,.55);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    touch-action:none;user-select:none;cursor:pointer}
  .dbtn:active,.dbtn.hold{background:rgba(201,48,44,.5);color:#fff}
  #dLeft{left:0;bottom:0}
  #dRight{left:96px;bottom:0}
  #dUp{left:48px;bottom:48px}
  #dDown{left:48px;bottom:0}

  #flash{position:fixed;inset:0;background:#c9302c;opacity:0;pointer-events:none;
    z-index:7;transition:opacity .1s}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(120% 90% at 50% 50%, transparent 46%, rgba(8,6,10,.75) 100%)}
  #aura{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;
    background:radial-gradient(120% 90% at 50% 50%, transparent 40%, rgba(160,10,20,.55) 100%);
    transition:opacity .3s}

  #ready{position:fixed;inset:0;z-index:8;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none}
  #readyN{font-size:92px;font-weight:700;color:#c48e32;letter-spacing:.1em;
    text-shadow:0 0 44px rgba(196,142,50,.8)}
  #readyT{font-size:12px;letter-spacing:.5em;color:#e8dfd0;margin-top:8px;
    text-shadow:0 0 12px rgba(0,0,0,.9)}

  #telop{position:fixed;left:0;right:0;top:34%;z-index:8;text-align:center;
    pointer-events:none;opacity:0;transition:opacity .35s}
  #telop .t1{font-size:13px;letter-spacing:.6em;color:#e8443c;
    text-shadow:0 0 18px rgba(232,68,60,.9)}
  #telop .t2{font-size:38px;font-weight:700;letter-spacing:.14em;color:#f2e9da;
    margin-top:6px;text-shadow:0 0 30px rgba(232,68,60,.8)}

  #rot{position:fixed;inset:0;z-index:99;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;background:#0a070c;
    text-align:center;padding:30px}
  #rot .icn{font-size:50px;color:#c48e32;animation:tw 1.6s ease-in-out infinite}
  @keyframes tw{0%,100%{transform:rotate(-90deg)}50%{transform:rotate(0)}}
  #rot p{font-size:14px;color:#e8dfd0;letter-spacing:.2em;line-height:2}
  #rot small{font-size:11px;color:#7a6f60;font-family:-apple-system,sans-serif;letter-spacing:0}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="vig"></div>
<div id="aura"></div>
<div id="flash"></div>
<div id="bar"><div id="barIn"></div></div>
<div id="hud">
  <div class="hcell" id="hDist"><div class="hk">距離</div><div class="hv">0 m</div></div>
  <div class="hcell" id="hLv"><div class="hk">夜</div><div class="hv">—</div></div>
  <div class="hcell" id="hHp"><div class="hk">命</div><div class="hv">❖❖❖❖</div></div>
</div>
<div id="boss">
  <div id="bossName">上 弦 の 鬼</div>
  <div id="bossBar"><div id="bossIn"></div></div>
</div>

<div id="dpad">
  <div class="dbtn" id="dLeft">◀</div>
  <div class="dbtn" id="dRight">▶</div>
  <div class="dbtn" id="dUp">▲</div>
  <div class="dbtn" id="dDown">▼</div>
</div>
<div class="ctl" id="jump">跳</div>
<div class="ctl" id="ougi">奥義<div class="lb">必殺</div><div id="ougiG"><div id="ougiGIn"></div></div></div>
<div class="ctl" id="slash">斬</div>

<div id="telop"><div class="t1">—</div><div class="t2">—</div></div>
<div id="ready" class="hidden"><div id="readyN">参</div><div id="readyT">構 え よ</div></div>

<div id="rot">
  <div class="icn">▯</div>
  <p id="rotMsg">端 末 を 縦 に</p>
  <small id="rotSub">道中は縦持ち。ボス戦は横持ちに切り替わります。</small>
</div>

<div class="panel" id="pTitle">
  <div class="card">
    <div class="brand">
      <div class="vert">刃 を 執 り て</div>
      <div>
        <h1>鬼<em>夜行</em></h1>
        <div class="sub">
          闇に沈む大正の街を、<b>鬼狩り</b>が駆け抜ける。<br>
          <b>斬</b>で祓い、溜まれば<b>奥義</b>を放て。<br>
          <span class="r">道の果てには鬼が待つ</span>。討ち取り、出口へ。
        </div>
      </div>
    </div>
    <div class="rule"></div>

    <div class="lv">
      <div class="head">夜 を 選 べ</div>
      <button type="button" data-lv="0">
        <div class="kan">壱</div>
        <div class="txt"><div class="nm">宵 の 口</div>
          <div class="ds">緩やか / 鬼少なし / 命 5</div></div>
        <div class="arw">▸</div>
      </button>
      <button type="button" data-lv="1">
        <div class="kan">弐</div>
        <div class="txt"><div class="nm">丑 三 つ</div>
          <div class="ds">常の速さ / 鬼増える / 命 4</div></div>
        <div class="arw">▸</div>
      </button>
      <button type="button" data-lv="2">
        <div class="kan">参</div>
        <div class="txt"><div class="nm">暁 闇</div>
          <div class="ds">疾し / 攻撃激し / 命 4</div></div>
        <div class="arw">▸</div>
      </button>
      <button type="button" data-lv="3">
        <div class="kan">終</div>
        <div class="txt"><div class="nm">無 明</div>
          <div class="ds">奔流 / 鬼の巣窟 / 命 3</div></div>
        <div class="arw">▸</div>
      </button>
    </div>

    <div class="foot">
      道中は<b>縦持ち</b>。<span class="r">斬</span>で鬼を斬り、<b>跳</b>で跳ぶ。<br>
      鬼を斬るほど<b>奥義</b>の気が溜まる。満ちたら放て。<br>
      ゴール手前で<b>ボス戦</b>。<b>端末を横に</b>して十字で戦え。
    </div>
  </div>
</div>

<div class="panel hidden" id="pEnd">
  <div class="card">
    <div class="verdict" id="eVerdict">結 果</div>
    <div class="big" id="eTitle">討 伐</div>
    <div class="stats">
      <div><div class="k">夜</div><div class="v" id="sCourse">—</div></div>
      <div><div class="k">討</div><div class="v" id="sKill">—</div></div>
      <div><div class="k">刻</div><div class="v" id="sTime">—</div></div>
    </div>
    <button type="button" class="btn primary" id="bRetry">再 び 挑 む</button>
    <button type="button" class="btn ghost" id="bMenu">夜 を 選 び 直 す</button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ============================================================
   鬼夜行 — 鬼狩り
   PHASE 'run'  : 縦持ち・疑似3D、駆け抜けながら鬼を斬る
   PHASE 'boss' : 横持ち固定・2Dアクション、移動十字でボス戦
   ============================================================ */

var PHASE='run';   // 'run' | 'boss'

/* ---------- 画面向き ---------- */
function lockOrient(o){
  try{ if(screen.orientation && screen.orientation.lock) screen.orientation.lock(o).catch(function(){}); }catch(e){}
}
var rotEl=document.getElementById('rot'),
    rotMsg=document.getElementById('rotMsg'),
    rotSub=document.getElementById('rotSub');
function checkOrient(){
  var ls=window.innerWidth>window.innerHeight;
  var want = (PHASE==='boss') ? 'landscape' : 'portrait';
  var ok = (want==='landscape') ? ls : !ls;
  if(!ok){
    if(want==='landscape'){
      rotMsg.textContent='端 末 を 横 に';
      rotSub.textContent='ボス戦は横持ち専用です。';
    }else{
      rotMsg.textContent='端 末 を 縦 に';
      rotSub.textContent='道中は縦持ち専用です。';
    }
    rotEl.style.display='flex';
  }else rotEl.style.display='none';
  return ok;
}
window.addEventListener('resize',checkOrient);
window.addEventListener('orientationchange',function(){setTimeout(function(){checkOrient();resize();},250);});

/* ---------- 描画基盤 ---------- */
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
var W=0,H=0,CX=0,CY=0,FOV=520;
function resize(){
  var dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.floor(W*dpr); cv.height=Math.floor(H*dpr);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  CX=W/2; CY=H*0.52;
  FOV=Math.max(400,Math.min(W,H)*1.0);
}
window.addEventListener('resize',resize);
resize();
checkOrient();

/* ---------- 世界（道中） ---------- */
var LANE=9;           // 走路の半幅
var GROUND=0;         // 地面
var FAR=260;
var TOP_Y=14;

var LEVELS=[
 {key:'宵の口', speed:30, goal:1600, hDens:9,  oniRate:2.4, oniHP:1, atkRate:2.8, hp:5,
  bossHP:60,  bossName:'下 弦 の 鬼', bossSpd:1.0},
 {key:'丑三つ', speed:38, goal:2200, hDens:8,  oniRate:1.9, oniHP:1, atkRate:2.2, hp:4,
  bossHP:90,  bossName:'上 弦 の 鬼', bossSpd:1.2},
 {key:'暁闇',   speed:46, goal:2800, hDens:7,  oniRate:1.5, oniHP:2, atkRate:1.7, hp:4,
  bossHP:130, bossName:'上 弦 の 参', bossSpd:1.45},
 {key:'無明',   speed:56, goal:3400, hDens:6,  oniRate:1.1, oniHP:2, atkRate:1.3, hp:3,
  bossHP:180, bossName:'無 明 の 鬼', bossSpd:1.7}
];

var camX=0,camY=0,camZ=0,camRoll=0;
function proj(x,y,z){
  var rx=x-camX, ry=y-camY, rz=z-camZ;
  var d=-rz; if(d<1) d=1;
  var s=FOV/d;
  var c=Math.cos(camRoll), si=Math.sin(camRoll);
  var px=rx*s, py=-ry*s;
  return {x:CX+px*c-py*si, y:CY+px*si+py*c, s:s, d:d};
}
function vis(z){ return z-camZ<-1; }

/* ---------- DOM ---------- */
var hDistV=document.querySelector('#hDist .hv'),
    hLvV=document.querySelector('#hLv .hv'),
    hHpV=document.querySelector('#hHp .hv'),
    hDistK=document.querySelector('#hDist .hk'),
    barIn=document.getElementById('barIn'),
    barBox=document.getElementById('bar'),
    flash=document.getElementById('flash'),
    aura=document.getElementById('aura'),
    pTitle=document.getElementById('pTitle'),
    pEnd=document.getElementById('pEnd'),
    ready=document.getElementById('ready'),
    readyN=document.getElementById('readyN'),
    readyT=document.getElementById('readyT'),
    telop=document.getElementById('telop'),
    bossBox=document.getElementById('boss'),
    bossIn=document.getElementById('bossIn'),
    bossNameEl=document.getElementById('bossName'),
    slashBtn=document.getElementById('slash'),
    ougiBtn=document.getElementById('ougi'),
    ougiGIn=document.getElementById('ougiGIn'),
    jumpBtn=document.getElementById('jump'),
    dpad=document.getElementById('dpad');

var G=null,raf=null,lastT=0;

function showTelop(t1,t2,dur){
  telop.querySelector('.t1').textContent=t1;
  telop.querySelector('.t2').textContent=t2;
  telop.style.opacity=1;
  setTimeout(function(){ telop.style.opacity=0; }, dur||1800);
}

/* ============================================================
   生成
   ============================================================ */
var WALLS=[
  {w:'#3a2f2a', wood:'#6b4a33', roof:'#2c3138'},
  {w:'#332b28', wood:'#5c3f2c', roof:'#282d34'},
  {w:'#3e332c', wood:'#75523a', roof:'#31363e'},
  {w:'#2f2724', wood:'#54382a', roof:'#252a31'}
];
function house(z){
  var side=Math.random()<0.5?-1:1;
  var x=side*(LANE+2.5+Math.random()*10);
  var w=5+Math.random()*6;
  var d=w*(0.9+Math.random()*0.5);
  var h=6+Math.random()*10;
  if(Math.random()<0.18) h=14+Math.random()*10;
  var col=WALLS[Math.floor(Math.random()*WALLS.length)];
  return {x:x,z:z,w:w,d:d,h:h,col:col,
          cols:Math.max(2,Math.round(w/2)),
          floors:h>12?2:1, lantern:Math.random()<0.5, ph:Math.random()*6.28};
}
function lant(){
  return {x:(Math.random()-0.5)*40, y:GROUND+3+Math.random()*14,
          z:-Math.random()*FAR, ph:Math.random()*6.28, sp:0.5+Math.random()*0.8};
}
/* 道中の鬼：地を這い、走ってくる。斬る/避ける */
function oni(L,z){
  var t=Math.random();
  var type = t<0.45?'grunt' : (t<0.75?'spitter' : 'leaper');
  return {
    x:(Math.random()*2-1)*(LANE-1.5),
    y:GROUND, z:z,
    hp:L.oniHP, maxhp:L.oniHP,
    type:type, ph:Math.random()*6.28,
    amp:0.8+Math.random()*1.6,
    cd:1.0+Math.random()*L.atkRate,
    dead:false, deadT:0,
    r:1.5+Math.random()*0.5,
    charge:0, vy:0, air:false
  };
}
/* 障害物（地面の瓦礫）— 跳んで越える */
function block(z){
  return {x:(Math.random()*2-1)*(LANE-1.6), z:z,
          w:2.0+Math.random()*2.2, h:1.5+Math.random()*1.3};
}
/* 飛び道具 */
function projFire(x,y,z){ return {kind:'fire',x:x,y:y,z:z,vx:0,vy:0,vz:40,r:1.1,life:7,ph:0}; }
function projSlash(x,y,z,vx,vy,vz){ return {kind:'slash',x:x,y:y,z:z,vx:vx,vy:vy,vz:vz,r:1.4,life:6,rot:0}; }

function spark(x,y,z,col,n){
  for(var i=0;i<n;i++){
    G.parts.push({x:x,y:y,z:z,
      vx:(Math.random()-.5)*16, vy:Math.random()*14, vz:(Math.random()-.5)*12,
      life:0.4+Math.random()*0.5, col:col, r:0.2+Math.random()*0.4});
  }
}

/* ============================================================
   開始
   ============================================================ */
function start(lv){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  PHASE='run';
  lockOrient('portrait');
  var L=LEVELS[lv];
  G={lv:lv,L:L,
     // 走者
     x:0,y:GROUND,vx:0,vy:0,onGround:true,
     dist:0,hp:L.hp,maxhp:L.hp,inv:0,
     houses:[],lants:[],onis:[],blocks:[],projs:[],parts:[],
     nextH:0,nextO:120,nextB:200,
     done:false,shake:0,t0:0,lean:0,run:0,
     kills:0, countdown:3.0, started:false,
     slashT:0,slashCD:0,slashArc:1,
     ougi:0, ougiMax:100, ougiT:0,   // 必殺技ゲージ
     B:null                            // ボス戦ステート
  };
  for(var z=-16; z>-FAR; z-=L.hDens){
    if(Math.random()<0.85) G.houses.push(house(z));
  }
  for(var i=0;i<18;i++) G.lants.push(lant());
  for(var b=-90; b>-FAR; b-=40+Math.random()*40) G.blocks.push(block(b));

  hLvV.textContent=L.key;
  hDistK.textContent='距離';
  hHpV.textContent=new Array(L.hp+1).join('❖');
  barBox.style.display='block';
  barIn.style.width='0%';
  bossBox.style.display='none';
  aura.style.opacity=0;
  pTitle.classList.add('hidden'); pEnd.classList.add('hidden');
  ready.classList.remove('hidden');
  setControls('run');
  updOugi();
  lastT=0; raf=requestAnimationFrame(loop);
}

/* コントロール表示切替 */
function setControls(mode){
  if(mode==='none'){
    slashBtn.classList.remove('on');
    ougiBtn.classList.remove('on');
    jumpBtn.classList.remove('on');
    dpad.classList.remove('on');
    return;
  }
  slashBtn.classList.add('on');
  ougiBtn.classList.add('on');
  if(mode==='run'){ jumpBtn.classList.add('on'); dpad.classList.remove('on'); }
  else            { jumpBtn.classList.remove('on'); dpad.classList.add('on'); }
}

function updOugi(){
  var r=G.ougi/G.ougiMax;
  ougiGIn.style.width=Math.min(100,r*100)+'%';
  if(G.ougi>=G.ougiMax){ ougiBtn.classList.add('ready'); ougiBtn.classList.remove('notready'); }
  else { ougiBtn.classList.remove('ready'); ougiBtn.classList.add('notready'); }
}
function gainOugi(n){
  if(!G) return;
  G.ougi=Math.min(G.ougiMax,G.ougi+n);
  updOugi();
}

function hit(dmg){
  if(!G||G.inv>0||G.done||!G.started)return;
  G.hp-=(dmg||1); G.inv=1.4; G.shake=22;
  hHpV.textContent=new Array(Math.max(0,G.hp)+1).join('❖');
  flash.style.opacity=.55;
  setTimeout(function(){flash.style.opacity=0;},100);
  if(G.hp<=0) end(false);
}

/* ============================================================
   斬撃 / 必殺技
   ============================================================ */
function doSlash(){
  if(!G||G.done||!G.started) return;
  if(G.slashCD>0) return;
  G.slashT=0.20; G.slashCD=0.30;
  G.slashArc=-G.slashArc;
  slashBtn.classList.add('cool');

  if(PHASE==='run') slashRun();
  else              slashBoss();
}

function slashRun(){
  var i;
  var RZ=[-13,2], RR=5.2;
  for(i=G.projs.length-1;i>=0;i--){
    var p=G.projs[i];
    if(p.z<RZ[0]||p.z>RZ[1]) continue;
    var dx=p.x-G.x, dy=p.y-(G.y+1.6);
    if(Math.sqrt(dx*dx+dy*dy)<RR){
      spark(p.x,p.y,p.z,'#ffd07a',12);
      G.projs.splice(i,1);
      gainOugi(3);
    }
  }
  for(i=G.onis.length-1;i>=0;i--){
    var o=G.onis[i];
    if(o.dead) continue;
    if(o.z<RZ[0]||o.z>RZ[1]) continue;
    var ox=o.x-G.x, oy=o.y-G.y;
    if(Math.sqrt(ox*ox+oy*oy)<RR+o.r){
      o.hp--;
      spark(o.x,o.y+1.5,o.z,'#e8443c',16);
      G.shake=Math.max(G.shake,6);
      if(o.hp<=0){
        o.dead=true; o.deadT=0.6; G.kills++;
        gainOugi(14);
        spark(o.x,o.y+1.5,o.z,'#ffd07a',10);
      } else gainOugi(5);
    }
  }
}

function doOugi(){
  if(!G||G.done||!G.started) return;
  if(G.ougi<G.ougiMax) return;
  G.ougi=0; updOugi();
  G.ougiT=0.9;
  G.shake=Math.max(G.shake,26);
  flash.style.background='#bfefff';
  flash.style.opacity=.7;
  setTimeout(function(){ flash.style.opacity=0;
    setTimeout(function(){flash.style.background='#c9302c';},150); },160);

  if(PHASE==='run'){
    showTelop('壱 ノ 型','円 舞',1300);
    var i;
    // 画面上の術を全て消す
    for(i=G.projs.length-1;i>=0;i--){
      spark(G.projs[i].x,G.projs[i].y,G.projs[i].z,'#bfefff',8);
      G.projs.splice(i,1);
    }
    // 前方の鬼を薙ぎ払う（大範囲・即死）
    for(i=G.onis.length-1;i>=0;i--){
      var o=G.onis[i];
      if(o.dead) continue;
      if(o.z<-90||o.z>6) continue;
      o.dead=true; o.deadT=0.6; G.kills++;
      spark(o.x,o.y+1.6,o.z,'#bfefff',18);
    }
  } else {
    showTelop('終 ノ 型','斬 鬼 一 閃',1400);
    var B=G.B;
    // 術を消す
    for(var k=B.projs.length-1;k>=0;k--) bspark(B.projs[k].x,B.projs[k].y,'#bfefff',10);
    B.projs.length=0;
    // 大ダメージ
    bossDamage(18, true);
    B.ougiFx=0.9;
  }
}

/* ============================================================
   ボス戦（横向き 2D アクション）
   座標系: 画面幅 = ステージ、x は 0..STAGE_W、y は 0 が地面（上が +）
   ============================================================ */
var STAGE_W=1000, STAGE_H=420, BGROUND=0;

function enterBoss(){
  PHASE='boss';
  lockOrient('landscape');
  var L=G.L;
  G.B={
    // 自機
    px:150, py:BGROUND, pvx:0, pvy:0, pground:true, pface:1,
    pcrouch:false,
    // ボス
    bx:750, by:BGROUND, bvx:0, bvy:0,
    hp:L.bossHP, maxhp:L.bossHP,
    cd:1.6, phase:0, charge:0, act:'', actT:0, ph:0,
    jumpLatch:false,
    dead:false, deadT:0, enrage:false,
    projs:[], parts:[], shocks:[],
    hitFx:0, ougiFx:0,
    intro:1.6, spd:L.bossSpd
  };
  bossBox.style.display='block';
  bossIn.style.width='100%';
  bossNameEl.textContent=L.bossName;
  barBox.style.display='none';
  aura.style.opacity=0.5;
  hDistK.textContent='鬼';
  hDistV.textContent='決 戦';
  setControls('boss');
  showTelop('道 を 塞 ぐ 者','鬼 、 現 る',2200);
  G.shake=30;
  resize();
}

function bspark(x,y,col,n){
  var B=G.B;
  for(var i=0;i<n;i++){
    B.parts.push({x:x,y:y,
      vx:(Math.random()-.5)*280, vy:Math.random()*260,
      life:0.35+Math.random()*0.5, col:col, r:2+Math.random()*4});
  }
}

function bossDamage(n, big){
  var B=G.B;
  if(B.dead) return;
  B.hp-=n;
  B.hitFx=0.18;
  bossIn.style.width=Math.max(0,B.hp/B.maxhp*100)+'%';
  bspark(B.bx, B.by+70, '#e8443c', big?26:10);
  G.shake=Math.max(G.shake, big?24:8);
  if(!B.enrage && B.hp<=B.maxhp*0.4){
    B.enrage=true;
    showTelop('鬼 、 猛 り 狂 う','血 鬼 術',1600);
    aura.style.opacity=0.75;
  }
  if(B.hp<=0){
    B.hp=0; B.dead=true; B.deadT=2.0;
    bossIn.style.width='0%';
    G.kills++;
    showTelop('鬼 を 討 ち 取 っ た り','斬 !!',2400);
    bspark(B.bx,B.by+70,'#ffd07a',60);
    G.shake=40;
  }
}

function slashBoss(){
  var B=G.B;
  if(B.dead) return;
  var reach=105, ax=B.px + B.pface*60;
  var ay=B.py+ (B.pcrouch?20:48);
  // ボスへ
  var bcx=B.bx, bcy=B.by+70;
  var bw=70, bh=140;
  if(Math.abs(ax-bcx) < reach*0.5 + bw*0.5 && Math.abs(ay-bcy) < bh*0.75){
    bossDamage(B.enrage?2:2);
    gainOugi(7);
  }
  // 弾を斬る
  for(var i=B.projs.length-1;i>=0;i--){
    var p=B.projs[i];
    if(p.kind==='shock') continue;
    if(Math.abs(p.x-ax)<reach*0.6 && Math.abs(p.y-ay)<70){
      bspark(p.x,p.y,'#ffd07a',10);
      B.projs.splice(i,1);
      gainOugi(6);
    }
  }
}

/* ボス弾 */
function bFire(x,y,vx,vy){ return {kind:'fire',x:x,y:y,vx:vx,vy:vy,r:16,life:5,ph:0}; }
function bBlade(x,y,vx){ return {kind:'blade',x:x,y:y,vx:vx,vy:0,r:20,life:5,rot:0}; }
function bShock(x,dir){ return {kind:'shock',x:x,y:0,vx:dir*430,vy:0,r:26,life:2.2}; }
function bRock(x){ return {kind:'rock',x:x,y:STAGE_H+40,vx:0,vy:-40,r:20,life:6,rot:0,spin:(Math.random()-.5)*8}; }

function stepBoss(dt){
  var B=G.B, L=G.L, i;

  if(B.intro>0){ B.intro-=dt; }

  /* --- 自機 --- */
  var mv=0;
  if(bL) mv-=1;
  if(bR) mv+=1;
  if(mv!==0) B.pface=mv;
  var SPD=330;
  B.pvx += (mv*SPD - B.pvx)*Math.min(1,dt*14);
  B.px += B.pvx*dt;
  if(B.px<40){B.px=40;B.pvx=0;}
  if(B.px>STAGE_W-40){B.px=STAGE_W-40;B.pvx=0;}

  B.pcrouch = (bD && B.pground);

  // ジャンプ（上ボタン）: 押しっぱなしでの連続ジャンプを防ぐ
  if(!bU) B.jumpLatch=false;
  if(bU && !B.jumpLatch && B.pground && B.intro<=0){
    B.pvy=520; B.pground=false; B.jumpLatch=true;
  }
  if(!B.pground){
    B.pvy -= 1500*dt;
    B.py += B.pvy*dt;
    if(B.py<=BGROUND){ B.py=BGROUND; B.pvy=0; B.pground=true; }
  }

  if(G.inv>0) G.inv-=dt;
  if(G.slashT>0) G.slashT-=dt;
  if(G.slashCD>0){ G.slashCD-=dt; if(G.slashCD<=0) slashBtn.classList.remove('cool'); }
  if(G.ougiT>0) G.ougiT-=dt;
  if(B.hitFx>0) B.hitFx-=dt;
  if(B.ougiFx>0) B.ougiFx-=dt;

  /* --- ボス AI --- */
  if(B.dead){
    B.deadT-=dt;
    if(B.deadT<=0){ end(true); return; }
    // 崩れ落ちる
    for(i=B.parts.length-1;i>=0;i--){
      var dp=B.parts[i];
      dp.life-=dt; if(dp.life<=0){B.parts.splice(i,1);continue;}
      dp.x+=dp.vx*dt; dp.y+=dp.vy*dt; dp.vy-=700*dt;
    }
    if(Math.random()<0.4) bspark(B.bx+(Math.random()-.5)*90, B.by+40+Math.random()*100,'#e8443c',3);
    return;
  }

  if(B.intro<=0){
    B.ph=(B.ph||0)+dt;
    var er = B.enrage?1.35:1.0;
    // 間合いを取りつつ移動
    var dx=B.px-B.bx;
    var want = (Math.abs(dx)<200) ? -Math.sign(dx)*1 : Math.sign(dx)*1;
    if(B.actT>0){ want=0; }
    B.bvx += (want*90*B.spd*er - B.bvx)*Math.min(1,dt*4);
    B.bx += B.bvx*dt;
    if(B.bx<80){B.bx=80;B.bvx=0;}
    if(B.bx>STAGE_W-80){B.bx=STAGE_W-80;B.bvx=0;}

    if(B.actT>0) B.actT-=dt;

    B.cd -= dt*er;
    if(B.cd<=0.55 && B.cd>0) B.charge=1-(B.cd/0.55);
    if(B.cd<=0){
      B.charge=0;
      B.phase=(B.phase+1+ (Math.random()<0.3?1:0))%4;
      B.cd = Math.max(0.75, (2.0 - (1-B.hp/B.maxhp)*0.9) / er);
      B.actT=0.45;
      var fdir = (B.px<B.bx)?-1:1;

      if(B.phase===0){
        // 血刃：水平に飛ぶ刃（跳んで避ける or 斬る）
        var n=B.enrage?3:2;
        for(i=0;i<n;i++){
          var bb=bBlade(B.bx+fdir*40, B.by+55+i*40, fdir*(380+i*40));
          B.projs.push(bb);
        }
        B.act='刃';
      } else if(B.phase===1){
        // 震脚：地を這う衝撃波（跳んで避ける）
        B.projs.push(bShock(B.bx, -1));
        B.projs.push(bShock(B.bx, 1));
        G.shake=Math.max(G.shake,16);
        B.act='震';
      } else if(B.phase===2){
        // 鬼火：追尾する火の玉（斬れる）
        var fc=B.enrage?3:2;
        for(i=0;i<fc;i++){
          var ang=Math.atan2((B.py+60)-(B.by+70), B.px-B.bx) + (i-(fc-1)/2)*0.28;
          var sp2=250;
          B.projs.push(bFire(B.bx, B.by+80, Math.cos(ang)*sp2, Math.sin(ang)*sp2));
        }
        B.act='炎';
      } else {
        // 瓦礫：上から降る（左右に避ける）
        var rc=B.enrage?6:4;
        for(i=0;i<rc;i++){
          B.projs.push(bRock(B.px+(Math.random()-.5)*300));
        }
        G.shake=Math.max(G.shake,10);
        B.act='礫';
      }
    }

    // 接触ダメージ
    if(Math.abs(B.px-B.bx)<60 && Math.abs((B.py+40)-(B.by+70))<90) hit(1);
  }

  /* --- ボスの弾 --- */
  for(i=B.projs.length-1;i>=0;i--){
    var p=B.projs[i];
    p.life-=dt;
    if(p.life<=0){ B.projs.splice(i,1); continue; }

    if(p.kind==='fire'){
      p.ph+=dt*8;
      var tx=B.px-p.x, ty=(B.py+50)-p.y;
      var dd=Math.max(1,Math.hypot(tx,ty));
      p.vx += tx/dd*220*dt;
      p.vy += ty/dd*220*dt;
      p.vx*=0.985; p.vy*=0.985;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    } else if(p.kind==='blade'){
      p.x+=p.vx*dt; p.rot+=dt*10;
    } else if(p.kind==='shock'){
      p.x+=p.vx*dt;
      p.y=0;
    } else if(p.kind==='rock'){
      p.vy-=900*dt;
      p.y+=p.vy*dt;
      p.rot+=p.spin*dt;
      if(p.y<-30){
        bspark(p.x,10,'#8a7a6a',8);
        G.shake=Math.max(G.shake,5);
        B.projs.splice(i,1); continue;
      }
    }
    if(p.x<-80||p.x>STAGE_W+80){ B.projs.splice(i,1); continue; }

    // 自機との当たり
    var phx=B.px, phy=B.py + (B.pcrouch?18:44);
    var pw=26, ph2=(B.pcrouch?30:48);
    if(p.kind==='shock'){
      // しゃがみ不可、ジャンプで避ける
      if(B.pground && Math.abs(p.x-B.px)<p.r+20){ hit(1); B.projs.splice(i,1); continue; }
    } else {
      if(Math.abs(p.x-phx)<p.r+pw && Math.abs(p.y-phy)<p.r+ph2){
        hit(1);
        B.projs.splice(i,1);
        continue;
      }
    }
  }

  /* --- 粒子 --- */
  for(i=B.parts.length-1;i>=0;i--){
    var pt=B.parts[i];
    pt.life-=dt;
    if(pt.life<=0){ B.parts.splice(i,1); continue; }
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy-=800*dt;
    pt.vx*=0.95;
  }
}

/* ============================================================
   道中 更新
   ============================================================ */
function stepRun(dt){
  var L=G.L,i;

  if(!G.started){
    G.countdown-=dt;
    var n=Math.ceil(G.countdown);
    var K=['','壱','弐','参'];
    if(n>0){ readyN.textContent=K[Math.min(3,n)]||String(n); readyT.textContent='構 え よ'; }
    else { readyN.textContent='駆'; readyT.textContent='征 け'; }
    if(G.countdown<=-0.45){
      G.started=true; G.t0=Date.now(); ready.classList.add('hidden');
    }
  }

  /* --- 横移動（傾き不要：左右スワイプ/ドラッグ or キー、画面左半分ドラッグ） --- */
  var ix=0;
  if(dragX!==null) ix=dragX;
  if(kL||kR){
    G.keyX=(G.keyX||0)+(((kR?1:0)-(kL?1:0)))*dt*2.4;
    G.keyX=Math.max(-1,Math.min(1,G.keyX));
    ix=G.keyX;
  }
  var tx=ix*(LANE-1.2);
  var k=120, dmp=19;
  G.vx += ((tx-G.x)*k - G.vx*dmp)*dt;
  G.vx=Math.max(-52,Math.min(52,G.vx));
  G.x += G.vx*dt;
  if(G.x<-LANE+0.8){G.x=-LANE+0.8;G.vx=0;}
  if(G.x> LANE-0.8){G.x= LANE-0.8;G.vx=0;}
  G.lean += ((-G.vx*0.012)-G.lean)*0.2;

  /* --- ジャンプ・重力 --- */
  if(!G.onGround){
    G.vy -= 40*dt;
    G.y += G.vy*dt;
    if(G.y<=GROUND){ G.y=GROUND; G.vy=0; G.onGround=true; }
  }
  G.run += dt*(G.onGround?12:0);

  if(G.slashT>0) G.slashT-=dt;
  if(G.slashCD>0){ G.slashCD-=dt; if(G.slashCD<=0) slashBtn.classList.remove('cool'); }
  if(G.ougiT>0) G.ougiT-=dt;

  if(!G.started) return;

  var sp=L.speed*dt;
  G.dist+=sp;
  if(G.inv>0) G.inv-=dt;

  /* --- 家屋 --- */
  G.nextH-=sp;
  if(G.nextH<=0){
    G.houses.push(house(-FAR));
    if(Math.random()<0.5) G.houses.push(house(-FAR-Math.random()*8));
    G.nextH=L.hDens;
  }
  for(i=G.houses.length-1;i>=0;i--){
    G.houses[i].z+=sp;
    if(G.houses[i].z>14) G.houses.splice(i,1);
  }
  for(i=0;i<G.lants.length;i++){
    G.lants[i].z+=sp*0.9;
    G.lants[i].ph+=dt*G.lants[i].sp;
    if(G.lants[i].z>14){ var nl=lant(); nl.z=-FAR; G.lants[i]=nl; }
  }

  /* --- 障害物 --- */
  G.nextB-=sp;
  if(G.nextB<=0){
    G.blocks.push(block(-FAR));
    G.nextB=70+Math.random()*90;
  }
  for(i=G.blocks.length-1;i>=0;i--){
    var bl=G.blocks[i];
    bl.z+=sp;
    if(bl.z>-1.6 && bl.z<1.8){
      if(Math.abs(bl.x-G.x) < bl.w/2+1.0 && G.y < bl.h){
        hit(1);
        spark(bl.x,bl.h,bl.z,'#8a7a6a',12);
        G.blocks.splice(i,1); continue;
      }
    }
    if(bl.z>14) G.blocks.splice(i,1);
  }

  /* --- 鬼の出現（ボスゾーン手前まで） --- */
  var bossZone = L.goal;
  if(G.dist < bossZone-30){
    G.nextO-=sp;
    if(G.nextO<=0){
      G.onis.push(oni(L,-FAR+Math.random()*30));
      if(Math.random()<0.25) G.onis.push(oni(L,-FAR-10-Math.random()*20));
      G.nextO=L.oniRate*L.speed*0.9;
    }
  }

  /* --- 鬼 --- */
  for(i=G.onis.length-1;i>=0;i--){
    var o=G.onis[i];
    o.z+=sp;
    o.ph+=dt*2;
    if(o.dead){
      o.deadT-=dt;
      if(o.deadT<=0) G.onis.splice(i,1);
      continue;
    }
    // 自機へ寄る（横方向）
    o.x += (G.x-o.x)*dt*0.5 + Math.cos(o.ph)*dt*o.amp;
    o.x=Math.max(-LANE+0.6,Math.min(LANE-0.6,o.x));

    // 跳ねる鬼
    if(o.type==='leaper'){
      if(!o.air && o.z>-60 && Math.random()<dt*1.2){ o.air=true; o.vy=13; }
      if(o.air){
        o.vy-=34*dt; o.y+=o.vy*dt;
        if(o.y<=GROUND){ o.y=GROUND; o.air=false; o.vy=0; }
      }
    }
    // 火を吐く鬼
    if(o.type==='spitter' && o.z>-120 && o.z<-14){
      o.cd-=dt;
      if(o.cd<=0.5 && o.cd>0) o.charge=1-(o.cd/0.5);
      if(o.cd<=0){
        o.charge=0; o.cd=L.atkRate+Math.random()*1.4;
        G.projs.push(projFire(o.x,o.y+2.0,o.z));
      }
    }
    // 斬撃波を撃つ鬼（grunt が近距離で振る）
    if(o.type==='grunt' && o.z>-70 && o.z<-12){
      o.cd-=dt;
      if(o.cd<=0.45 && o.cd>0) o.charge=1-(o.cd/0.45);
      if(o.cd<=0){
        o.charge=0; o.cd=L.atkRate+1.0+Math.random()*1.5;
        var d1=Math.max(1,Math.hypot(G.x-o.x, -o.z));
        var s1=46;
        G.projs.push(projSlash(o.x,o.y+1.8,o.z,(G.x-o.x)/d1*s1, 0, (0-o.z)/d1*s1));
      }
    }

    // 接触
    if(o.z>-2.0 && o.z<1.8){
      if(Math.abs(o.x-G.x)<o.r+0.9 && G.y < o.y+2.6) hit(1);
    }
    if(o.z>15) G.onis.splice(i,1);
  }

  /* --- 術 --- */
  for(i=G.projs.length-1;i>=0;i--){
    var p=G.projs[i];
    p.life-=dt;
    if(p.life<=0){ G.projs.splice(i,1); continue; }
    if(p.kind==='fire'){
      p.ph+=dt*7;
      var tX=G.x-p.x, tY=(G.y+1.5)-p.y;
      var dd=Math.max(1,Math.hypot(tX,tY,-p.z));
      p.vx += tX/dd*24*dt;
      p.vy += tY/dd*24*dt;
      p.vx*=0.97; p.vy*=0.97;
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.z+=p.vz*dt+sp*0.4;
    } else {
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.z+=p.vz*dt+sp;
      p.rot+=dt*9;
    }
    if(p.z>-2.0 && p.z<2.0){
      if(Math.abs(p.x-G.x)<p.r+0.9 && Math.abs(p.y-(G.y+1.5))<p.r+1.5){
        hit(1); G.projs.splice(i,1); continue;
      }
    }
    if(p.z>16) G.projs.splice(i,1);
  }

  /* --- 粒子 --- */
  for(i=G.parts.length-1;i>=0;i--){
    var pt=G.parts[i];
    pt.life-=dt;
    if(pt.life<=0){ G.parts.splice(i,1); continue; }
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.z+=pt.vz*dt+sp;
    pt.vy-=18*dt; pt.vx*=0.94; pt.vz*=0.94;
  }

  /* --- ボス戦へ --- */
  if(G.dist >= L.goal){
    enterBoss();
    return;
  }
}

function doJump(){
  if(!G||G.done||!G.started) return;
  if(PHASE!=='run') return;
  if(!G.onGround) return;
  G.onGround=false; G.vy=17;
}

/* ============================================================
   描画 — 道中
   ============================================================ */
function poly(pts,fill,stroke,lw){
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}
}
function roofAt(x,w,y,z,col,a){
  var ov=w*0.34, rh=Math.max(1.4,w*0.28), hw=w/2;
  var L1=proj(x-hw-ov,y,z+0.3), R1=proj(x+hw+ov,y,z+0.3);
  var L2=proj(x-hw-ov*0.5,y+rh*0.4,z+0.3), R2=proj(x+hw+ov*0.5,y+rh*0.4,z+0.3);
  var TP=proj(x,y+rh,z+0.3);
  ctx.globalAlpha=a;
  ctx.beginPath();
  ctx.moveTo(L1.x,L1.y);
  ctx.quadraticCurveTo(L2.x,L2.y,TP.x,TP.y);
  ctx.quadraticCurveTo(R2.x,R2.y,R1.x,R1.y);
  ctx.closePath();
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle='rgba(18,15,20,.9)';
  ctx.lineWidth=Math.max(0.8,proj(0,0,z).s*0.02);
  ctx.stroke();
}
function drawHouse(hs,fade){
  var hw=hs.w/2, zF=hs.z, zB=hs.z-hs.d, yB=GROUND, yT=GROUND+hs.h;
  if(zF-camZ>=-1) return;
  var s0=proj(hs.x,yT,zF).s;
  var P={
    fbl:proj(hs.x-hw,yB,zF), fbr:proj(hs.x+hw,yB,zF),
    ftl:proj(hs.x-hw,yT,zF), ftr:proj(hs.x+hw,yT,zF),
    bbl:proj(hs.x-hw,yB,zB), bbr:proj(hs.x+hw,yB,zB),
    btl:proj(hs.x-hw,yT,zB), btr:proj(hs.x+hw,yT,zB)
  };
  var a=Math.min(1,fade*2.0);
  ctx.globalAlpha=a;
  var side=camX-hs.x;
  if(side<-hw&&(zB-camZ)<-1) poly([P.fbr,P.bbr,P.btr,P.ftr],hs.col.wood,'rgba(15,12,18,.75)',1);
  else if(side>hw&&(zB-camZ)<-1) poly([P.fbl,P.bbl,P.btl,P.ftl],hs.col.wood,'rgba(15,12,18,.75)',1);
  poly([P.fbl,P.fbr,P.ftr,P.ftl],hs.col.w,'rgba(15,12,18,.8)',1.1);
  if(s0>1.6){
    for(var f=1;f<=hs.floors;f++)
      roofAt(hs.x,hs.w, GROUND+hs.h*(f/hs.floors), zF, hs.col.roof, a*0.95);
  }
  if(s0>4){
    ctx.globalAlpha=a*0.9;
    var rows=Math.max(1,hs.floors*2);
    var wx0=P.ftl.x,wy0=P.ftl.y,wx1=P.ftr.x,wy1=P.ftr.y;
    var bx0=P.fbl.x,by0=P.fbl.y,bx1=P.fbr.x,by1=P.fbr.y;
    for(var r=0;r<rows;r++){
      for(var c=0;c<hs.cols;c++){
        var u0=(c+0.18)/hs.cols, u1=(c+0.82)/hs.cols;
        var v0=(r+0.25)/rows, v1=(r+0.78)/rows;
        var tx0=wx0+(wx1-wx0)*u0, ty0=wy0+(wy1-wy0)*u0;
        var tx1=wx0+(wx1-wx0)*u1, ty1=wy0+(wy1-wy0)*u1;
        var sx0=bx0+(bx1-bx0)*u0, sy0=by0+(by1-by0)*u0;
        var sx1=bx0+(bx1-bx0)*u1, sy1=by0+(by1-by0)*u1;
        var A0x=tx0+(sx0-tx0)*v0, A0y=ty0+(sy0-ty0)*v0;
        var A1x=tx1+(sx1-tx1)*v0, A1y=ty1+(sy1-ty1)*v0;
        var B2x=tx0+(sx0-tx0)*v1, B2y=ty0+(sy0-ty0)*v1;
        var B3x=tx1+(sx1-tx1)*v1, B3y=ty1+(sy1-ty1)*v1;
        var lit=((r*5+c*3+Math.floor(hs.x*3))%4)<2;
        ctx.fillStyle=lit?'rgba(214,164,86,.5)':'rgba(24,19,26,.8)';
        ctx.beginPath();
        ctx.moveTo(A0x,A0y); ctx.lineTo(A1x,A1y);
        ctx.lineTo(B3x,B3y); ctx.lineTo(B2x,B2y);
        ctx.closePath(); ctx.fill();
      }
    }
    ctx.globalAlpha=a;
  }
  if(hs.lantern && s0>3){
    var lp=proj(hs.x-hw*0.7, yT-0.8+Math.sin(hs.ph+Date.now()*0.0015)*0.2, zF+0.4);
    var lr=Math.max(1.2,lp.s*0.05);
    ctx.globalAlpha=a*0.35;
    var rg=ctx.createRadialGradient(lp.x,lp.y,0,lp.x,lp.y,lr*4.5);
    rg.addColorStop(0,'rgba(255,180,90,.9)'); rg.addColorStop(1,'rgba(255,150,60,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(lp.x,lp.y,lr*4.5,0,6.2832); ctx.fill();
    ctx.globalAlpha=a;
    ctx.fillStyle='#e8a13c';
    ctx.beginPath(); ctx.ellipse(lp.x,lp.y,lr*0.72,lr,0,0,6.2832); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBlock(bl,fade){
  if(bl.z-camZ>=-1) return;
  var a=Math.min(1,fade*2.2);
  var hw=bl.w/2;
  var P=[proj(bl.x-hw,GROUND,bl.z),proj(bl.x+hw,GROUND,bl.z),
         proj(bl.x+hw,GROUND+bl.h,bl.z),proj(bl.x-hw,GROUND+bl.h,bl.z)];
  ctx.globalAlpha=a;
  poly(P,'#3a3440','rgba(15,12,18,.9)',1.2);
  // 上面
  var T=[proj(bl.x-hw,GROUND+bl.h,bl.z),proj(bl.x+hw,GROUND+bl.h,bl.z),
         proj(bl.x+hw*0.85,GROUND+bl.h,bl.z-1.4),proj(bl.x-hw*0.85,GROUND+bl.h,bl.z-1.4)];
  poly(T,'#4a4450',null,0);
  ctx.globalAlpha=1;
}

function drawOni(o,fade){
  if(o.z-camZ>=-1) return;
  var p=proj(o.x,o.y+1.6,o.z), s=p.s;
  var r=o.r*s*0.38;
  if(r<1) return;
  var a=Math.min(1,fade*2.0);

  if(o.dead){
    var t=1-(o.deadT/0.6);
    ctx.globalAlpha=a*(1-t);
    ctx.fillStyle='#6a4a5a';
    for(var q=0;q<8;q++){
      var qa=q/8*6.2832;
      var qr=r*(0.5+t*1.8);
      ctx.beginPath();
      ctx.arc(p.x+Math.cos(qa)*qr, p.y+Math.sin(qa)*qr - t*r*2.2, r*0.3*(1-t),0,6.2832);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    return;
  }

  // 影
  var gp=proj(o.x,GROUND,o.z);
  ctx.globalAlpha=a*0.4;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(gp.x,gp.y,r*0.9,r*0.26,0,0,6.2832); ctx.fill();

  // オーラ
  ctx.globalAlpha=a*0.35*(0.6+0.4*Math.sin(o.ph*3));
  var ag=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*2.4);
  ag.addColorStop(0,'rgba(200,30,50,.7)'); ag.addColorStop(1,'rgba(120,0,30,0)');
  ctx.fillStyle=ag;
  ctx.beginPath(); ctx.arc(p.x,p.y,r*2.4,0,6.2832); ctx.fill();

  ctx.globalAlpha=a;
  var sway=Math.sin(o.ph*3)*r*0.10;

  // 脚
  ctx.strokeStyle='#241820';
  ctx.lineWidth=Math.max(1.5,r*0.22);
  ctx.lineCap='round';
  var lo=Math.sin(o.ph*6)*r*0.35;
  ctx.beginPath();
  ctx.moveTo(p.x-r*0.25,p.y+r*0.7); ctx.lineTo(p.x-r*0.3+lo,p.y+r*1.7);
  ctx.moveTo(p.x+r*0.25,p.y+r*0.7); ctx.lineTo(p.x+r*0.3-lo,p.y+r*1.7);
  ctx.stroke();

  // 胴
  ctx.fillStyle='#241820';
  ctx.beginPath();
  ctx.moveTo(p.x+sway, p.y-r*0.95);
  ctx.quadraticCurveTo(p.x+r*0.95, p.y-r*0.1, p.x+r*0.5, p.y+r*0.85);
  ctx.quadraticCurveTo(p.x, p.y+r*0.5, p.x-r*0.5, p.y+r*0.85);
  ctx.quadraticCurveTo(p.x-r*0.95, p.y-r*0.1, p.x+sway, p.y-r*0.95);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(180,40,60,.55)';
  ctx.lineWidth=Math.max(0.8,r*0.07);
  ctx.stroke();

  // 腕
  ctx.strokeStyle='#241820';
  ctx.lineWidth=Math.max(1.2,r*0.18);
  var aw=Math.sin(o.ph*6+1.6)*r*0.4;
  ctx.beginPath();
  ctx.moveTo(p.x-r*0.6,p.y-r*0.25); ctx.lineTo(p.x-r*1.0,p.y+r*0.4+aw);
  ctx.moveTo(p.x+r*0.6,p.y-r*0.25); ctx.lineTo(p.x+r*1.0,p.y+r*0.4-aw);
  ctx.stroke();
  ctx.lineCap='butt';

  // 角
  ctx.fillStyle='#4a3038';
  ctx.beginPath();
  ctx.moveTo(p.x-r*0.45+sway,p.y-r*0.75);
  ctx.lineTo(p.x-r*0.72+sway,p.y-r*1.55);
  ctx.lineTo(p.x-r*0.14+sway,p.y-r*0.92);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(p.x+r*0.45+sway,p.y-r*0.75);
  ctx.lineTo(p.x+r*0.72+sway,p.y-r*1.55);
  ctx.lineTo(p.x+r*0.14+sway,p.y-r*0.92);
  ctx.closePath(); ctx.fill();

  // 眼
  var eg=0.7+0.3*Math.sin(o.ph*5);
  ctx.globalAlpha=a*eg;
  ctx.fillStyle= o.type==='spitter' ? '#ff8a20' : '#ff2d3d';
  ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=Math.max(4,r*0.6);
  ctx.beginPath(); ctx.ellipse(p.x-r*0.26+sway,p.y-r*0.42,r*0.15,r*0.10,0,0,6.2832); ctx.fill();
  ctx.beginPath(); ctx.ellipse(p.x+r*0.26+sway,p.y-r*0.42,r*0.15,r*0.10,0,0,6.2832); ctx.fill();
  ctx.shadowBlur=0;

  if(o.charge>0){
    ctx.globalAlpha=a*o.charge*0.85;
    ctx.strokeStyle='#ff4050';
    ctx.lineWidth=Math.max(1.5,r*0.13);
    ctx.shadowColor='rgba(255,64,80,.9)'; ctx.shadowBlur=Math.max(6,r*0.8);
    ctx.beginPath(); ctx.arc(p.x,p.y,r*(1.4+o.charge*0.9),0,6.2832); ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

function drawProjRun(p,fade){
  if(p.z-camZ>=-1) return;
  var pp=proj(p.x,p.y,p.z), s=pp.s;
  var a=Math.min(1,fade*2.2);
  var r=Math.max(2,p.r*s*0.5);
  if(p.kind==='fire'){
    ctx.globalAlpha=a*0.5;
    var fg=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,r*3);
    fg.addColorStop(0,'rgba(255,220,140,.95)');
    fg.addColorStop(0.4,'rgba(255,110,40,.7)');
    fg.addColorStop(1,'rgba(180,20,20,0)');
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.arc(pp.x,pp.y,r*3,0,6.2832); ctx.fill();
    ctx.globalAlpha=a;
    ctx.fillStyle='#ffd08a';
    ctx.beginPath();
    ctx.arc(pp.x,pp.y,r*(0.9+0.1*Math.sin(p.ph)),0,6.2832);
    ctx.fill();
  } else {
    ctx.globalAlpha=a;
    ctx.save();
    ctx.translate(pp.x,pp.y);
    ctx.rotate(Math.sin(p.rot)*0.5);
    ctx.strokeStyle='#e8443c';
    ctx.lineWidth=Math.max(2,r*0.5);
    ctx.shadowColor='rgba(232,68,60,.9)'; ctx.shadowBlur=Math.max(6,r);
    ctx.beginPath();
    ctx.arc(0,0,r*1.6,-0.9,0.9);
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

/* 自機（鬼狩り・走る） */
function drawRunner(){
  var px=G.x, py=G.y, pz=0;
  var base=proj(px,GROUND,pz);
  var s=base.s;
  var u=s*0.055;                       // 単位
  var inv=(G.inv>0&&Math.floor(G.inv*14)%2===1);
  ctx.globalAlpha=inv?0.4:1;

  var lean=G.lean*2.2;
  var bob=G.onGround? Math.sin(G.run)*u*0.35 : 0;
  var hipY = base.y - (py*s*0.06) - u*2.6 + bob;
  var hipX = base.x;

  // 影
  ctx.globalAlpha=(inv?0.2:0.45)*(G.onGround?1:0.5);
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(base.x, base.y, u*1.5*(G.onGround?1:0.7), u*0.42,0,0,6.2832);
  ctx.fill();
  ctx.globalAlpha=inv?0.4:1;

  ctx.save();
  ctx.translate(hipX,hipY);
  ctx.rotate(lean);

  var t=G.run;
  var stride = G.onGround ? Math.sin(t) : 0.7;
  var stride2= G.onGround ? Math.sin(t+Math.PI) : -0.4;

  // 脚
  ctx.strokeStyle='#1c1a22';
  ctx.lineWidth=Math.max(2,u*0.42);
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(stride*u*0.9, u*1.3);
  ctx.lineTo(stride*u*1.15, u*2.6);
  ctx.moveTo(0,0);
  ctx.lineTo(stride2*u*0.9, u*1.3);
  ctx.lineTo(stride2*u*1.15, u*2.6);
  ctx.stroke();

  // 羽織（棚引く）
  var fl=Math.sin(Date.now()*0.012)*u*0.3;
  ctx.globalAlpha=(inv?0.3:0.85);
  var hg=ctx.createLinearGradient(0,-u*1.8,0,u*1.6);
  hg.addColorStop(0,'#1f6b52'); hg.addColorStop(1,'rgba(20,60,48,.25)');
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(-u*0.7,-u*1.7);
  ctx.lineTo(u*0.7,-u*1.7);
  ctx.quadraticCurveTo(u*1.3, u*0.4, u*0.5+fl, u*1.8);
  ctx.quadraticCurveTo(0, u*1.0, -u*0.5-fl, u*1.8);
  ctx.quadraticCurveTo(-u*1.3, u*0.4, -u*0.7,-u*1.7);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha=inv?0.4:1;

  // 胴（隊服）
  ctx.fillStyle='#22202c';
  ctx.beginPath();
  ctx.moveTo(-u*0.62,-u*1.75);
  ctx.lineTo( u*0.62,-u*1.75);
  ctx.lineTo( u*0.50, u*0.15);
  ctx.lineTo(-u*0.50, u*0.15);
  ctx.closePath(); ctx.fill();
  // 帯
  ctx.fillStyle='#8c2f2c';
  ctx.fillRect(-u*0.55,-u*0.25,u*1.1,u*0.34);

  // 腕（刀を持つ側は後ろへ引く）
  ctx.strokeStyle='#2a2733';
  ctx.lineWidth=Math.max(1.8,u*0.32);
  var aw=stride2*u*0.8;
  ctx.beginPath();
  ctx.moveTo(-u*0.5,-u*1.4);
  ctx.lineTo(-u*0.9+aw*0.4, -u*0.5);
  ctx.stroke();

  // 頭
  ctx.fillStyle='#e6cdb0';
  ctx.beginPath();
  ctx.arc(0,-u*2.25,u*0.52,0,6.2832); ctx.fill();
  // 髪
  ctx.fillStyle='#161320';
  ctx.beginPath();
  ctx.arc(0,-u*2.32,u*0.55,Math.PI*1.05,Math.PI*2.0);
  ctx.fill();
  // 髪の房（棚引く）
  ctx.strokeStyle='#161320';
  ctx.lineWidth=Math.max(1.2,u*0.16);
  ctx.beginPath();
  ctx.moveTo(-u*0.4,-u*2.4);
  ctx.quadraticCurveTo(-u*1.1,-u*2.5-fl*0.5,-u*1.5,-u*2.1);
  ctx.stroke();

  // 刀（背に構える）
  var sw=1;
  if(G.slashT<=0){
    ctx.save();
    ctx.rotate(-0.5);
    ctx.strokeStyle='#dfe9f2';
    ctx.lineWidth=Math.max(1.6,u*0.16);
    ctx.shadowColor='rgba(200,240,255,.6)'; ctx.shadowBlur=u*0.6;
    ctx.beginPath();
    ctx.moveTo(u*0.45,-u*0.6);
    ctx.lineTo(u*2.3,-u*1.5);
    ctx.stroke();
    ctx.shadowBlur=0;
    // 柄
    ctx.strokeStyle='#4a2f26';
    ctx.lineWidth=Math.max(2,u*0.2);
    ctx.beginPath();
    ctx.moveTo(u*0.1,-u*0.35);
    ctx.lineTo(u*0.5,-u*0.62);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  /* 斬撃エフェクト */
  if(G.slashT>0){
    var t2=1-(G.slashT/0.20);
    var cp=proj(G.x,G.y+1.6,-4.5);
    var R=Math.max(34, cp.s*4.2);
    ctx.save();
    ctx.translate(cp.x,cp.y);
    ctx.rotate(G.slashArc*(0.9 - t2*1.9));
    ctx.globalAlpha=(1-t2)*0.95;
    var lg=ctx.createLinearGradient(-R,0,R,0);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(0.45,'rgba(200,245,255,.95)');
    lg.addColorStop(0.55,'rgba(255,255,255,1)');
    lg.addColorStop(1,'rgba(120,200,255,0)');
    ctx.strokeStyle=lg;
    ctx.lineWidth=Math.max(4, R*0.14*(1-t2*0.5));
    ctx.lineCap='round';
    ctx.shadowColor='rgba(190,240,255,.95)';
    ctx.shadowBlur=Math.max(10,R*0.3);
    ctx.beginPath();
    ctx.arc(0,0,R*(0.6+t2*0.55), -1.3, 1.3);
    ctx.stroke();
    ctx.globalAlpha=(1-t2)*0.7;
    ctx.lineWidth=Math.max(1.5,R*0.035);
    ctx.strokeStyle='rgba(255,255,255,.95)';
    ctx.beginPath();
    ctx.arc(0,0,R*(0.6+t2*0.55)*1.15, -1.05, 1.05);
    ctx.stroke();
    ctx.shadowBlur=0; ctx.lineCap='butt';
    ctx.restore();
  }

  /* 必殺技エフェクト（回転する光輪） */
  if(G.ougiT>0){
    var ot=1-(G.ougiT/0.9);
    var op=proj(G.x,G.y+1.6,-10);
    var OR=Math.max(60, op.s*10*(0.4+ot*1.5));
    ctx.save();
    ctx.translate(op.x,op.y);
    ctx.globalAlpha=(1-ot)*0.9;
    for(var q=0;q<6;q++){
      ctx.rotate(1.05 + ot*3.0);
      var og=ctx.createLinearGradient(-OR,0,OR,0);
      og.addColorStop(0,'rgba(255,255,255,0)');
      og.addColorStop(0.5,'rgba(190,240,255,.95)');
      og.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle=og;
      ctx.lineWidth=Math.max(3,OR*0.05);
      ctx.shadowColor='rgba(180,235,255,.9)'; ctx.shadowBlur=OR*0.2;
      ctx.beginPath();
      ctx.arc(0,0,OR*(0.5+q*0.09), -1.5, 1.5);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawRun(){
  var L=G.L,i;
  var sh=G.shake>0?(Math.random()-0.5)*G.shake:0;
  if(G.shake>0) G.shake*=0.86;

  camX=G.x*0.35+sh*0.1;
  camY=GROUND+4.2 + G.y*0.35 + sh*0.06;
  camZ=8.5;
  camRoll=G.lean*0.3;

  ctx.clearRect(0,0,W,H);

  var near = G.dist > L.goal-260;

  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0812');
  sky.addColorStop(0.42, near?'#2a0a14':'#161226');
  sky.addColorStop(1, near?'#40101c':'#241a2e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  var moonX=W*0.74, moonY=H*0.12, moonR=Math.min(W,H)*0.09;
  var mg=ctx.createRadialGradient(moonX,moonY,moonR*0.3,moonX,moonY,moonR*3.2);
  mg.addColorStop(0, near?'rgba(255,90,80,.5)':'rgba(255,190,140,.35)');
  mg.addColorStop(1,'rgba(255,120,80,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = near?'#e8564a':'#e8c48a';
  ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,6.2832); ctx.fill();

  ctx.fillStyle='rgba(220,220,255,.5)';
  for(i=0;i<50;i++)
    ctx.fillRect(((i*137+61)%1000)/1000*W, ((i*211+43)%1000)/1000*H*0.36, 1.2,1.2);

  var horY=proj(0,GROUND,-FAR).y;
  ctx.save();
  ctx.translate(CX,CY); ctx.rotate(camRoll*0.2); ctx.translate(-CX,-CY);
  ctx.fillStyle='rgba(24,18,30,.85)';
  for(i=0;i<26;i++){
    var bx=(i/26)*(W+60)-30;
    var bw=(W+60)/26*1.3;
    var bh=14+((i*53)%7)*9;
    ctx.fillRect(bx-bw/2, horY-bh, bw, bh+8);
    ctx.beginPath();
    ctx.moveTo(bx-bw*0.7, horY-bh);
    ctx.lineTo(bx, horY-bh-bw*0.28);
    ctx.lineTo(bx+bw*0.7, horY-bh);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  var gg=ctx.createLinearGradient(0,horY,0,H);
  gg.addColorStop(0,'#20182a'); gg.addColorStop(1,'#100c16');
  ctx.fillStyle=gg; ctx.fillRect(-20,horY-2,W+40,H-horY+40);

  /* 石畳の道 */
  ctx.fillStyle='rgba(70,60,84,.35)';
  var rL=proj(-LANE,GROUND,-FAR), rR=proj(LANE,GROUND,-FAR);
  var rL2=proj(-LANE,GROUND,8), rR2=proj(LANE,GROUND,8);
  ctx.beginPath();
  ctx.moveTo(rL.x,rL.y); ctx.lineTo(rR.x,rR.y);
  ctx.lineTo(rR2.x,rR2.y); ctx.lineTo(rL2.x,rL2.y);
  ctx.closePath(); ctx.fill();

  var stp=6, off=G.dist%stp;
  ctx.strokeStyle='rgba(150,130,170,.18)';
  ctx.lineWidth=1;
  for(var z=-FAR;z<-6;z+=stp){
    var zz=z+off;
    if(zz-camZ>=-3) continue;
    var fd=1-(-zz+camZ)/FAR;
    if(fd<=0) continue;
    ctx.globalAlpha=fd*fd;
    var q1=proj(-LANE,GROUND,zz), q2=proj(LANE,GROUND,zz);
    ctx.beginPath(); ctx.moveTo(q1.x,q1.y); ctx.lineTo(q2.x,q2.y); ctx.stroke();
  }
  ctx.globalAlpha=1;

  /* 描画順 */
  var items=[];
  for(i=0;i<G.houses.length;i++) items.push({t:'h',o:G.houses[i],z:G.houses[i].z});
  for(i=0;i<G.lants.length;i++)  items.push({t:'l',o:G.lants[i], z:G.lants[i].z});
  for(i=0;i<G.blocks.length;i++) items.push({t:'k',o:G.blocks[i],z:G.blocks[i].z});
  for(i=0;i<G.onis.length;i++)   items.push({t:'o',o:G.onis[i],  z:G.onis[i].z});
  for(i=0;i<G.projs.length;i++)  items.push({t:'p',o:G.projs[i], z:G.projs[i].z});
  for(i=0;i<G.parts.length;i++)  items.push({t:'s',o:G.parts[i], z:G.parts[i].z});
  items.sort(function(a,b){return a.z-b.z;});

  for(i=0;i<items.length;i++){
    var it=items[i];
    if(!vis(it.z)) continue;
    var fade=1-(-(it.z-camZ))/FAR;
    if(fade<=0) continue;
    if(it.t==='h') drawHouse(it.o,fade);
    else if(it.t==='k') drawBlock(it.o,fade);
    else if(it.t==='o') drawOni(it.o,fade);
    else if(it.t==='p') drawProjRun(it.o,fade);
    else if(it.t==='l'){
      var lp=proj(it.o.x, it.o.y+Math.sin(it.o.ph)*0.8, it.o.z);
      var lr=Math.max(1, lp.s*0.04);
      var gl=0.6+0.4*Math.sin(it.o.ph*1.6);
      ctx.globalAlpha=Math.min(0.8,fade*1.3)*0.45*gl;
      var rg=ctx.createRadialGradient(lp.x,lp.y,0,lp.x,lp.y,lr*5);
      rg.addColorStop(0,'rgba(255,170,80,.8)'); rg.addColorStop(1,'rgba(255,140,50,0)');
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.arc(lp.x,lp.y,lr*5,0,6.2832); ctx.fill();
      ctx.globalAlpha=Math.min(1,fade*1.3)*gl;
      ctx.fillStyle='#f0ae4a';
      ctx.beginPath(); ctx.ellipse(lp.x,lp.y,lr*0.75,lr,0,0,6.2832); ctx.fill();
      ctx.globalAlpha=1;
    }
    else if(it.t==='s'){
      var pt=it.o;
      var pp=proj(pt.x,pt.y,pt.z);
      var pr=Math.max(1, pt.r*pp.s*0.5);
      ctx.globalAlpha=Math.min(1,fade*2)*Math.min(1,pt.life*2.2);
      ctx.fillStyle=pt.col;
      ctx.shadowColor=pt.col; ctx.shadowBlur=pr*2;
      ctx.beginPath(); ctx.arc(pp.x,pp.y,pr,0,6.2832); ctx.fill();
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
  }

  /* 鳥居（ボスの門） */
  var goalZ=-(L.goal-G.dist);
  if(goalZ>-FAR && vis(goalZ)){
    var gf=1-(-(goalZ-camZ))/FAR;
    if(gf>0){
      var s0=proj(0,0,goalZ).s;
      var gw=LANE+2, gh=TOP_Y-1;
      ctx.globalAlpha=Math.min(1,gf*2.2);
      ctx.strokeStyle='#c9302c';
      ctx.lineWidth=Math.max(2,s0*0.16);
      ctx.shadowColor='rgba(201,48,44,.9)'; ctx.shadowBlur=Math.max(6,s0*0.5);
      var pL1=proj(-gw,GROUND,goalZ), pL2=proj(-gw,gh,goalZ);
      var pR1=proj( gw,GROUND,goalZ), pR2=proj( gw,gh,goalZ);
      ctx.beginPath(); ctx.moveTo(pL1.x,pL1.y); ctx.lineTo(pL2.x,pL2.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pR1.x,pR1.y); ctx.lineTo(pR2.x,pR2.y); ctx.stroke();
      var kL2=proj(-gw-3,gh+3.5,goalZ), kR2=proj(gw+3,gh+3.5,goalZ), kC=proj(0,gh+5.5,goalZ);
      ctx.lineWidth=Math.max(3,s0*0.24);
      ctx.beginPath();
      ctx.moveTo(kL2.x,kL2.y);
      ctx.quadraticCurveTo(kC.x,kC.y,kR2.x,kR2.y);
      ctx.stroke();
      var nL=proj(-gw-1,gh,goalZ), nR=proj(gw+1,gh,goalZ);
      ctx.lineWidth=Math.max(2,s0*0.13);
      ctx.beginPath(); ctx.moveTo(nL.x,nL.y); ctx.lineTo(nR.x,nR.y); ctx.stroke();
      ctx.shadowBlur=0;
      var gp2=proj(0,gh+2.2,goalZ);
      ctx.fillStyle='#c48e32';
      ctx.font='700 '+Math.max(10,s0*2.2)+'px "Hiragino Mincho ProN",serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('鬼 門',gp2.x,gp2.y);
      ctx.globalAlpha=1;
    }
  }

  drawRunner();

  hDistV.textContent=Math.floor(G.dist)+' m';
  barIn.style.width=Math.min(100,G.dist/L.goal*100)+'%';
}

/* ============================================================
   描画 — ボス戦（横向き 2D）
   ============================================================ */
function bproj(x,y,SC,OX,OY){
  return {x:OX+x*SC, y:OY - y*SC};
}
function drawBoss2D(){
  var B=G.B, i;
  var sh=G.shake>0?(Math.random()-0.5)*G.shake:0;
  if(G.shake>0) G.shake*=0.86;

  ctx.clearRect(0,0,W,H);

  // ステージをフィット
  var SC=Math.min(W/STAGE_W, H/STAGE_H*0.92);
  var OX=(W-STAGE_W*SC)/2 + sh*0.4;
  var OY=H*0.90 + sh*0.3;   // 地面ライン

  /* 背景 */
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0610');
  sky.addColorStop(0.45, B.enrage?'#40101c':'#2a0a14');
  sky.addColorStop(1, B.enrage?'#5c1420':'#3a0f18');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 血の月
  var mx=W*0.5, my=H*0.22, mr=Math.min(W,H)*0.16;
  var mg=ctx.createRadialGradient(mx,my,mr*0.3,mx,my,mr*3.0);
  mg.addColorStop(0,'rgba(255,80,70,.45)');
  mg.addColorStop(1,'rgba(255,60,50,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle= B.enrage?'#ff5a4a':'#e8564a';
  ctx.beginPath(); ctx.arc(mx,my,mr,0,6.2832); ctx.fill();

  // 遠景の街シルエット
  ctx.fillStyle='rgba(16,10,18,.9)';
  for(i=0;i<20;i++){
    var bx=(i/20)*(W+80)-40;
    var bw=(W+80)/20*1.25;
    var bh=(30+((i*47)%6)*22)*(H/420);
    ctx.fillRect(bx-bw/2, OY-bh, bw, bh);
    ctx.beginPath();
    ctx.moveTo(bx-bw*0.72, OY-bh);
    ctx.lineTo(bx, OY-bh-bw*0.22);
    ctx.lineTo(bx+bw*0.72, OY-bh);
    ctx.closePath(); ctx.fill();
  }

  // 地面
  var gg=ctx.createLinearGradient(0,OY,0,H);
  gg.addColorStop(0,'#2a1c26'); gg.addColorStop(1,'#120c14');
  ctx.fillStyle=gg; ctx.fillRect(0,OY,W,H-OY);
  ctx.strokeStyle='rgba(196,142,50,.35)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,OY); ctx.lineTo(W,OY); ctx.stroke();
  // 石畳
  ctx.strokeStyle='rgba(150,120,160,.15)';
  ctx.lineWidth=1;
  for(i=0;i<24;i++){
    var lx=OX + (i/24)*STAGE_W*SC;
    ctx.beginPath(); ctx.moveTo(lx,OY); ctx.lineTo(lx-(W*0.06), H); ctx.stroke();
  }

  /* ボス */
  if(!B.dead || B.deadT>0){
    var bp=bproj(B.bx,B.by,SC,OX,OY);
    var R=70*SC;
    var dt2 = B.dead ? 1-(B.deadT/2.0) : 0;
    var al = B.dead ? Math.max(0,1-dt2) : 1;
    ctx.globalAlpha=al;

    // オーラ
    var pul=0.6+0.4*Math.sin((B.ph||0)*2.4);
    ctx.globalAlpha=al*0.5*pul;
    var ag=ctx.createRadialGradient(bp.x,bp.y-R*1.0,0,bp.x,bp.y-R*1.0,R*2.6);
    ag.addColorStop(0, B.enrage?'rgba(255,40,60,.75)':'rgba(200,20,50,.6)');
    ag.addColorStop(1,'rgba(80,0,25,0)');
    ctx.fillStyle=ag;
    ctx.beginPath(); ctx.arc(bp.x,bp.y-R*1.0,R*2.6,0,6.2832); ctx.fill();
    ctx.globalAlpha=al;

    // 影
    ctx.globalAlpha=al*0.5;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(bp.x,bp.y,R*0.9,R*0.16,0,0,6.2832); ctx.fill();
    ctx.globalAlpha=al;

    ctx.save();
    ctx.translate(bp.x,bp.y);
    if(B.dead) ctx.rotate(dt2*0.5);
    var flashC = B.hitFx>0;

    // 脚
    ctx.strokeStyle=flashC?'#ff8080':'#1a1018';
    ctx.lineWidth=R*0.30;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-R*0.28,-R*0.55); ctx.lineTo(-R*0.42,0);
    ctx.moveTo( R*0.28,-R*0.55); ctx.lineTo( R*0.42,0);
    ctx.stroke();

    // 胴・衣
    ctx.fillStyle=flashC?'#ffb0b0':'#1e1420';
    ctx.beginPath();
    ctx.moveTo(0,-R*2.1);
    ctx.quadraticCurveTo( R*1.05,-R*1.5,  R*0.72,-R*0.45);
    ctx.quadraticCurveTo( 0,-R*0.75, -R*0.72,-R*0.45);
    ctx.quadraticCurveTo(-R*1.05,-R*1.5, 0,-R*2.1);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(200,40,70,.6)';
    ctx.lineWidth=R*0.05;
    ctx.stroke();

    // 血鬼術の紋様
    ctx.globalAlpha=al*0.5*pul;
    ctx.strokeStyle='#e8443c';
    ctx.lineWidth=R*0.035;
    for(i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(0,-R*1.2, R*(0.4+i*0.26), 0.6+(B.ph||0)*0.6, 2.4+(B.ph||0)*0.6);
      ctx.stroke();
    }
    ctx.globalAlpha=al;

    // 腕
    var arm=Math.sin((B.ph||0)*2)*R*0.2;
    ctx.strokeStyle=flashC?'#ff8080':'#1a1018';
    ctx.lineWidth=R*0.24;
    var toP = (B.px<B.bx)?-1:1;
    ctx.beginPath();
    ctx.moveTo(-R*0.62,-R*1.6); ctx.lineTo(-R*1.15,-R*0.9+arm);
    ctx.moveTo( R*0.62,-R*1.6); ctx.lineTo( R*1.15,-R*0.9-arm);
    ctx.stroke();
    // 爪
    ctx.strokeStyle='#e8dfd0';
    ctx.lineWidth=R*0.06;
    for(i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(toP*R*1.15, -R*0.9 - toP*arm);
      ctx.lineTo(toP*R*(1.45+i*0.05), -R*(0.75-i*0.14) - toP*arm);
      ctx.stroke();
    }
    ctx.lineCap='butt';

    // 頭
    ctx.fillStyle=flashC?'#ffd0d0':'#2a1c28';
    ctx.beginPath(); ctx.arc(0,-R*2.35,R*0.5,0,6.2832); ctx.fill();

    // 四本角
    ctx.fillStyle='#3a2430';
    var horns=[[-0.42,-2.6,-0.85,-3.5,-0.10,-2.85],
               [ 0.42,-2.6, 0.85,-3.5, 0.10,-2.85],
               [-0.18,-2.75,-0.32,-3.85, 0.10,-2.95],
               [ 0.18,-2.75, 0.32,-3.85,-0.10,-2.95]];
    for(i=0;i<4;i++){
      var hh=horns[i];
      ctx.beginPath();
      ctx.moveTo(R*hh[0],R*hh[1]);
      ctx.lineTo(R*hh[2],R*hh[3]);
      ctx.lineTo(R*hh[4],R*hh[5]);
      ctx.closePath(); ctx.fill();
    }

    // 眼
    var eg=0.75+0.25*Math.sin((B.ph||0)*4);
    ctx.globalAlpha=al*eg;
    ctx.fillStyle=B.enrage?'#fff040':'#ff1f34';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=R*0.5;
    ctx.beginPath(); ctx.ellipse(-R*0.20,-R*2.42,R*0.14,R*0.09,-0.2,0,6.2832); ctx.fill();
    ctx.beginPath(); ctx.ellipse( R*0.20,-R*2.42,R*0.14,R*0.09, 0.2,0,6.2832); ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=al;

    // 牙
    ctx.fillStyle='#e8dfd0';
    for(i=0;i<5;i++){
      var fx=(i-2)*R*0.13;
      ctx.beginPath();
      ctx.moveTo(fx-R*0.04,-R*2.22);
      ctx.lineTo(fx+R*0.04,-R*2.22);
      ctx.lineTo(fx,-R*2.06);
      ctx.closePath(); ctx.fill();
    }

    // チャージ
    if(B.charge>0 && !B.dead){
      ctx.globalAlpha=al*B.charge;
      ctx.strokeStyle='#ff5060';
      ctx.lineWidth=R*0.08;
      ctx.shadowColor='rgba(255,80,96,1)'; ctx.shadowBlur=R*0.7;
      ctx.beginPath(); ctx.arc(0,-R*1.2,R*(1.5+B.charge*1.0),0,6.2832); ctx.stroke();
      ctx.shadowBlur=0;
    }
    ctx.restore();
    ctx.globalAlpha=1;
  }

  /* ボスの弾 */
  for(i=0;i<B.projs.length;i++){
    var p=B.projs[i];
    var pp=bproj(p.x,p.y,SC,OX,OY);
    var r=p.r*SC;
    if(p.kind==='fire'){
      ctx.globalAlpha=0.55;
      var fg=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,r*2.6);
      fg.addColorStop(0,'rgba(255,220,140,.95)');
      fg.addColorStop(0.4,'rgba(255,110,40,.7)');
      fg.addColorStop(1,'rgba(180,20,20,0)');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.arc(pp.x,pp.y,r*2.6,0,6.2832); ctx.fill();
      ctx.globalAlpha=1;
      ctx.fillStyle='#ffd08a';
      ctx.beginPath(); ctx.arc(pp.x,pp.y,r*(0.85+0.15*Math.sin(p.ph)),0,6.2832); ctx.fill();
    } else if(p.kind==='blade'){
      ctx.save();
      ctx.translate(pp.x,pp.y);
      ctx.scale(p.vx>0?1:-1,1);
      ctx.strokeStyle='#e8443c';
      ctx.lineWidth=r*0.45;
      ctx.shadowColor='rgba(232,68,60,.95)'; ctx.shadowBlur=r*1.2;
      ctx.beginPath();
      ctx.arc(0,0,r*1.5,-1.0,1.0);
      ctx.stroke();
      ctx.lineWidth=r*0.15;
      ctx.strokeStyle='rgba(255,200,200,.9)';
      ctx.beginPath(); ctx.arc(0,0,r*1.85,-0.75,0.75); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.restore();
    } else if(p.kind==='shock'){
      ctx.save();
      ctx.translate(pp.x,pp.y);
      ctx.globalAlpha=Math.min(1,p.life);
      ctx.fillStyle='#c9302c';
      ctx.shadowColor='rgba(201,48,44,.9)'; ctx.shadowBlur=r*0.8;
      ctx.beginPath();
      ctx.moveTo(-r*0.8,0);
      ctx.lineTo(-r*0.2,-r*1.3);
      ctx.lineTo(r*0.2,-r*0.5);
      ctx.lineTo(r*0.8,-r*1.6);
      ctx.lineTo(r*0.9,0);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      ctx.globalAlpha=1;
      ctx.restore();
    } else if(p.kind==='rock'){
      ctx.save();
      ctx.translate(pp.x,pp.y);
      ctx.rotate(p.rot);
      ctx.fillStyle='#4a4650';
      ctx.beginPath();
      ctx.moveTo(-r,-r*0.6); ctx.lineTo(r*0.8,-r);
      ctx.lineTo(r,r*0.5); ctx.lineTo(-r*0.5,r);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(20,16,22,.9)';
      ctx.lineWidth=r*0.12; ctx.stroke();
      ctx.restore();
      // 落下警告線
      ctx.globalAlpha=0.2;
      ctx.strokeStyle='#e8443c';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(pp.x,pp.y); ctx.lineTo(pp.x,OY);
      ctx.stroke();
      ctx.globalAlpha=1;
    }
  }

  /* 粒子 */
  for(i=0;i<B.parts.length;i++){
    var pt=B.parts[i];
    var pq=bproj(pt.x,pt.y,SC,OX,OY);
    ctx.globalAlpha=Math.min(1,pt.life*2.4);
    ctx.fillStyle=pt.col;
    ctx.shadowColor=pt.col; ctx.shadowBlur=pt.r*2;
    ctx.beginPath(); ctx.arc(pq.x,pq.y,pt.r*SC*1.2,0,6.2832); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  /* 自機 */
  drawSlayer2D(B,SC,OX,OY);

  /* 必殺技エフェクト（全画面斬撃） */
  if(B.ougiFx>0){
    var ot=1-(B.ougiFx/0.9);
    ctx.save();
    ctx.globalAlpha=(1-ot)*0.9;
    ctx.strokeStyle='rgba(200,245,255,.95)';
    ctx.shadowColor='rgba(180,235,255,1)'; ctx.shadowBlur=30;
    for(i=0;i<5;i++){
      var yy=H*(0.15+i*0.17) + Math.sin(ot*6+i)*20;
      ctx.lineWidth=Math.max(3,(1-ot)*16);
      ctx.beginPath();
      ctx.moveTo(-40, yy + (i%2?60:-60)*ot);
      ctx.lineTo(W+40, yy - (i%2?60:-60)*ot);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }

  hDistV.textContent = B.dead ? '討 伐' : '決 戦';
}

function drawSlayer2D(B,SC,OX,OY){
  var p=bproj(B.px,B.py,SC,OX,OY);
  var u=26*SC;
  var inv=(G.inv>0&&Math.floor(G.inv*14)%2===1);
  ctx.globalAlpha=inv?0.4:1;

  // 影
  ctx.globalAlpha=(inv?0.2:0.45)*(B.pground?1:0.5);
  ctx.fillStyle='#000';
  var gy=bproj(B.px,0,SC,OX,OY).y;
  ctx.beginPath(); ctx.ellipse(p.x,gy,u*0.75,u*0.16,0,0,6.2832); ctx.fill();
  ctx.globalAlpha=inv?0.4:1;

  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.scale(B.pface,1);
  var crouch = B.pcrouch;
  var sc = crouch?0.68:1;
  ctx.scale(1,sc);

  var run = (Math.abs(B.pvx)>30 && B.pground) ? Date.now()*0.02 : 0;
  var st = run? Math.sin(run) : 0.2;
  var st2= run? Math.sin(run+Math.PI) : -0.2;
  var air = !B.pground;

  // 脚
  ctx.strokeStyle='#1c1a22';
  ctx.lineWidth=u*0.28;
  ctx.lineCap='round';
  ctx.beginPath();
  if(air){
    ctx.moveTo(0,-u*1.5); ctx.lineTo(u*0.35,-u*0.85); ctx.lineTo(u*0.15,-u*0.1);
    ctx.moveTo(0,-u*1.5); ctx.lineTo(-u*0.45,-u*1.0); ctx.lineTo(-u*0.7,-u*0.5);
  }else{
    ctx.moveTo(0,-u*1.5); ctx.lineTo(st*u*0.55,-u*0.8); ctx.lineTo(st*u*0.75,0);
    ctx.moveTo(0,-u*1.5); ctx.lineTo(st2*u*0.55,-u*0.8); ctx.lineTo(st2*u*0.75,0);
  }
  ctx.stroke();

  // 羽織
  var fl=Math.sin(Date.now()*0.014)*u*0.22 + (B.pvx/300)*u*0.5;
  ctx.globalAlpha=inv?0.3:0.88;
  var hg=ctx.createLinearGradient(0,-u*3.0,0,-u*0.6);
  hg.addColorStop(0,'#1f6b52'); hg.addColorStop(1,'rgba(20,60,48,.25)');
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(-u*0.55,-u*2.9);
  ctx.lineTo( u*0.55,-u*2.9);
  ctx.quadraticCurveTo(u*0.2,-u*1.6, -u*0.9-fl,-u*0.5);
  ctx.quadraticCurveTo(-u*0.5,-u*1.6, -u*0.55,-u*2.9);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha=inv?0.4:1;

  // 胴
  ctx.fillStyle='#22202c';
  ctx.beginPath();
  ctx.moveTo(-u*0.5,-u*2.85);
  ctx.lineTo( u*0.5,-u*2.85);
  ctx.lineTo( u*0.42,-u*1.35);
  ctx.lineTo(-u*0.42,-u*1.35);
  ctx.closePath(); ctx.fill();
  // 帯
  ctx.fillStyle='#8c2f2c';
  ctx.fillRect(-u*0.46,-u*1.75,u*0.92,u*0.3);

  // 腕＋刀
  ctx.strokeStyle='#2a2733';
  ctx.lineWidth=u*0.24;
  if(G.slashT>0){
    // 振り抜き
    ctx.beginPath();
    ctx.moveTo(u*0.35,-u*2.5); ctx.lineTo(u*1.1,-u*2.0);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(u*0.35,-u*2.5); ctx.lineTo(u*0.85,-u*1.7);
    ctx.stroke();
    // 刀（構え）
    ctx.strokeStyle='#dfe9f2';
    ctx.lineWidth=u*0.11;
    ctx.shadowColor='rgba(200,240,255,.7)'; ctx.shadowBlur=u*0.5;
    ctx.beginPath();
    ctx.moveTo(u*0.85,-u*1.7); ctx.lineTo(u*2.2,-u*2.3);
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  // 頭
  ctx.fillStyle='#e6cdb0';
  ctx.beginPath(); ctx.arc(u*0.05,-u*3.3,u*0.42,0,6.2832); ctx.fill();
  ctx.fillStyle='#161320';
  ctx.beginPath(); ctx.arc(u*0.05,-u*3.38,u*0.45,Math.PI*1.0,Math.PI*2.05); ctx.fill();
  // 髪
  ctx.strokeStyle='#161320';
  ctx.lineWidth=u*0.13;
  ctx.beginPath();
  ctx.moveTo(-u*0.3,-u*3.45);
  ctx.quadraticCurveTo(-u*1.0,-u*3.5-fl*0.3,-u*1.4,-u*3.05);
  ctx.stroke();
  // 眼
  ctx.fillStyle='#2a2733';
  ctx.beginPath(); ctx.arc(u*0.28,-u*3.3,u*0.06,0,6.2832); ctx.fill();

  ctx.restore();

  /* 斬撃エフェクト */
  if(G.slashT>0){
    var t=1-(G.slashT/0.20);
    var cx=p.x + B.pface*u*1.9;
    var cy=p.y - (crouch?u*0.9:u*2.0);
    var R=u*2.6;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(B.pface,1);
    ctx.rotate(G.slashArc*(0.9 - t*1.9));
    ctx.globalAlpha=(1-t)*0.95;
    var lg=ctx.createLinearGradient(-R,0,R,0);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(0.5,'rgba(210,248,255,1)');
    lg.addColorStop(1,'rgba(120,200,255,0)');
    ctx.strokeStyle=lg;
    ctx.lineWidth=Math.max(4,R*0.2*(1-t*0.5));
    ctx.lineCap='round';
    ctx.shadowColor='rgba(190,240,255,.95)'; ctx.shadowBlur=R*0.4;
    ctx.beginPath();
    ctx.arc(0,0,R*(0.65+t*0.5), -1.25, 1.25);
    ctx.stroke();
    ctx.shadowBlur=0; ctx.lineCap='butt';
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

/* ============================================================
   ループ / 終了
   ============================================================ */
function loop(t){
  raf=requestAnimationFrame(loop);
  if(!checkOrient()) { lastT=0; return; }
  if(!lastT) lastT=t;
  var dt=(t-lastT)/1000; lastT=t;
  if(dt>0.05) dt=0.05;
  if(G && !G.done){
    if(PHASE==='run') stepRun(dt);
    else if(G.B) stepBoss(dt);
  }
  if(G){
    if(PHASE==='run') drawRun();
    else if(G.B) drawBoss2D();
  }
}

function end(win){
  if(!G||G.done) return;
  G.done=true;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  ready.classList.add('hidden');
  bossBox.style.display='none';
  aura.style.opacity=0;
  setControls('none');
  PHASE='run';
  lockOrient('portrait');
  rotEl.style.display='none';
  barBox.style.display='block';
  var sec=G.t0?((Date.now()-G.t0)/1000).toFixed(1):'0.0';
  var et=document.getElementById('eTitle');
  et.textContent=win?'討 伐':'落 命';
  et.className='big '+(win?'ok':'ng');
  document.getElementById('eVerdict').textContent=win?'夜 を 越 え た り':'鬼 の 牙 に 落 つ';
  document.getElementById('sCourse').textContent=G.L.key;
  document.getElementById('sKill').textContent=G.kills+'体';
  document.getElementById('sTime').textContent=sec+'s';
  pEnd.classList.remove('hidden');
}

/* ============================================================
   入力
   ============================================================ */
var kL=0,kR=0,dragX=null;
var bL=0,bR=0,bU=0,bD=0;   // ボス戦の十字

window.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'){ kL=1; bL=1; }
  if(e.key==='ArrowRight'){ kR=1; bR=1; }
  if(e.key==='ArrowUp'){ bU=1; if(PHASE==='run') doJump(); }
  if(e.key==='ArrowDown'){ bD=1; }
  if(e.code==='Space'||e.key===' '){ e.preventDefault(); doSlash(); }
  if(e.key==='Shift'||e.key==='x'||e.key==='X'){ doOugi(); }
  if(e.key==='z'||e.key==='Z'){ if(PHASE==='run') doJump(); }
});
window.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'){ kL=0; bL=0; }
  if(e.key==='ArrowRight'){ kR=0; bR=0; }
  if(e.key==='ArrowUp'){ bU=0; }
  if(e.key==='ArrowDown'){ bD=0; }
});

/* 道中：画面左側のドラッグで左右移動 */
cv.addEventListener('touchmove',function(e){
  if(PHASE!=='run') return;
  var t=e.touches[0];
  if(t.clientX>window.innerWidth*0.60) return;
  dragX=(t.clientX/(window.innerWidth*0.60)-0.5)*2;
  dragX=Math.max(-1,Math.min(1,dragX));
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchstart',function(e){
  if(PHASE!=='run') return;
  var t=e.touches[0];
  if(t.clientX>window.innerWidth*0.60) return;
  dragX=(t.clientX/(window.innerWidth*0.60)-0.5)*2;
  dragX=Math.max(-1,Math.min(1,dragX));
},{passive:true});
window.addEventListener('mousemove',function(e){
  if(PHASE!=='run') return;
  dragX=(e.clientX/window.innerWidth-0.5)*2;
});

/* ボタン共通：押下 / 離す */
function press(el,down,up){
  el.addEventListener('touchstart',function(e){e.preventDefault();down();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();if(up)up();},{passive:false});
  el.addEventListener('touchcancel',function(e){if(up)up();},{passive:true});
  el.addEventListener('mousedown',function(e){e.preventDefault();down();});
  window.addEventListener('mouseup',function(){if(up)up();});
}
function tap(el,fn){
  el.addEventListener('touchstart',function(e){e.preventDefault();fn();},{passive:false});
  el.addEventListener('click',function(e){e.preventDefault();fn();});
}

tap(slashBtn,doSlash);
tap(ougiBtn,doOugi);
tap(jumpBtn,doJump);

press(document.getElementById('dLeft'),
  function(){bL=1;document.getElementById('dLeft').classList.add('hold');},
  function(){bL=0;document.getElementById('dLeft').classList.remove('hold');});
press(document.getElementById('dRight'),
  function(){bR=1;document.getElementById('dRight').classList.add('hold');},
  function(){bR=0;document.getElementById('dRight').classList.remove('hold');});
press(document.getElementById('dUp'),
  function(){bU=1;document.getElementById('dUp').classList.add('hold');},
  function(){bU=0;document.getElementById('dUp').classList.remove('hold');});
press(document.getElementById('dDown'),
  function(){bD=1;document.getElementById('dDown').classList.add('hold');},
  function(){bD=0;document.getElementById('dDown').classList.remove('hold');});

/* メニュー */
function bind(el,fn){
  var fired=false;
  el.addEventListener('click',function(e){
    e.preventDefault();
    if(fired){fired=false;return;}
    fn();
  });
  el.addEventListener('touchend',function(e){
    e.preventDefault(); fired=true; fn();
    setTimeout(function(){fired=false;},400);
  },{passive:false});
}
var btns=document.querySelectorAll('.lv button');
for(var b=0;b<btns.length;b++){
  (function(btn){
    bind(btn,function(){ start(parseInt(btn.getAttribute('data-lv'),10)); });
  })(btns[b]);
}
bind(document.getElementById('bRetry'),function(){ start(G.lv); });
bind(document.getElementById('bMenu'), function(){
  ready.classList.add('hidden');
  bossBox.style.display='none';
  aura.style.opacity=0;
  setControls('none');
  PHASE='run'; lockOrient('portrait'); rotEl.style.display='none';
  pEnd.classList.add('hidden'); pTitle.classList.remove('hidden');
});

/* ============================================================
   題字背景（アイドル）
   ============================================================ */
var iH=[], iL=[];
(function(){
  for(var z=-16;z>-FAR;z-=8){ if(Math.random()<0.8) iH.push(house(z)); }
  for(var i=0;i<16;i++) iL.push(lant());
})();
function idle(){
  requestAnimationFrame(idle);
  if(G) return;
  camX=0; camY=GROUND+4.5; camZ=8; camRoll=0;
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0812'); sky.addColorStop(0.42,'#161226'); sky.addColorStop(1,'#241a2e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  var mx=W*0.74,my=H*0.13,mr=Math.min(W,H)*0.09;
  var mg=ctx.createRadialGradient(mx,my,mr*0.3,mx,my,mr*3.2);
  mg.addColorStop(0,'rgba(255,190,140,.35)'); mg.addColorStop(1,'rgba(255,120,80,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e8c48a';
  ctx.beginPath(); ctx.arc(mx,my,mr,0,6.2832); ctx.fill();

  var horY=proj(0,GROUND,-FAR).y;
  var gg=ctx.createLinearGradient(0,horY,0,H);
  gg.addColorStop(0,'#20182a'); gg.addColorStop(1,'#100c16');
  ctx.fillStyle=gg; ctx.fillRect(-20,horY-2,W+40,H-horY+40);

  var i;
  for(i=iH.length-1;i>=0;i--){
    iH[i].z+=0.28;
    if(iH[i].z>14){ iH.splice(i,1); iH.push(house(-FAR)); }
  }
  for(i=0;i<iL.length;i++){
    iL[i].z+=0.28; iL[i].ph+=0.012;
    if(iL[i].z>14){ var nl=lant(); nl.z=-FAR; iL[i]=nl; }
  }
  var arr=iH.slice().sort(function(a,b){return a.z-b.z;});
  for(i=0;i<arr.length;i++){
    if(!vis(arr[i].z)) continue;
    var fd=1-(-(arr[i].z-camZ))/FAR;
    if(fd>0) drawHouse(arr[i],fd*0.9);
  }
  for(i=0;i<iL.length;i++){
    if(!vis(iL[i].z)) continue;
    var lf=1-(-(iL[i].z-camZ))/FAR;
    if(lf<=0) continue;
    var lp=proj(iL[i].x, iL[i].y+Math.sin(iL[i].ph)*0.8, iL[i].z);
    var lr=Math.max(1,lp.s*0.04);
    var gl=0.6+0.4*Math.sin(iL[i].ph*1.6);
    ctx.globalAlpha=Math.min(0.8,lf*1.3)*0.45*gl;
    var rg=ctx.createRadialGradient(lp.x,lp.y,0,lp.x,lp.y,lr*5);
    rg.addColorStop(0,'rgba(255,170,80,.8)'); rg.addColorStop(1,'rgba(255,140,50,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(lp.x,lp.y,lr*5,0,6.2832); ctx.fill();
    ctx.globalAlpha=Math.min(1,lf*1.3)*gl;
    ctx.fillStyle='#f0ae4a';
    ctx.beginPath(); ctx.ellipse(lp.x,lp.y,lr*0.75,lr,0,0,6.2832); ctx.fill();
    ctx.globalAlpha=1;
  }
}
idle();

})();
